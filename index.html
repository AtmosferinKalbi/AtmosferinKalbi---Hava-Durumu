<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AtmosferinKalbi | V1.2 ASTRONOMİK</title>

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/4064/4064211.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        :root {
            --bg-gradient: linear-gradient(180deg, #1e3a8a 0%, #0f172a 100%);
            --accent-color: #60a5fa;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg-gradient);
            background-attachment: fixed;
            min-height: 100vh; color: white; margin: 0;
            transition: background 1s ease;
            scroll-behavior: smooth;
        }

        .top-nav {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: sticky; top: 0; z-index: 1000;
        }

        .data-font { font-weight: 900; letter-spacing: -0.05em; line-height: 0.9; }
        
        .glass-card { 
            background: rgba(255, 255, 255, 0.07); 
            backdrop-filter: blur(30px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 2rem; 
            transition: all 0.3s ease;
        }

        .nav-btn {
            padding: 8px 20px; border-radius: 12px; font-weight: 700; font-size: 13px;
            display: flex; align-items: center; gap: 8px; color: rgba(255,255,255,0.6);
        }
        .nav-btn.active { background: rgba(59, 130, 246, 0.2); color: var(--accent-color); border: 1px solid rgba(59, 130, 246, 0.3); }

        #radar-container { height: 450px; border-radius: 2rem; overflow: hidden; border: 1px solid rgba(255, 255, 255, 0.1); }

        /* Dinamik Renk Temaları */
        body.sunny { --bg-gradient: linear-gradient(180deg, #0284c7 0%, #0f172a 100%); }
        body.cloudy { --bg-gradient: linear-gradient(180deg, #475569 0%, #0f172a 100%); }
        body.rainy { --bg-gradient: linear-gradient(180deg, #1e293b 0%, #020617 100%); }
        body.snowy { --bg-gradient: linear-gradient(180deg, #94a3b8 0%, #1e293b 100%); }

        @media (max-width: 768px) {
            .temp-text { font-size: 5rem !important; }
            .weather-icon-size { width: 4rem !important; height: 4rem !important; }
        }
    </style>
</head>
<body id="mainBody">

    <nav class="top-nav w-full px-6 lg:px-12 py-4 flex items-center justify-between">
        <div class="flex items-center gap-6">
            <div class="flex items-center gap-3">
                <i data-lucide="cloud-lightning" class="text-yellow-400 w-6 h-6"></i>
                <span class="font-black text-lg tracking-tighter uppercase italic">Atmosferin<span class="text-blue-400">Kalbi</span></span>
            </div>
            <div class="hidden md:flex items-center gap-2">
                <a href="#" class="nav-btn active">Panel</a>
                <a href="#radar-section" class="nav-btn">Radar</a>
            </div>
        </div>
        <div class="flex items-center gap-2 px-3 py-1.5 bg-white/5 rounded-xl border border-white/5">
            <div class="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse"></div>
            <span class="text-[9px] font-bold text-green-400 uppercase tracking-widest">CANLI VERİ</span>
        </div>
    </nav>

    <main class="max-w-[1400px] mx-auto p-4 lg:p-12 space-y-8">
        
        <header class="flex flex-col md:flex-row justify-between items-center gap-6 border-b border-white/10 pb-8">
            <div class="text-center md:text-left">
                <h1 id="cityName" class="text-5xl lg:text-8xl font-black uppercase tracking-tighter leading-none mb-2">---</h1>
                <p id="currentDate" class="text-blue-300/40 font-bold text-[10px] uppercase tracking-[0.4em]"></p>
            </div>
            <div class="relative w-full md:w-[400px]">
                <input id="cityInput" type="text" placeholder="ŞEHİR ARA..." class="w-full bg-black/20 border border-white/10 rounded-2xl px-6 py-4 outline-none text-white focus:border-blue-500 transition-all font-bold text-base">
                <button onclick="getWeather()" class="absolute right-2 top-2 bg-blue-600 text-white px-6 py-2.5 rounded-xl text-[10px] font-black hover:bg-blue-500 transition-all">SORGULA</button>
            </div>
        </header>

        <div class="grid grid-cols-1 xl:grid-cols-3 gap-8">
            <div class="xl:col-span-2 glass-card p-10 flex flex-col justify-between min-h-[450px] relative overflow-hidden">
                <div id="bgIcon" class="absolute -right-10 -bottom-10 opacity-[0.03] scale-[4] pointer-events-none"></div>
                
                <div class="relative z-10">
                    <div class="flex flex-row items-center justify-start gap-4 lg:gap-16">
                        <span id="temp" class="temp-text text-[7rem] lg:text-[11rem] data-font text-white">--°</span>
                        <div id="weatherIcon" class="weather-icon-size w-24 h-24 lg:w-40 lg:h-40"></div>
                    </div>
                    <p id="description" class="text-3xl lg:text-6xl text-blue-200/80 font-light capitalize mt-6 italic">---</p>
                </div>

                <div class="relative z-10 flex gap-8 border-t border-white/10 pt-8 mt-8">
                    <div class="text-center">
                        <p class="text-[9px] font-black opacity-30 uppercase mb-1">Gündüz</p>
                        <p id="dayTemp" class="text-3xl data-font">--°</p>
                    </div>
                    <div class="text-center text-blue-400">
                        <p class="text-[9px] font-black opacity-60 uppercase mb-1">Gece</p>
                        <p id="nightTemp" class="text-3xl data-font">--°</p>
                    </div>
                </div>
            </div>

            <div class="flex flex-col gap-4">
                <div class="glass-card p-6 bg-blue-500/10 border-blue-500/20 flex flex-col gap-3">
                    <div class="flex items-center gap-2">
                        <i data-lucide="sparkles" class="text-blue-300 w-4 h-4"></i>
                        <span class="text-[10px] font-black uppercase tracking-widest text-blue-300">AI Tavsiyesi</span>
                    </div>
                    <p id="aiSuggestion" class="text-xs font-medium text-blue-100 italic leading-relaxed">Analiz ediliyor...</p>
                </div>

                <div class="glass-card p-6 border-yellow-500/10">
                    <div class="flex items-center gap-2 mb-6">
                        <i data-lucide="orbit" class="text-yellow-400 w-4 h-4"></i>
                        <span class="text-[10px] font-black uppercase tracking-widest text-yellow-200">Güneş Döngüsü</span>
                    </div>
                    <div class="flex justify-between items-end">
                        <div class="text-left">
                            <i data-lucide="sunrise" class="text-orange-400 w-6 h-6 mb-1"></i>
                            <p class="text-[8px] opacity-40 font-bold uppercase">Doğuş</p>
                            <p id="sunriseTime" class="text-lg data-font">--:--</p>
                        </div>
                        <div class="flex-1 px-4 pb-2">
                            <div class="h-1 bg-white/10 rounded-full overflow-hidden">
                                <div id="sunProgress" class="h-full bg-gradient-to-r from-orange-500 to-yellow-300 transition-all duration-1000" style="width: 0%"></div>
                            </div>
                            <p id="dayDuration" class="text-[7px] text-center mt-2 opacity-50 font-bold uppercase tracking-tighter">--</p>
                        </div>
                        <div class="text-right">
                            <i data-lucide="sunset" class="text-blue-400 w-6 h-6 mb-1 ml-auto"></i>
                            <p class="text-[8px] opacity-40 font-bold uppercase">Batış</p>
                            <p id="sunsetTime" class="text-lg data-font">--:--</p>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-3 gap-4">
                    <div class="glass-card p-4 flex flex-col items-center justify-center gap-1">
                        <i data-lucide="wind" class="text-blue-400 w-4 h-4"></i>
                        <p class="text-[8px] opacity-40 font-bold uppercase">Rüzgar</p>
                        <p id="windSpeed" class="text-sm data-font">--</p>
                    </div>
                    <div class="glass-card p-4 flex flex-col items-center justify-center gap-1">
                        <i data-lucide="droplets" class="text-blue-400 w-4 h-4"></i>
                        <p class="text-[8px] opacity-40 font-bold uppercase">Nem</p>
                        <p id="humidity" class="text-sm data-font">--</p>
                    </div>
                    <div class="glass-card p-4 flex flex-col items-center justify-center gap-1">
                        <i data-lucide="umbrella" class="text-blue-400 w-4 h-4"></i>
                        <p class="text-[8px] opacity-40 font-bold uppercase">Yağış</p>
                        <p id="pop" class="text-sm data-font">--</p>
                    </div>
                </div>
            </div>
        </div>

        <section id="radar-section" class="space-y-6">
            <h3 class="text-xs font-black uppercase tracking-[0.3em] text-white/20">Canlı Radar</h3>
            <div id="radar-container"><iframe id="windyFrame" class="w-full h-full" src="" frameborder="0"></iframe></div>
        </section>

        <section class="space-y-6">
            <h3 class="text-xs font-black uppercase tracking-[0.3em] text-white/20">5 Günlük Rapor</h3>
            <div id="forecastContainer" class="grid grid-cols-2 md:grid-cols-5 gap-4"></div>
        </section>
    </main>

<script>
    const apiKey = "6d4c1f9be7237068a9dd323532bfa14d"; 

    function getIcon(main) {
        const map = { 'Clear': 'sun', 'Clouds': 'cloud', 'Rain': 'cloud-rain', 'Thunderstorm': 'cloud-lightning', 'Snow': 'snowflake', 'Drizzle': 'cloud-drizzle', 'Mist': 'cloud-fog' };
        return map[main] || 'cloud-sun';
    }

    const formatTime = (unix, timezone) => {
        // API'den gelen timezone saniye cinsinden kaymadır.
        const date = new Date((unix + timezone) * 1000);
        return date.getUTCHours().toString().padStart(2, '0') + ":" + 
               date.getUTCMinutes().toString().padStart(2, '0');
    };

    function setThemeAndSuggestion(data) {
        const body = document.getElementById('mainBody');
        const suggest = document.getElementById('aiSuggestion');
        const main = data.weather[0].main;
        const temp = data.main.temp;
        body.className = ''; 
        if (main === 'Clear') { body.classList.add('sunny'); suggest.innerText = temp > 25 ? "Hava pırıl pırıl! Bol su içmeyi unutma. 😎" : "Tam yürüyüş havası! ☀️"; }
        else if (main === 'Rain' || main === 'Drizzle') { body.classList.add('rainy'); suggest.innerText = "Yağmur berekettir! Şemsiyeni al. ☕☂️"; }
        else if (main === 'Snow') { body.classList.add('snowy'); suggest.innerText = "Dışarısı masal gibi! Sıkı giyin. 🧣❄️"; }
        else { body.classList.add('cloudy'); suggest.innerText = temp < 15 ? "Hava biraz serin, bir hırka al. 🧥☁️" : "Bulutlu ama yumuşak bir gün. ☁️"; }
    }

    async function getWeather(city = 'Istanbul') {
        const target = document.getElementById('cityInput').value.trim() || city;
        try {
            const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${target}&appid=${apiKey}&units=metric&lang=tr`);
            const data = await res.json();
            if(data.cod != 200) { alert("Şehir bulunamadı!"); return; }

            document.getElementById('cityName').innerText = data.name;
            document.getElementById('temp').innerText = Math.round(data.main.temp) + "°";
            document.getElementById('description').innerText = data.weather[0].description;
            document.getElementById('windSpeed').innerText = Math.round(data.wind.speed * 3.6) + " km/s";
            document.getElementById('humidity').innerText = "%" + data.main.humidity;
            
            // Astronomik Hesaplamalar
            const sunrise = data.sys.sunrise;
            const sunset = data.sys.sunset;
            const now = Math.floor(Date.now() / 1000);
            
            document.getElementById('sunriseTime').innerText = formatTime(sunrise, data.timezone);
            document.getElementById('sunsetTime').innerText = formatTime(sunset, data.timezone);
            
            const totalDaylight = sunset - sunrise;
            const elapsed = now - sunrise;
            let progress = (elapsed / totalDaylight) * 100;
            progress = Math.max(0, Math.min(100, progress));
            document.getElementById('sunProgress').style.width = `${progress}%`;
            
            const h = Math.floor(totalDaylight / 3600);
            const m = Math.floor((totalDaylight % 3600) / 60);
            document.getElementById('dayDuration').innerText = `GÜN SÜRESİ: ${h}S ${m}DK`;

            // Görsel Güncelleme
            const iconName = getIcon(data.weather[0].main);
            document.getElementById('weatherIcon').innerHTML = `<i data-lucide="${iconName}" class="w-full h-full text-white"></i>`;
            document.getElementById('bgIcon').innerHTML = `<i data-lucide="${iconName}" class="w-full h-full text-white"></i>`;

            setThemeAndSuggestion(data);
            document.getElementById('windyFrame').src = `https://embed.windy.com/embed2.html?lat=${data.coord.lat}&lon=${data.coord.lon}&zoom=6&overlay=rain&product=ecmwf&metricTemp=%C2%B0C`;

            // Tahmin Verileri
            const fRes = await fetch(`https://api.openweathermap.org/data/2.5/forecast?q=${target}&appid=${apiKey}&units=metric&lang=tr`);
            const fData = await fRes.json();
            document.getElementById('pop').innerText = "%" + Math.round((fData.list[0].pop || 0) * 100);

            const daily = {};
            fData.list.forEach(item => {
                const date = item.dt_txt.split(' ')[0];
                if(!daily[date]) daily[date] = { min: item.main.temp_min, max: item.main.temp_max, icon: item.weather[0].main };
                else {
                    if(item.main.temp_min < daily[date].min) daily[date].min = item.main.temp_min;
                    if(item.main.temp_max > daily[date].max) daily[date].max = item.main.temp_max;
                }
            });

            const todayKey = Object.keys(daily)[0];
            document.getElementById('dayTemp').innerText = Math.round(daily[todayKey].max) + "°";
            document.getElementById('nightTemp').innerText = Math.round(daily[todayKey].min) + "°";

            const container = document.getElementById('forecastContainer');
            container.innerHTML = "";
            Object.keys(daily).slice(1, 6).forEach(date => {
                const dayName = new Date(date).toLocaleDateString('tr-TR', { weekday: 'short' });
                container.innerHTML += `
                    <div class="glass-card p-4 flex flex-col items-center">
                        <span class="text-[9px] font-black opacity-30 uppercase mb-3">${dayName}</span>
                        <i data-lucide="${getIcon(daily[date].icon)}" class="text-blue-300 w-8 h-8 mb-4"></i>
                        <div class="flex items-center gap-2">
                            <span class="data-font text-xl">${Math.round(daily[date].max)}°</span>
                            <span class="data-font text-blue-400/50 text-sm">${Math.round(daily[date].min)}°</span>
                        </div>
                    </div>`;
            });

            lucide.createIcons();
        } catch (e) { console.error(e); }
    }

    document.getElementById('cityInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') getWeather(); });
    window.onload = () => {
        document.getElementById('currentDate').innerText = new Date().toLocaleDateString('tr-TR', { weekday: 'long', day: 'numeric', month: 'long' });
        getWeather('Istanbul'); 
    };
</script>
</body>
    </html>

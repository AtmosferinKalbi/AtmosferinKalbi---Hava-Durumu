<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AtmosferinKalbi | Meteoroloji İstasyonu</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: linear-gradient(135deg, #0f172a 0%, #1e40af 50%, #3b82f6 100%);
            background-attachment: fixed;
            min-height: 100vh;
            margin: 0;
            color: white;
            overflow-x: hidden;
        }

        .sidebar-fixed { position: sticky; top: 0; height: 100vh; z-index: 50; }

        .glass-card { 
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(16px); 
            border: 1px solid rgba(255, 255, 255, 0.15); 
            box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.3); 
            border-radius: 2.5rem; 
        }

        .forecast-card { 
            background: rgba(255, 255, 255, 0.07); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 2rem; 
            padding: 1.5rem; 
            transition: all 0.4s ease;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 0.5rem; 
        }

        .forecast-card:hover { 
            background: rgba(255, 255, 255, 0.2); 
            transform: translateY(-8px); 
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
    </style>
</head>
<body class="flex">

    <aside class="w-72 bg-slate-950/40 backdrop-blur-2xl text-white flex flex-col hidden lg:flex shrink-0 sidebar-fixed border-r border-white/10">
        <div class="p-8">
            <div class="flex items-center gap-3 mb-12">
                <i data-lucide="cloud-lightning" class="w-10 h-10 text-yellow-500 drop-shadow-lg"></i>
                <span class="text-xl font-black tracking-tighter uppercase">Atmosferin<span class="text-blue-400">Kalbi</span></span>
            </div>
            
            <nav class="space-y-3">
                <a href="#home" class="flex items-center gap-4 p-4 rounded-2xl bg-white/10 border-l-4 border-blue-400"><i data-lucide="layout-dashboard" class="w-5 h-5 text-blue-400"></i><span class="font-bold">Ana Panel</span></a>
                <a href="#forecast" class="flex items-center gap-4 p-4 rounded-2xl hover:bg-white/5 transition text-slate-300"> <i data-lucide="calendar" class="w-5 h-5"></i><span>5 Günlük Tahmin</span></a>
                <a href="#radar" class="flex items-center gap-4 p-4 rounded-2xl hover:bg-white/5 transition text-slate-300"> <i data-lucide="map" class="w-5 h-5"></i><span>Canlı Radar</span></a>
            </nav>
        </div>
        <div class="mt-auto p-8 text-[9px] text-slate-500 text-center uppercase font-bold">© 2026 Atmosferin Kalbi</div>
    </aside>

    <main class="flex-1 p-6 lg:p-12 space-y-12">
        
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
            <div>
                <h1 class="text-3xl font-black tracking-tighter uppercase">ATMOSFERİN<span class="text-blue-400">KALBİ</span></h1>
                <p id="currentDate" class="text-blue-200/60 font-bold text-xs uppercase mt-1 italic"></p>
            </div>
            <div class="relative w-full md:w-96">
                <input id="cityInput" type="text" placeholder="Şehir Ara..." class="w-full bg-white/10 border border-white/20 rounded-2xl px-6 py-4 outline-none text-white backdrop-blur-md focus:border-blue-400 transition-all">
                <button onclick="getWeather()" class="absolute right-2 top-2 bg-blue-500 text-white px-6 py-2 rounded-xl hover:bg-blue-400 font-black text-xs uppercase">Sorgula</button>
            </div>
        </header>

        <div id="home" class="grid grid-cols-1 xl:grid-cols-3 gap-10">
            <div class="xl:col-span-2 glass-card p-10 relative flex flex-col justify-between min-h-[450px] overflow-hidden group">
                <div id="bgIcon" class="absolute -right-10 -bottom-10 opacity-5 pointer-events-none transition-transform duration-1000 group-hover:scale-110"></div>
                <div>
                    <div class="bg-blue-500 text-white px-3 py-1 rounded-lg text-[10px] font-black tracking-widest mb-6 w-fit uppercase shadow-xl">İstasyon Aktif</div>
                    <h2 id="cityName" class="text-6xl font-black uppercase tracking-tighter leading-tight">Yükleniyor...</h2>
                    <p id="description" class="text-2xl text-blue-200 mt-2 capitalize italic">Sorgulanıyor</p>
                </div>
                <div class="flex items-end gap-10 z-10">
                    <span id="temp" class="text-[9rem] leading-[0.8] font-black tracking-tighter">--°</span>
                    <div class="pb-3">
                        <p id="feelsLike" class="text-3xl font-bold text-blue-300">--°</p>
                        <p class="text-[10px] font-black text-blue-200/50 uppercase tracking-widest">Hissedilen</p>
                    </div>
                </div>
                <div id="weatherIcon" class="absolute top-10 right-10 p-5 bg-white/5 rounded-3xl border border-white/10 backdrop-blur-md shadow-2xl"></div>
            </div>

            <div class="flex flex-col gap-6">
                <div class="glass-card p-8 flex items-center gap-6">
                    <div class="bg-blue-400/20 p-4 rounded-2xl text-blue-400"><i data-lucide="wind"></i></div>
                    <div><p class="text-[10px] font-black text-blue-200/50 uppercase mb-1">Rüzgar</p><p id="windSpeed" class="text-2xl font-black">--</p></div>
                </div>
                <div class="glass-card p-8 flex items-center gap-6">
                    <div class="bg-blue-400/20 p-4 rounded-2xl text-blue-400"><i data-lucide="droplets"></i></div>
                    <div><p class="text-[10px] font-black text-blue-200/50 uppercase mb-1">Nem</p><p id="humidity" class="text-2xl font-black">--%</p></div>
                </div>
                <div class="glass-card p-8 flex items-center gap-6">
                    <div class="bg-blue-400/20 p-4 rounded-2xl text-blue-400"><i data-lucide="gauge"></i></div>
                    <div><p class="text-[10px] font-black text-blue-200/50 uppercase mb-1">Basınç</p><p id="pressure" class="text-2xl font-black">--</p></div>
                </div>
            </div>
        </div>

        <section id="forecast" class="space-y-8">
            <h3 class="text-3xl font-black uppercase italic tracking-tighter">5 GÜNLÜK <span class="text-blue-400 underline underline-offset-8 decoration-4">RAPOR</span></h3>
            <div id="forecastContainer" class="grid grid-cols-2 md:grid-cols-5 gap-6">
                </div>
        </section>

        <section id="radar" class="pt-6">
            <div class="glass-card w-full h-[300px] flex items-center justify-center border-dashed border-2 border-white/10 opacity-30">
                <p class="font-black italic tracking-widest uppercase">Radar Entegrasyonu Yakında</p>
            </div>
        </section>

    </main>

    <script>
        const apiKey = "6d4c1f9be7237068a9dd323532bfa14d";
        
        document.getElementById('currentDate').innerText = new Date().toLocaleDateString('tr-TR', { weekday: 'long', day: 'numeric', month: 'long' });

        function getLucideIcon(main) {
            const map = { 'Clear': 'sun', 'Clouds': 'cloud', 'Rain': 'cloud-rain', 'Thunderstorm': 'cloud-lightning', 'Drizzle': 'cloud-drizzle' };
            return map[main] || 'cloud-sun';
        }

        async function getWeather(city = 'Istanbul') {
            const input = document.getElementById('cityInput').value.trim();
            const target = input || city;
            
            try {
                // ANLIK
                const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${target}&appid=${apiKey}&units=metric&lang=tr`);
                const data = await res.json();
                if(data.cod != 200) return;

                document.getElementById('cityName').innerText = data.name;
                document.getElementById('temp').innerText = Math.round(data.main.temp) + "°";
                document.getElementById('feelsLike').innerText = Math.round(data.main.feels_like) + "°";
                document.getElementById('description').innerText = data.weather[0].description;
                document.getElementById('humidity').innerText = "%" + data.main.humidity;
                document.getElementById('windSpeed').innerText = Math.round(data.wind.speed * 3.6) + " km/s";
                document.getElementById('pressure').innerText = data.main.pressure + " hPa";
                
                const icon = getLucideIcon(data.weather[0].main);
                document.getElementById('weatherIcon').innerHTML = `<i data-lucide="${icon}" class="w-16 h-16 text-blue-100"></i>`;
                document.getElementById('bgIcon').innerHTML = `<i data-lucide="${icon}" class="w-64 h-64 text-white"></i>`;

                // 5 GÜNLÜK
                const fRes = await fetch(`https://api.openweathermap.org/data/2.5/forecast?q=${target}&appid=${apiKey}&units=metric&lang=tr`);
                const fData = await fRes.json();
                
                const container = document.getElementById('forecastContainer');
                container.innerHTML = "";
                
                const daily = {};
                fData.list.forEach(i => {
                    const d = i.dt_txt.split(' ')[0];
                    if(!daily[d]) daily[d] = { t: [], ic: [], ds: "" };
                    daily[d].t.push(i.main.temp);
                    daily[d].ic.push(i.weather[0].main);
                    if(i.dt_txt.includes("12:00:00")) daily[d].ds = i.weather[0].description;
                });

                Object.keys(daily).slice(0, 5).forEach(d => {
                    const day = daily[d];
                    const name = new Date(d).toLocaleDateString('tr-TR', { weekday: 'short' });
                    container.innerHTML += `
                        <div class="forecast-card">
                            <span class="text-[10px] font-black text-blue-200/40 uppercase">${name}</span>
                            <i data-lucide="${getLucideIcon(day.ic[0])}" class="text-blue-400 w-10 h-10 my-1"></i>
                            <span class="text-3xl font-black">${Math.round(Math.max(...day.t))}°</span>
                            <div class="flex items-center gap-1 opacity-50"><i data-lucide="moon" class="w-3 h-3"></i><span class="text-xs font-bold">${Math.round(Math.min(...day.t))}°</span></div>
                            <span class="text-[9px] text-blue-100/30 font-bold uppercase mt-1">${day.ds || 'Açık'}</span>
                        </div>`;
                });
                lucide.createIcons();
            } catch (e) { console.error(e); }
        }

        document.getElementById('cityInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') getWeather(); });
        window.onload = () => getWeather('Istanbul');
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AtmosferinKalbi | Güncel Hava Durumu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; scroll-behavior: smooth; }
        .sidebar-fixed { position: sticky; top: 0; height: 100vh; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(226, 232, 240, 0.8); box-shadow: 0 4px 25px rgba(0,0,0,0.04); border-radius: 2.5rem; }
        .forecast-card { background: white; border: 1px solid #e2e8f0; border-radius: 1.5rem; padding: 1.5rem; transition: transform 0.3s; }
        .forecast-card:hover { transform: translateY(-5px); border-color: #3b82f6; }
    </style>
</head>
<body class="text-slate-900 flex">

    <aside class="w-72 bg-blue-950 text-white flex flex-col hidden lg:flex shrink-0 sidebar-fixed">
        <div class="p-8">
            <div class="flex items-center gap-3 mb-12">
                <div class="bg-yellow-500 p-2 rounded-lg shadow-lg shadow-yellow-500/20">
                    <i data-lucide="cloud-lightning" class="w-7 h-7 text-white"></i>
                </div>
                <span class="text-xl font-bold tracking-tight uppercase">Atmosferin<span class="text-blue-400">Kalbi</span></span>
            </div>
            <nav class="space-y-2">
                <a href="#home" class="flex items-center gap-4 p-4 rounded-xl bg-blue-800 font-semibold border-l-4 border-blue-400"><i data-lucide="layout-dashboard" class="w-5 h-5"></i><span>Ana Panel</span></a>
                <a href="#forecast" class="flex items-center gap-4 p-4 rounded-xl hover:bg-blue-900/50 transition text-blue-200 hover:text-white"><i data-lucide="calendar" class="w-5 h-5"></i><span>5 Günlük Tahmin</span></a>
                <a href="#radar" class="flex items-center gap-4 p-4 rounded-xl hover:bg-blue-900/50 transition text-blue-200 hover:text-white"><i data-lucide="map" class="w-5 h-5"></i><span>Canlı Radar</span></a>
            </nav>
        </div>
        <div class="mt-auto p-8 text-[10px] text-blue-500 font-bold tracking-widest uppercase">Atmosferin Kalbi Meteoroloji © 2026</div>
    </aside>

    <main class="flex-1 p-6 lg:p-12 space-y-12 overflow-y-auto">
        
        <section id="home">
            <header class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 mb-12">
                <div>
                    <h1 class="text-4xl font-black text-blue-950 tracking-tighter uppercase">ATMOSFERİN<span class="text-blue-600">KALBİ</span></h1>
                    <p id="currentDate" class="text-slate-500 font-bold text-xs uppercase tracking-[0.2em] mt-2"></p>
                </div>
                <div class="relative w-full md:w-96">
                    <input id="cityInput" type="text" placeholder="Şehir Ara..." class="w-full bg-white border border-slate-200 rounded-2xl px-6 py-4 focus:ring-4 focus:ring-blue-500/10 outline-none transition-all">
                    <button onclick="getWeather()" class="absolute right-2 top-2 bg-blue-600 text-white px-5 py-2 rounded-xl hover:bg-blue-700 transition font-bold text-xs uppercase">Sorgula</button>
                </div>
            </header>

            <div class="grid grid-cols-1 xl:grid-cols-3 gap-10">
                <div class="xl:col-span-2 glass-card p-12 relative border-t-8 border-t-blue-600 flex flex-col justify-between min-h-[450px]">
                    <div>
                        <div class="flex items-center gap-2 bg-blue-600 text-white px-3 py-1 rounded-md text-[10px] font-black tracking-widest mb-6 w-fit uppercase">İstasyon Bağlı</div>
                        <h2 id="cityName" class="text-8xl font-black text-blue-950 uppercase tracking-tighter leading-none">...</h2>
                        <p id="description" class="text-3xl text-slate-400 mt-4 capitalize font-light italic">Yükleniyor...</p>
                    </div>
                    <div class="flex items-end gap-10">
                        <span id="temp" class="text-[13rem] leading-[0.7] font-black text-blue-950 tracking-tighter">--°</span>
                        <div class="pb-4">
                            <p id="feelsLike" class="text-3xl font-bold text-blue-600 leading-none">--°</p>
                            <p class="text-xs font-black text-slate-400 uppercase tracking-widest mt-1">Hissedilen</p>
                        </div>
                    </div>
                    <div id="weatherIcon" class="absolute top-12 right-12"></div>
                </div>

                <div class="flex flex-col gap-6">
                    <div class="glass-card p-8 flex items-center gap-6"><i data-lucide="wind" class="text-blue-600 w-10 h-10"></i><div><p class="text-[10px] font-black text-slate-400 uppercase">Rüzgar</p><p id="windSpeed" class="text-3xl font-black text-blue-950">--</p></div></div>
                    <div class="glass-card p-8 flex items-center gap-6"><i data-lucide="droplets" class="text-blue-600 w-10 h-10"></i><div><p class="text-[10px] font-black text-slate-400 uppercase">Nem Oranı</p><p id="humidity" class="text-3xl font-black text-blue-950">--</p></div></div>
                    <div class="glass-card p-8 flex items-center gap-6"><i data-lucide="gauge" class="text-blue-600 w-10 h-10"></i><div><p class="text-[10px] font-black text-slate-400 uppercase">Basınç</p><p id="pressure" class="text-3xl font-black text-blue-950">--</p></div></div>
                </div>
            </div>
        </section>

        <section id="forecast" class="pt-12">
            <h3 class="text-3xl font-black text-blue-950 mb-8 uppercase tracking-tighter italic">5 GÜNLÜK <span class="text-blue-600 underline">RAPOR</span></h3>
            <div id="forecastContainer" class="grid grid-cols-2 md:grid-cols-5 gap-4">
                </div>
        </section>

        <section id="radar" class="min-h-[500px] pt-12 pb-20">
            <h3 class="text-3xl font-black text-blue-950 mb-8 uppercase tracking-tighter italic">CANLI <span class="text-blue-600">RADAR</span></h3>
            <div class="glass-card w-full h-[400px] flex items-center justify-center border-dashed border-2 border-slate-300">
                <p class="text-slate-400 font-bold italic tracking-widest">RADAR VERİSİ YAKINDA EKLENECEK</p>
            </div>
        </section>

    </main>

    <script>
        const apiKey = "6d4c1f9be7237068a9dd323532bfa14d";
        document.getElementById('currentDate').innerText = new Date().toLocaleDateString('tr-TR', { weekday: 'long', day: 'numeric', month: 'long' });

        function getLucideIcon(main) {
            const map = { 'Clear': 'sun', 'Clouds': 'cloud', 'Rain': 'cloud-rain', 'Snow': 'snowflake', 'Thunderstorm': 'cloud-lightning' };
            return map[main] || 'cloud-sun';
        }

        async function getWeather(city = 'Izmir') {
            const target = document.getElementById('cityInput').value || city;
            
            try {
                // Mevcut Hava Durumu
                const currentRes = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${target}&appid=${apiKey}&units=metric&lang=tr`);
                const data = await currentRes.json();
                
                document.getElementById('cityName').innerText = data.name;
                document.getElementById('temp').innerText = Math.round(data.main.temp) + "°";
                document.getElementById('feelsLike').innerText = Math.round(data.main.feels_like) + "°";
                document.getElementById('description').innerText = data.weather[0].description;
                document.getElementById('humidity').innerText = "%" + data.main.humidity;
                document.getElementById('windSpeed').innerText = Math.round(data.wind.speed * 3.6) + " km/s";
                document.getElementById('pressure').innerText = data.main.pressure + " hPa";
                document.getElementById('weatherIcon').innerHTML = `<i data-lucide="${getLucideIcon(data.weather[0].main)}" class="w-32 h-32 text-blue-600"></i>`;

                // 5 Günlük Tahmin
                const forecastRes = await fetch(`https://api.openweathermap.org/data/2.5/forecast?q=${target}&appid=${apiKey}&units=metric&lang=tr`);
                const fData = await forecastRes.json();
                
                const container = document.getElementById('forecastContainer');
                container.innerHTML = "";
                
                // Her günün öğle saatini (12:00) filtreleyerek 5 günü alalım
                const dailyData = fData.list.filter(f => f.dt_txt.includes("12:00:00"));
                
                dailyData.forEach(day => {
                    const date = new Date(day.dt * 1000).toLocaleDateString('tr-TR', { weekday: 'short' });
                    container.innerHTML += `
                        <div class="forecast-card flex flex-col items-center gap-3">
                            <span class="text-xs font-black text-slate-400 uppercase tracking-widest">${date}</span>
                            <i data-lucide="${getLucideIcon(day.weather[0].main)}" class="text-blue-500 w-8 h-8"></i>
                            <span class="text-2xl font-black text-blue-950">${Math.round(day.main.temp)}°</span>
                            <span class="text-[10px] text-slate-400 font-bold uppercase">${day.weather[0].description}</span>
                        </div>
                    `;
                });

                lucide.createIcons();
            } catch (e) { console.log(e); }
        }

        document.getElementById('cityInput').addEventListener('keypress', (e) => { if(e.key==='Enter') getWeather(); });
        getWeather();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AtmosferinKalbi | Meteoroloji İstasyonu</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: linear-gradient(135deg, #080d17 0%, #1e3a8a 100%);
            background-attachment: fixed;
            min-height: 100vh;
            color: white;
            margin: 0;
            overflow-x: hidden;
        }

        /* İnce ve Şık Sidebar */
        .sidebar {
            width: 70px;
            transition: width 0.3s ease;
            position: fixed;
            left: 0;
            top: 0;
            height: 100vh;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 100;
            overflow: hidden;
        }

        .sidebar:hover { width: 240px; }

        .glass-card { 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(15px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 2rem; 
        }

        .forecast-card { 
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 1.5rem; 
            padding: 1.2rem; 
            text-align: center;
        }

        .main-content { margin-left: 70px; transition: margin-left 0.3s ease; }
        
        @media (max-width: 1024px) {
            .sidebar { display: none; }
            .main-content { margin-left: 0; }
        }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
    </style>
</head>
<body class="flex">

    <aside class="sidebar flex flex-col items-center py-8">
        <div class="mb-12 flex items-center w-full px-5">
            <i data-lucide="zap" class="text-yellow-400 min-w-[30px]"></i>
            <span class="ml-4 font-black tracking-tighter whitespace-nowrap uppercase">Atmosferin<span class="text-blue-400">Kalbi</span></span>
        </div>
        
        <nav class="flex flex-col gap-6 w-full px-4">
            <a href="#" class="flex items-center p-3 rounded-xl bg-white/10 text-blue-400"><i data-lucide="home"></i><span class="ml-4 font-bold whitespace-nowrap">Panel</span></a>
            <a href="#forecast" class="flex items-center p-3 rounded-xl hover:bg-white/5 transition"><i data-lucide="calendar"></i><span class="ml-4 font-medium whitespace-nowrap">Tahmin</span></a>
            <a href="#radar-section" class="flex items-center p-3 rounded-xl hover:bg-white/5 transition"><i data-lucide="map"></i><span class="ml-4 font-medium whitespace-nowrap">Radar</span></a>
        </nav>
    </aside>

    <main class="main-content flex-1 p-6 lg:p-12 space-y-8">
        
        <header class="flex flex-col md:flex-row justify-between items-center gap-6">
            <div>
                <h1 id="cityName" class="text-6xl font-black uppercase tracking-tighter">...</h1>
                <p id="currentDate" class="text-blue-300 font-bold text-xs uppercase opacity-60 mt-1"></p>
            </div>
            <div class="relative w-full md:w-96">
                <input id="cityInput" type="text" placeholder="Şehir Sorgula..." class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-4 outline-none focus:border-blue-400 transition-all">
                <button onclick="getWeather()" class="absolute right-2 top-2 bg-blue-600 px-5 py-2 rounded-xl text-xs font-black hover:bg-blue-500 transition-colors">SORGULA</button>
            </div>
        </header>

        <div class="grid grid-cols-1 xl:grid-cols-4 gap-6">
            <div class="xl:col-span-2 glass-card p-10 relative overflow-hidden flex flex-col justify-between min-h-[400px]">
                <div id="bgIcon" class="absolute -right-10 -bottom-10 opacity-5 pointer-events-none"></div>
                
                <div>
                    <span class="text-blue-400 font-black text-xs uppercase tracking-[0.2em]">Güncel Sıcaklık</span>
                    <div class="flex items-center gap-6 mt-2">
                        <span id="temp" class="text-9xl font-black tracking-tighter leading-none">--°</span>
                        <div id="weatherIcon"></div>
                    </div>
                    <p id="description" class="text-2xl text-blue-200 capitalize italic mt-4">Sorgulanıyor...</p>
                </div>

                <div class="mt-8">
                    <p class="text-[10px] font-black opacity-40 uppercase tracking-widest">Gece Beklenen</p>
                    <p id="nightTemp" class="text-4xl font-bold text-indigo-300">--°</p>
                </div>
            </div>

            <div class="grid grid-cols-2 xl:grid-cols-2 xl:col-span-2 gap-4">
                <div class="glass-card p-6 flex flex-col justify-center">
                    <i data-lucide="wind" class="text-blue-400 mb-2"></i>
                    <p class="text-[10px] opacity-40 uppercase font-bold">Rüzgar</p>
                    <p id="windSpeed" class="text-2xl font-black">-- km/s</p>
                </div>
                <div class="glass-card p-6 flex flex-col justify-center">
                    <i data-lucide="umbrella" class="text-blue-400 mb-2"></i>
                    <p class="text-[10px] opacity-40 uppercase font-bold">Yağış İhtimali</p>
                    <p id="pop" class="text-2xl font-black">--%</p>
                </div>
                <div class="glass-card p-6 flex flex-col justify-center">
                    <i data-lucide="sun" class="text-yellow-400 mb-2"></i>
                    <p class="text-[10px] opacity-40 uppercase font-bold">UV Endeksi</p>
                    <p id="uvi" class="text-2xl font-black">--</p>
                </div>
                <div class="glass-card p-6 flex flex-col justify-center">
                    <i data-lucide="gauge" class="text-blue-400 mb-2"></i>
                    <p class="text-[10px] opacity-40 uppercase font-bold">Basınç</p>
                    <p id="pressure" class="text-2xl font-black">-- hPa</p>
                </div>
            </div>
        </div>

        <section id="forecast" class="space-y-6">
            <h3 class="text-2xl font-black uppercase italic tracking-tighter">5 Günlük <span class="text-blue-400">Rapor</span></h3>
            <div id="forecastContainer" class="grid grid-cols-2 md:grid-cols-5 gap-4"></div>
        </section>

        <section id="radar-section" class="space-y-6 pb-12">
            <h3 class="text-2xl font-black uppercase italic tracking-tighter">Canlı Radar <span class="text-blue-400">Görüntüsü</span></h3>
            <div class="glass-card p-2 overflow-hidden h-[500px]">
                <iframe id="windyIframe" src="" frameborder="0" class="w-full h-full rounded-2xl"></iframe>
            </div>
        </section>
    </main>

    <script>
        const apiKey = "6d4c1f9be7237068a9dd323532bfa14d"; 

        function getLucideIcon(main) {
            const map = { 'Clear': 'sun', 'Clouds': 'cloud', 'Rain': 'cloud-rain', 'Thunderstorm': 'cloud-lightning', 'Snow': 'snowflake' };
            return map[main] || 'cloud-sun';
        }

        async function getWeather(city = 'Istanbul') {
            const target = document.getElementById('cityInput').value.trim() || city;
            
            try {
                // 1. ANLIK VERİ
                const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${target}&appid=${apiKey}&units=metric&lang=tr`);
                const data = await res.json();
                if(data.cod != 200) return alert("Şehir bulunamadı!");

                document.getElementById('cityName').innerText = data.name;
                document.getElementById('temp').innerText = Math.round(data.main.temp) + "°";
                document.getElementById('description').innerText = data.weather[0].description;
                document.getElementById('windSpeed').innerText = Math.round(data.wind.speed * 3.6) + " km/s";
                document.getElementById('pressure').innerText = data.main.pressure;
                
                const icon = getLucideIcon(data.weather[0].main);
                document.getElementById('weatherIcon').innerHTML = `<i data-lucide="${icon}" class="w-20 h-20 text-blue-100"></i>`;
                document.getElementById('bgIcon').innerHTML = `<i data-lucide="${icon}" class="w-80 h-80 text-white"></i>`;

                // Radar
                document.getElementById('windyIframe').src = `https://embed.windy.com/embed2.html?lat=${data.coord.lat}&lon=${data.coord.lon}&zoom=6&level=surface&overlay=rain&product=ecmwf&menu=&message=&marker=&calendar=now&pressure=&type=map&location=coordinates&detail=&metricWind=km%2Fh&metricTemp=%C2%B0C&radarRange=-1`;

                // 2. TAHMİN & EKSTRA VERİLER (OneCall simülasyonu için forecast kullanıldı)
                const fRes = await fetch(`https://api.openweathermap.org/data/2.5/forecast?q=${target}&appid=${apiKey}&units=metric&lang=tr`);
                const fData = await fRes.json();
                
                // Yağış İhtimali (İlk dilimden alıyoruz)
                document.getElementById('pop').innerText = Math.round((fData.list[0].pop || 0) * 100) + "%";
                // UV Endeksi (Sabit simülasyon, standart API'de OneCall gerekir)
                document.getElementById('uvi').innerText = "Low (2)";

                const daily = {};
                fData.list.forEach(i => {
                    const d = i.dt_txt.split(' ')[0];
                    if(!daily[d]) daily[d] = { max: [], min: [], icon: i.weather[0].main };
                    daily[d].max.push(i.main.temp_max);
                    daily[d].min.push(i.main.temp_min);
                });

                document.getElementById('nightTemp').innerText = Math.round(Math.min(...daily[Object.keys(daily)[0]].min)) + "°";

                const container = document.getElementById('forecastContainer');
                container.innerHTML = "";
                Object.keys(daily).slice(1, 6).forEach(d => {
                    const name = new Date(d).toLocaleDateString('tr-TR', { weekday: 'short' });
                    container.innerHTML += `
                        <div class="forecast-card">
                            <p class="text-[10px] font-black opacity-30 uppercase mb-2">${name}</p>
                            <i data-lucide="${getLucideIcon(daily[d].icon)}" class="text-blue-400 w-8 h-8 mx-auto mb-3"></i>
                            <div class="flex justify-center gap-3">
                                <span class="text-xl font-black">${Math.round(Math.max(...daily[d].max))}°</span>
                                <span class="text-xl font-medium opacity-40">${Math.round(Math.min(...daily[d].min))}°</span>
                            </div>
                            <p class="text-[8px] opacity-30 mt-2">GÜNDÜZ / GECE</p>
                        </div>`;
                });
                
                lucide.createIcons();
            } catch (e) { console.error(e); }
        }

        document.getElementById('cityInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') getWeather(); });
        window.onload = () => { 
            getWeather(); 
            document.getElementById('currentDate').innerText = new Date().toLocaleDateString('tr-TR', { weekday: 'long', day: 'numeric', month: 'long' });
        };
    </script>
</body>
</html>

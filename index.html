<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AtmosferinKalbi | V3.0 ELITE</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        :root { 
            --bg-main: #020617;
            --sidebar-bg: rgba(15, 23, 42, 0.9);
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg-main);
            color: white; margin: 0; overflow-x: hidden;
        }

        /* Sidebar Stil */
        .sidebar {
            width: 80px; height: 100vh;
            background: var(--sidebar-bg);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            position: fixed; left: 0; top: 0;
            display: flex; flex-direction: column; align-items: center;
            padding: 30px 0; z-index: 100;
            backdrop-filter: blur(20px);
            transition: width 0.3s ease;
        }
        
        .sidebar:hover { width: 220px; }
        .sidebar:hover .nav-text { display: block; }
        .nav-text { display: none; font-size: 14px; font-weight: 700; margin-left: 15px; }
        
        .nav-item {
            width: 100%; padding: 20px;
            display: flex; align-items: center; justify-content: center;
            color: rgba(255,255,255,0.4); cursor: pointer; transition: 0.2s;
        }
        .sidebar:hover .nav-item { justify-content: flex-start; padding-left: 25px; }
        .nav-item:hover, .nav-item.active { color: #06b6d4; background: rgba(6, 182, 212, 0.05); }

        .main-content { margin-left: 80px; padding: 40px; }

        .glass-card { 
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 2rem; 
        }

        .data-font { font-weight: 900; letter-spacing: -0.05em; line-height: 1; }

        @media (max-width: 768px) {
            .sidebar { width: 100%; height: 60px; bottom: 0; top: auto; flex-direction: row; border-right: none; border-top: 1px solid rgba(255, 255, 255, 0.1); }
            .sidebar:hover { width: 100%; }
            .main-content { margin-left: 0; padding: 20px; padding-bottom: 80px; }
            .nav-item { padding: 0; height: 100%; }
            .nav-text { display: none !important; }
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="mb-10 text-cyan-400"><i data-lucide="cloud-lightning" class="w-8 h-8"></i></div>
        <nav class="flex-1 w-full">
            <div class="nav-item active"><i data-lucide="layout-dashboard"></i><span class="nav-text">Panel</span></div>
            <div class="nav-item" onclick="location.hash='#radar'"><i data-lucide="map"></i><span class="nav-text">Radar</span></div>
            <div class="nav-item"><i data-lucide="calendar"></i><span class="nav-text">Tahmin</span></div>
            <div class="nav-item"><i data-lucide="settings"></i><span class="nav-text">Ayarlar</span></div>
        </nav>
    </aside>

    <main class="main-content space-y-10">
        
        <header class="flex flex-col md:flex-row justify-between items-center gap-6">
            <div>
                <h1 id="cityName" class="text-5xl md:text-7xl font-black tracking-tighter uppercase italic">---</h1>
                <p id="currentDate" class="text-white/20 font-bold uppercase tracking-[0.3em] text-xs mt-2"></p>
            </div>
            <div class="flex bg-white/5 border border-white/10 rounded-2xl p-2 w-full max-w-[400px]">
                <input id="cityInput" type="text" placeholder="Şehir Ara..." class="bg-transparent border-none outline-none px-4 text-white w-full font-semibold">
                <button onclick="getWeather()" class="bg-cyan-600 hover:bg-cyan-500 px-6 py-3 rounded-xl font-black text-[10px] uppercase transition-all">Sorgula</button>
            </div>
        </header>

        <div class="grid grid-cols-1 xl:grid-cols-3 gap-8">
            <div class="xl:col-span-2 glass-card p-10 md:p-16 flex flex-col md:flex-row items-center justify-between gap-10">
                <div class="flex flex-row items-center gap-8 lg:gap-12">
                    <span id="temp" class="text-[7rem] md:text-[11rem] data-font text-white">--°</span>
                    <div id="weatherIcon" class="w-24 h-24 md:w-44 md:h-44"></div>
                </div>
                <div class="text-center md:text-right">
                    <p id="description" class="text-3xl md:text-5xl font-light text-cyan-100/80 capitalize italic">---</p>
                    <div class="flex justify-center md:justify-end gap-6 mt-8">
                        <div class="text-center"><p class="text-[10px] opacity-30 font-bold uppercase">Gündüz</p><p id="dayTemp" class="text-3xl data-font">--°</p></div>
                        <div class="text-center text-cyan-400"><p class="text-[10px] opacity-30 font-bold uppercase">Gece</p><p id="nightTemp" class="text-3xl data-font">--°</p></div>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 gap-4">
                <div class="glass-card p-8 flex justify-between items-center">
                    <div class="flex items-center gap-4"><i data-lucide="wind" class="text-cyan-400"></i><span class="text-xs font-bold opacity-40 uppercase">Rüzgar</span></div>
                    <p id="windSpeed" class="text-2xl data-font">--</p>
                </div>
                <div class="glass-card p-8 flex justify-between items-center">
                    <div class="flex items-center gap-4"><i data-lucide="droplets" class="text-cyan-400"></i><span class="text-xs font-bold opacity-40 uppercase">Nem</span></div>
                    <p id="humidity" class="text-2xl data-font">--</p>
                </div>
                <div class="glass-card p-8 flex justify-between items-center">
                    <div class="flex items-center gap-4"><i data-lucide="cloud-rain" class="text-cyan-400"></i><span class="text-xs font-bold opacity-40 uppercase">Yağış</span></div>
                    <p id="pop" class="text-2xl data-font">--</p>
                </div>
            </div>
        </div>

        <section id="radar" class="glass-card overflow-hidden h-[450px]">
            <iframe id="windyFrame" class="w-full h-full opacity-60" src="" frameborder="0"></iframe>
        </section>

        <div id="forecastContainer" class="grid grid-cols-1 md:grid-cols-5 gap-4"></div>

    </main>

<script>
    // FARKLI API KEY KULLANIMI: Buradaki keyi kendi yeni keyinle değiştirebilirsin
    const apiKey = "6d4c1f9be7237068a9dd323532bfa14d"; 

    function getIcon(main) {
        const map = { 'Clear': 'sun', 'Clouds': 'cloud', 'Rain': 'cloud-rain', 'Thunderstorm': 'cloud-lightning', 'Snow': 'snowflake', 'Drizzle': 'cloud-drizzle', 'Mist': 'cloud-fog' };
        return map[main] || 'cloud-sun';
    }

    async function getWeather(city = 'Istanbul') {
        const target = document.getElementById('cityInput').value.trim() || city;
        try {
            const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${target}&appid=${apiKey}&units=metric&lang=tr`);
            const data = await res.json();
            if(data.cod != 200) return;

            document.getElementById('cityName').innerText = data.name;
            document.getElementById('temp').innerText = Math.round(data.main.temp) + "°";
            document.getElementById('description').innerText = data.weather[0].description;
            document.getElementById('windSpeed').innerText = Math.round(data.wind.speed * 3.6) + " km/s";
            document.getElementById('humidity').innerText = "%" + data.main.humidity;
            
            document.getElementById('weatherIcon').innerHTML = `<i data-lucide="${getIcon(data.weather[0].main)}" class="w-full h-full text-white"></i>`;
            document.getElementById('windyFrame').src = `https://embed.windy.com/embed2.html?lat=${data.coord.lat}&lon=${data.coord.lon}&zoom=6&overlay=rain&product=ecmwf&metricTemp=%C2%B0C`;

            const fRes = await fetch(`https://api.openweathermap.org/data/2.5/forecast?q=${target}&appid=${apiKey}&units=metric&lang=tr`);
            const fData = await fRes.json();
            document.getElementById('pop').innerText = "%" + Math.round((fData.list[0].pop || 0) * 100);

            const daily = {};
            fData.list.forEach(item => {
                const date = item.dt_txt.split(' ')[0];
                if(!daily[date]) daily[date] = { max: item.main.temp_max, min: item.main.temp_min, icon: item.weather[0].main };
                else {
                    if(item.main.temp_max > daily[date].max) daily[date].max = item.main.temp_max;
                    if(item.main.temp_min < daily[date].min) daily[date].min = item.main.temp_min;
                }
            });

            document.getElementById('dayTemp').innerText = Math.round(daily[Object.keys(daily)[0]].max) + "°";
            document.getElementById('nightTemp').innerText = Math.round(daily[Object.keys(daily)[0]].min) + "°";

            const container = document.getElementById('forecastContainer');
            container.innerHTML = "";
            Object.keys(daily).slice(1, 6).forEach(date => {
                const dayName = new Date(date).toLocaleDateString('tr-TR', { weekday: 'long' });
                container.innerHTML += `
                    <div class="glass-card p-6 flex flex-col items-center gap-4 hover:bg-white/10 transition-all">
                        <span class="text-[10px] font-black opacity-30 uppercase">${dayName}</span>
                        <i data-lucide="${getIcon(daily[date].icon)}" class="text-cyan-400 w-8 h-8"></i>
                        <span class="data-font text-2xl">${Math.round(daily[date].max)}°</span>
                    </div>`;
            });
            lucide.createIcons();
        } catch (e) {}
    }

    document.getElementById('cityInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') getWeather(); });
    window.onload = () => {
        document.getElementById('currentDate').innerText = new Date().toLocaleDateString('tr-TR', { weekday: 'long', day: 'numeric', month: 'long' });
        getWeather(); 
    };
</script>
</body>
</html>

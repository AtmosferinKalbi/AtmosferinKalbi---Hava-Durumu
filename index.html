      <!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AtmosferinKalbi | V2.2 PRESTIGE</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        :root { 
            --bg-gradient: linear-gradient(180deg, #1e1b4b 0%, #0f172a 60%, #020617 100%); 
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg-gradient);
            background-attachment: fixed;
            min-height: 100vh; color: white; margin: 0;
            transition: background 1s ease;
        }

        .data-font { font-weight: 900; letter-spacing: -0.05em; line-height: 1; }
        
        .glass-card { 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(30px); 
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 2.5rem; 
        }

        /* Üst Panel Bilgi Çubukları */
        .info-pill {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 8px 20px;
            border-radius: 1rem;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            font-weight: 700;
        }

        .city-title { 
            font-size: 4.5rem;
            line-height: 1;
            background: linear-gradient(to bottom, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .search-container {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 1.5rem;
            padding: 6px;
            display: flex;
            align-items: center;
        }

        .modern-input {
            background: transparent; border: none; outline: none; color: white;
            padding: 0 1.5rem; width: 100%; font-weight: 600; font-size: 1.1rem;
        }

        .modern-btn {
            background: linear-gradient(135deg, #06b6d4 0%, #0891b2 100%);
            color: white; padding: 12px 24px; border-radius: 1.2rem;
            font-weight: 800; text-transform: uppercase; font-size: 12px;
        }

        @media (max-width: 768px) {
            .city-title { font-size: 3rem !important; }
            .top-stats { flex-direction: column; align-items: flex-start !important; }
            .main-temp { font-size: 7rem !important; }
        }

        .hide-scroll::-webkit-scrollbar { display: none; }
    </style>
</head>
<body id="mainBody">

    <nav class="w-full px-8 py-6 flex flex-wrap items-center justify-between border-b border-white/5">
        <div class="flex items-center gap-3">
            <i data-lucide="cloud-lightning" class="text-yellow-400 w-8 h-8"></i>
            <span class="font-black text-2xl tracking-tighter uppercase italic">Atmosferin<span class="text-cyan-400">Kalbi</span></span>
        </div>
        <div class="flex gap-4 top-stats mt-4 md:mt-0">
            <div class="info-pill">
                <i data-lucide="sun" class="w-4 h-4 text-orange-400"></i>
                <span>UV: <span id="uvIndex" class="text-orange-400">--</span></span>
            </div>
            <div class="info-pill">
                <i data-lucide="wind" class="w-4 h-4 text-green-400"></i>
                <span>AQI: <span id="aqiValue" class="text-green-400">--</span></span>
            </div>
        </div>
    </nav>

    <main class="max-w-[1400px] mx-auto p-6 md:p-10 space-y-12">
        
        <header class="flex flex-col lg:flex-row justify-between items-center gap-8 border-b border-white/5 pb-10">
            <div class="text-center lg:text-left">
                <h1 id="cityName" class="city-title font-black uppercase tracking-tighter mb-2">---</h1>
                <p id="currentDate" class="text-cyan-400/50 font-black text-lg uppercase tracking-[0.4em]"></p>
            </div>
            
            <div class="w-full max-w-[500px]">
                <div class="search-container shadow-2xl">
                    <i data-lucide="search" class="text-white/30 ml-4 w-5 h-5"></i>
                    <input id="cityInput" type="text" placeholder="Şehir Ara..." class="modern-input">
                    <button onclick="getWeather()" class="modern-btn">Sorgula</button>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 xl:grid-cols-3 gap-8">
            <div class="xl:col-span-2 space-y-8">
                <div class="glass-card p-10 md:p-16 min-h-[450px] relative overflow-hidden flex flex-col justify-between">
                    <div id="bgIcon" class="absolute -right-20 -bottom-20 opacity-[0.03] scale-[6] pointer-events-none"></div>
                    <div class="relative z-10 flex items-center gap-8 md:gap-16">
                        <span id="temp" class="main-temp text-[8.5rem] md:text-[13rem] data-font text-white drop-shadow-2xl">--°</span>
                        <div id="weatherIcon" class="w-28 h-28 md:w-56 md:h-56"></div>
                    </div>
                    <div class="relative z-10">
                        <p id="description" class="text-3xl md:text-6xl text-cyan-100 font-light capitalize italic mb-8">---</p>
                        <div class="flex gap-8 border-t border-white/10 pt-8">
                            <div class="bg-white/5 px-6 py-4 rounded-3xl border border-white/5">
                                <p class="text-[10px] font-black opacity-40 uppercase mb-1">Gündüz</p>
                                <p id="dayTemp" class="text-3xl md:text-5xl data-font text-white">--°</p>
                            </div>
                            <div class="bg-blue-500/5 px-6 py-4 rounded-3xl border border-blue-500/10">
                                <p class="text-[10px] font-black opacity-40 uppercase mb-1 text-blue-300">Gece</p>
                                <p id="nightTemp" class="text-3xl md:text-5xl data-font text-blue-300">--°</p>
                            </div>
                        </div>
                    </div>
                </div>
                <div id="hourlyContainer" class="flex gap-4 overflow-x-auto hide-scroll pb-2"></div>
            </div>

            <div class="flex flex-col gap-6">
                <div class="glass-card p-8 bg-cyan-500/5 border-cyan-500/10">
                    <div class="flex items-center gap-3 mb-4"><i data-lucide="sparkles" class="w-5 h-5 text-cyan-400"></i><span class="text-[11px] font-black uppercase tracking-widest text-cyan-400">AI Analizi</span></div>
                    <p id="aiSuggestion" class="text-lg font-bold text-white/90 leading-relaxed italic">Veriler işleniyor...</p>
                </div>
                <div class="glass-card p-8"><div id="sunriseTime" class="text-2xl data-font">--:--</div><div class="h-1 bg-white/10 rounded-full my-4 overflow-hidden"><div id="sunProgress" class="h-full bg-orange-500" style="width: 0%"></div></div><div id="sunsetTime" class="text-2xl data-font text-right">--:--</div></div>
                <div class="glass-card p-7 flex justify-between items-center"><span class="text-[11px] font-black opacity-40 uppercase">Rüzgar</span><p id="windSpeed" class="text-3xl data-font">--</p></div>
                <div class="glass-card p-7 flex justify-between items-center"><span class="text-[11px] font-black opacity-40 uppercase">Nem</span><p id="humidity" class="text-3xl data-font">--</p></div>
            </div>
        </div>

        <section class="grid grid-cols-1 xl:grid-cols-2 gap-10 pt-10 border-t border-white/5">
            <div id="radar-container"><iframe id="windyFrame" class="w-full h-full" src="" frameborder="0"></iframe></div>
            <div id="forecastContainer" class="flex flex-col gap-4"></div>
        </section>
    </main>

<script>
    const apiKey = "6d4c1f9be7237068a9dd323532bfa14d"; 

    function getIcon(main) {
        const map = { 'Clear': 'sun', 'Clouds': 'cloud', 'Rain': 'cloud-rain', 'Thunderstorm': 'cloud-lightning', 'Snow': 'snowflake', 'Drizzle': 'cloud-drizzle', 'Mist': 'cloud-fog' };
        return map[main] || 'cloud-sun';
    }

    const formatTime = (unix, timezone) => {
        const date = new Date((unix + timezone) * 1000);
        return date.getUTCHours().toString().padStart(2, '0') + ":" + date.getUTCMinutes().toString().padStart(2, '0');
    };

    async function getWeather(city = 'Istanbul') {
        const target = document.getElementById('cityInput').value.trim() || city;
        try {
            // Mevcut Hava Durumu
            const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${target}&appid=${apiKey}&units=metric&lang=tr`);
            const data = await res.json();
            
            // Hava Kalitesi (AQI) - Enlem ve Boylam kullanılarak ayrı bir istek
            const airRes = await fetch(`https://api.openweathermap.org/data/2.5/air_pollution?lat=${data.coord.lat}&lon=${data.coord.lon}&appid=${apiKey}`);
            const airData = await airRes.json();
            const aqi = airData.list[0].main.aqi;
            const aqiText = ["İyi", "Orta", "Hassas", "Kötü", "Çok Kötü"][aqi-1];
            document.getElementById('aqiValue').innerText = aqiText;

            // UV İndeksi (Tahmin verisinden veya sabit - OpenWeather UV verisi OneCall API gerektirir, burada simüle ediyoruz)
            document.getElementById('uvIndex').innerText = Math.floor(Math.random() * 11); // Örnek veri

            document.getElementById('cityName').innerText = data.name;
            document.getElementById('temp').innerText = Math.round(data.main.temp) + "°";
            document.getElementById('description').innerText = data.weather[0].description;
            document.getElementById('windSpeed').innerText = Math.round(data.wind.speed * 3.6) + " km/s";
            document.getElementById('humidity').innerText = "%" + data.main.humidity;
            
            document.getElementById('sunriseTime').innerText = "Doğuş: " + formatTime(data.sys.sunrise, data.timezone);
            document.getElementById('sunsetTime').innerText = "Batış: " + formatTime(data.sys.sunset, data.timezone);
            
            // 5 Günlük ve Diğerleri (Aynı mantık devam)
            const fRes = await fetch(`https://api.openweathermap.org/data/2.5/forecast?q=${target}&appid=${apiKey}&units=metric&lang=tr`);
            const fData = await fRes.json();

            // Saatlik & Tahmin render... (Kodun geri kalanı V2.1 ile aynı)
            renderForecast(fData, data.timezone);
            
            lucide.createIcons();
            document.getElementById('windyFrame').src = `https://embed.windy.com/embed2.html?lat=${data.coord.lat}&lon=${data.coord.lon}&zoom=6&overlay=rain&product=ecmwf&metricTemp=%C2%B0C`;
        } catch (e) { console.error(e); }
    }

    function renderForecast(fData, timezone) {
        const hCont = document.getElementById('hourlyContainer');
        hCont.innerHTML = "";
        fData.list.slice(0, 10).forEach(item => {
            hCont.innerHTML += `<div class="glass-card min-w-[100px] p-5 flex flex-col items-center gap-3 border-white/5"><span class="text-[10px] font-black opacity-30">${formatTime(item.dt, timezone)}</span><i data-lucide="${getIcon(item.weather[0].main)}" class="w-7 h-7 text-cyan-400"></i><span class="data-font text-xl">${Math.round(item.main.temp)}°</span></div>`;
        });

        const daily = {};
        fData.list.forEach(item => {
            const date = item.dt_txt.split(' ')[0];
            if (!daily[date]) daily[date] = { max: item.main.temp_max, min: item.main.temp_min, icon: item.weather[0].main, desc: item.weather[0].description };
            else {
                if (item.main.temp_max > daily[date].max) daily[date].max = item.main.temp_max;
                if (item.main.temp_min < daily[date].min) daily[date].min = item.main.temp_min;
            }
        });

        const fCont = document.getElementById('forecastContainer');
        fCont.innerHTML = "";
        Object.keys(daily).slice(1, 6).forEach(date => {
            const dayName = new Date(date).toLocaleDateString('tr-TR', { weekday: 'long' });
            fCont.innerHTML += `<div class="glass-card p-6 flex items-center justify-between"><span class="text-xl font-black text-cyan-400 uppercase w-1/4">${dayName}</span><div class="flex items-center justify-center gap-4 w-2/4"><i data-lucide="${getIcon(daily[date].icon)}" class="w-7 h-7"></i><span class="text-sm opacity-50">${daily[date].desc}</span></div><div class="w-1/4 text-right"><span class="data-font text-3xl">${Math.round(daily[date].max)}°</span></div></div>`;
        });
    }

    window.onload = () => {
        document.getElementById('currentDate').innerText = new Date().toLocaleDateString('tr-TR', { weekday: 'long', day: 'numeric', month: 'long' });
        getWeather(); 
    };
</script>
</body>
</html>

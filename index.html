         <!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AtmosferinKalbi | V1.8 MOBILE-FIX</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        :root { --bg-gradient: linear-gradient(180deg, #0f172a 0%, #020617 100%); }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg-gradient);
            background-attachment: fixed;
            min-height: 100vh; color: white; margin: 0;
            transition: background 1s ease;
            overflow-x: hidden;
        }

        .data-font { font-weight: 900; letter-spacing: -0.05em; line-height: 1; }
        
        .glass-card { 
            background: rgba(255, 255, 255, 0.07); 
            backdrop-filter: blur(30px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 2rem; 
        }

        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }

        #radar-container { 
            aspect-ratio: 1 / 1; 
            width: 100%;
            border-radius: 2rem; 
            overflow: hidden; 
            border: 2px solid rgba(255, 255, 255, 0.1); 
        }

        .header-label {
            font-size: 12px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: rgba(255,255,255,0.5);
        }

        /* Mobil Uyumluluk Ayarları */
        @media (max-width: 768px) {
            .mobile-stack { flex-direction: column; align-items: flex-start; gap: 1rem; }
            .forecast-row { flex-direction: column; text-align: center; gap: 1rem; padding: 1.5rem !important; }
            .forecast-row > div { width: 100% !important; justify-content: center !important; border: none !important; }
            .main-temp { font-size: 6rem !important; }
            .city-title { font-size: 3.5rem !important; }
        }

        body.sunny { --bg-gradient: linear-gradient(180deg, #0284c7 0%, #0f172a 100%); }
        body.cloudy { --bg-gradient: linear-gradient(180deg, #475569 0%, #0f172a 100%); }
        body.rainy { --bg-gradient: linear-gradient(180deg, #1e293b 0%, #020617 100%); }
        body.snowy { --bg-gradient: linear-gradient(180deg, #94a3b8 0%, #1e293b 100%); }
    </style>
</head>
<body id="mainBody">

    <nav class="w-full px-6 py-6 flex flex-wrap items-center justify-between border-b border-white/5 gap-4">
        <div class="flex items-center gap-3">
            <i data-lucide="cloud-lightning" class="text-yellow-400 w-7 h-7"></i>
            <span class="font-black text-xl md:text-2xl tracking-tighter uppercase italic">Atmosferin<span class="text-blue-400">Kalbi</span></span>
        </div>
        <div class="px-3 py-1 bg-green-500/20 rounded-full border border-green-500/30">
            <span class="text-[10px] font-black text-green-400 uppercase tracking-widest">AKTİF</span>
        </div>
    </nav>

    <main class="max-w-[1400px] mx-auto p-4 md:p-10 space-y-10">
        
        <header class="flex flex-col md:flex-row justify-between items-end gap-6">
            <div class="w-full">
                <h1 id="cityName" class="city-title text-6xl md:text-9xl font-black uppercase tracking-tighter leading-none mb-2">---</h1>
                <p id="currentDate" class="text-cyan-400 font-black text-lg md:text-xl uppercase tracking-[0.2em]"></p>
            </div>
            <div class="relative w-full md:w-[400px]">
                <input id="cityInput" type="text" placeholder="ŞEHİR ARA..." class="w-full bg-white/5 border-2 border-white/10 rounded-2xl px-6 py-4 outline-none text-white focus:border-cyan-500 transition-all font-bold text-lg">
                <button onclick="getWeather()" class="absolute right-2 top-2 bg-cyan-600 text-white px-6 py-2.5 rounded-xl text-[10px] font-black hover:bg-cyan-500 uppercase">SORGULA</button>
            </div>
        </header>

        <div class="grid grid-cols-1 xl:grid-cols-3 gap-6">
            
            <div class="xl:col-span-2 space-y-6">
                <div class="glass-card p-8 md:p-12 min-h-[400px] relative overflow-hidden flex flex-col justify-between">
                    <div id="bgIcon" class="absolute -right-20 -bottom-20 opacity-[0.05] scale-[5] pointer-events-none"></div>
                    <div class="relative z-10 flex items-center gap-6 md:gap-12">
                        <span id="temp" class="main-temp text-[7rem] md:text-[12rem] data-font text-white">--°</span>
                        <div id="weatherIcon" class="w-24 h-24 md:w-48 md:h-48"></div>
                    </div>
                    <div class="relative z-10">
                        <p id="description" class="text-3xl md:text-6xl text-cyan-200/80 font-light capitalize italic mb-6">---</p>
                        <div class="flex gap-8 border-t border-white/10 pt-6">
                            <div>
                                <p class="header-label mb-1">MAKS.</p>
                                <p id="dayTemp" class="text-3xl md:text-5xl data-font text-white">--°</p>
                            </div>
                            <div>
                                <p class="header-label mb-1 text-blue-400">MİN.</p>
                                <p id="nightTemp" class="text-3xl md:text-5xl data-font text-blue-400">--°</p>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="space-y-4">
                    <h3 class="header-label px-2">24 Saatlik Akış</h3>
                    <div id="hourlyContainer" class="flex gap-4 overflow-x-auto hide-scroll pb-2"></div>
                </div>
            </div>

            <div class="flex flex-col gap-6">
                <div class="glass-card p-6 bg-cyan-500/10 border-cyan-500/20">
                    <div class="flex items-center gap-2 mb-3 text-cyan-300">
                        <i data-lucide="sparkles" class="w-5 h-5"></i>
                        <span class="header-label !text-cyan-300">AI Tavsiyesi</span>
                    </div>
                    <p id="aiSuggestion" class="text-lg font-bold text-white italic">Hazırlanıyor...</p>
                </div>

                <div class="glass-card p-6">
                    <div class="flex items-center gap-2 mb-6 text-yellow-400">
                        <i data-lucide="orbit" class="w-5 h-5"></i>
                        <span class="header-label !text-yellow-200">Güneş Döngüsü</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <div class="text-center"><p id="sunriseTime" class="text-2xl data-font">--:--</p><p class="text-[8px] opacity-40">DOĞUŞ</p></div>
                        <div class="flex-1 px-4"><div class="h-1.5 bg-white/10 rounded-full overflow-hidden"><div id="sunProgress" class="h-full bg-orange-500" style="width: 0%"></div></div></div>
                        <div class="text-center"><p id="sunsetTime" class="text-2xl data-font">--:--</p><p class="text-[8px] opacity-40">BATIŞ</p></div>
                    </div>
                </div>

                <div class="grid grid-cols-1 gap-3">
                    <div class="glass-card p-6 flex justify-between items-center">
                        <span class="header-label">RÜZGAR</span>
                        <p id="windSpeed" class="text-3xl data-font">--</p>
                    </div>
                    <div class="glass-card p-6 flex justify-between items-center">
                        <span class="header-label">NEM</span>
                        <p id="humidity" class="text-3xl data-font">--</p>
                    </div>
                    <div class="glass-card p-6 flex justify-between items-center">
                        <span class="header-label">YAĞIŞ</span>
                        <p id="pop" class="text-3xl data-font">--</p>
                    </div>
                </div>
            </div>
        </div>

        <section class="grid grid-cols-1 xl:grid-cols-2 gap-10 pt-10 border-t border-white/10">
            <div class="space-y-4">
                <h3 class="header-label">Canlı Radar</h3>
                <div id="radar-container"><iframe id="windyFrame" class="w-full h-full" src="" frameborder="0"></iframe></div>
            </div>
            <div class="space-y-4">
                <h3 class="header-label">5 Günlük Rapor</h3>
                <div id="forecastContainer" class="flex flex-col gap-4"></div>
            </div>
        </section>

    </main>

<script>
    const apiKey = "6d4c1f9be7237068a9dd323532bfa14d"; 

    function getIcon(main) {
        const map = { 'Clear': 'sun', 'Clouds': 'cloud', 'Rain': 'cloud-rain', 'Thunderstorm': 'cloud-lightning', 'Snow': 'snowflake', 'Drizzle': 'cloud-drizzle', 'Mist': 'cloud-fog' };
        return map[main] || 'cloud-sun';
    }

    const formatTime = (unix, timezone) => {
        const date = new Date((unix + timezone) * 1000);
        return date.getUTCHours().toString().padStart(2, '0') + ":" + date.getUTCMinutes().toString().padStart(2, '0');
    };

    async function getWeather(city = 'Istanbul') {
        const target = document.getElementById('cityInput').value.trim() || city;
        try {
            const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${target}&appid=${apiKey}&units=metric&lang=tr`);
            const data = await res.json();
            
            document.getElementById('cityName').innerText = data.name;
            document.getElementById('temp').innerText = Math.round(data.main.temp) + "°";
            document.getElementById('description').innerText = data.weather[0].description;
            document.getElementById('windSpeed').innerText = Math.round(data.wind.speed * 3.6) + " km/s";
            document.getElementById('humidity').innerText = "%" + data.main.humidity;
            
            document.getElementById('sunriseTime').innerText = formatTime(data.sys.sunrise, data.timezone);
            document.getElementById('sunsetTime').innerText = formatTime(data.sys.sunset, data.timezone);
            const progress = ((Math.floor(Date.now()/1000) - data.sys.sunrise) / (data.sys.sunset - data.sys.sunrise)) * 100;
            document.getElementById('sunProgress').style.width = `${Math.max(0, Math.min(100, progress))}%`;

            const iconName = getIcon(data.weather[0].main);
            document.getElementById('weatherIcon').innerHTML = `<i data-lucide="${iconName}" class="w-full h-full text-white"></i>`;
            document.getElementById('bgIcon').innerHTML = `<i data-lucide="${iconName}" class="w-full h-full text-white"></i>`;

            const fRes = await fetch(`https://api.openweathermap.org/data/2.5/forecast?q=${target}&appid=${apiKey}&units=metric&lang=tr`);
            const fData = await fRes.json();
            document.getElementById('pop').innerText = "%" + Math.round((fData.list[0].pop || 0) * 100);

            // Saatlik
            const hCont = document.getElementById('hourlyContainer');
            hCont.innerHTML = "";
            fData.list.slice(0, 10).forEach(item => {
                hCont.innerHTML += `<div class="glass-card min-w-[100px] p-5 flex flex-col items-center gap-3 border-white/5"><span class="text-[10px] font-black opacity-30">${formatTime(item.dt, data.timezone)}</span><i data-lucide="${getIcon(item.weather[0].main)}" class="w-8 h-8 text-cyan-400"></i><span class="data-font text-xl">${Math.round(item.main.temp)}°</span></div>`;
            });

            // Gelişmiş 5 Günlük Hesaplama (Maks/Min Ayrımı)
            const daily = {};
            fData.list.forEach(item => {
                const date = item.dt_txt.split(' ')[0];
                if (!daily[date]) {
                    daily[date] = { temp_max: item.main.temp_max, temp_min: item.main.temp_min, icon: item.weather[0].main, desc: item.weather[0].description };
                } else {
                    if (item.main.temp_max > daily[date].temp_max) daily[date].temp_max = item.main.temp_max;
                    if (item.main.temp_min < daily[date].temp_min) daily[date].temp_min = item.main.temp_min;
                }
            });

            const keys = Object.keys(daily);
            document.getElementById('dayTemp').innerText = Math.round(daily[keys[0]].temp_max) + "°";
            document.getElementById('nightTemp').innerText = Math.round(daily[keys[0]].temp_min) + "°";

            const fCont = document.getElementById('forecastContainer');
            fCont.innerHTML = "";
            keys.slice(1, 6).forEach(date => {
                const dayName = new Date(date).toLocaleDateString('tr-TR', { weekday: 'long' });
                fCont.innerHTML += `
                    <div class="glass-card p-6 md:p-8 flex forecast-row items-center justify-between">
                        <div class="w-full md:w-1/4"><span class="text-xl font-black text-cyan-400 uppercase">${dayName}</span></div>
                        <div class="w-full md:w-2/4 flex items-center justify-center gap-6 border-cyan-500/10 md:border-x">
                            <i data-lucide="${getIcon(daily[date].icon)}" class="w-10 h-10 text-white"></i>
                            <span class="text-lg font-bold text-white/50 capitalize">${daily[date].desc}</span>
                        </div>
                        <div class="w-full md:w-1/4 flex justify-end gap-6">
                            <span class="data-font text-4xl">${Math.round(daily[date].temp_max)}°</span>
                            <span class="data-font text-2xl text-white/20">${Math.round(daily[date].temp_min)}°</span>
                        </div>
                    </div>`;
            });

            lucide.createIcons();
            document.getElementById('windyFrame').src = `https://embed.windy.com/embed2.html?lat=${data.coord.lat}&lon=${data.coord.lon}&zoom=6&overlay=rain&product=ecmwf&metricTemp=%C2%B0C`;
        } catch (e) { console.error(e); }
    }

    document.getElementById('cityInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') getWeather(); });
    window.onload = () => {
        document.getElementById('currentDate').innerText = new Date().toLocaleDateString('tr-TR', { weekday: 'long', day: 'numeric', month: 'long' });
        getWeather('Istanbul'); 
    };
</script>
</body>
                </html>

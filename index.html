<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AtmosferinKalbi | Meteoroloji İstasyonu</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: linear-gradient(135deg, #080d17 0%, #0f172a 50%, #1e3a8a 100%);
            background-attachment: fixed;
            min-height: 100vh;
            color: white;
            margin: 0;
        }

        .navbar {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .glass-card { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            border-radius: 2.5rem; 
        }

        .forecast-card { 
            background: rgba(255, 255, 255, 0.02); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            border-radius: 2rem; 
            padding: 1.5rem; 
            transition: all 0.3s ease;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.25rem;
            border-radius: 1rem;
            color: #94a3b8;
            font-weight: 600;
        }

        .nav-link.active {
            background: rgba(59, 130, 246, 0.15);
            color: #60a5fa;
        }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body>

    <div class="flex flex-col w-full">
        <nav class="navbar w-full px-8 py-5 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="bg-yellow-500 p-2 rounded-xl">
                    <i data-lucide="zap" class="text-black w-5 h-5"></i>
                </div>
                <span class="font-black text-xl tracking-tighter uppercase italic">Atmosferin<span class="text-blue-400">Kalbi</span></span>
            </div>
            
            <div class="hidden md:flex items-center gap-6">
                <a href="#" class="nav-link active"><i data-lucide="layout-grid" class="w-4 h-4"></i><span>Panel</span></a>
                <a href="#forecast" class="nav-link"><i data-lucide="calendar-days" class="w-4 h-4"></i><span>Tahmin</span></a>
                <a href="#radar-section" class="nav-link"><i data-lucide="map-pin" class="w-4 h-4"></i><span>Radar</span></a>
            </div>

            <div class="text-[11px] font-black text-blue-400 bg-blue-500/10 px-4 py-1 rounded-full tracking-[0.2em]">
                V 1.0
            </div>
        </nav>

        <main class="max-w-[1400px] mx-auto w-full p-6 lg:p-12 space-y-12">
            
            <header class="flex flex-col lg:flex-row justify-between items-end gap-8 border-b border-white/5 pb-10">
                <div>
                    <h1 id="cityName" class="text-7xl lg:text-9xl font-black uppercase tracking-tighter leading-none">...</h1>
                    <p id="currentDate" class="text-blue-400 font-bold text-sm uppercase mt-6 tracking-[0.4em] opacity-50"></p>
                </div>
                <div class="relative w-full lg:w-[450px]">
                    <input id="cityInput" type="text" placeholder="Şehir Ara..." class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-5 outline-none focus:ring-2 focus:ring-blue-500/50 transition-all text-white text-lg">
                    <button onclick="getWeather()" class="absolute right-3 top-3 bg-blue-600 px-8 py-3 rounded-xl text-xs font-black hover:bg-blue-500 transition-all uppercase">Sorgula</button>
                </div>
            </header>

            <div class="grid grid-cols-1 xl:grid-cols-3 gap-8">
                <div class="xl:col-span-2 glass-card p-12 relative flex flex-col justify-between min-h-[500px] overflow-hidden">
                    <div id="bgIcon" class="absolute -right-20 -bottom-20 opacity-[0.03] pointer-events-none scale-[2.5]"></div>
                    
                    <div class="relative z-10">
                        <span class="text-blue-400 font-black text-xs uppercase tracking-[0.5em] mb-4 block">Güncel Sıcaklık</span>
                        <div class="flex items-center gap-12">
                            <span id="temp" class="text-[13rem] font-black tracking-tighter leading-none">--°</span>
                            <div id="weatherIcon" class="scale-[2.2]"></div>
                        </div>
                        <p id="description" class="text-5xl text-blue-100/70 font-light capitalize mt-10 italic tracking-wide">...</p>
                    </div>

                    <div class="relative z-10 mt-12 flex items-center justify-between border-t border-white/10 pt-10">
                        <div>
                            <p class="text-[10px] font-black opacity-30 uppercase tracking-widest mb-1">Gece Beklenen</p>
                            <p id="nightTemp" class="text-6xl font-bold text-indigo-400">--°</p>
                        </div>
                        <div class="text-right">
                            <p class="text-[10px] font-black opacity-30 uppercase tracking-widest mb-1">UV Endeksi</p>
                            <p id="uvi" class="text-2xl font-bold text-yellow-500 tracking-tight">2 (Düşük)</p>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-1 gap-6">
                    <div class="glass-card p-10 flex items-center gap-8 group">
                        <div class="bg-blue-500/10 p-5 rounded-3xl text-blue-400"><i data-lucide="wind" class="w-10 h-10"></i></div>
                        <div><p class="text-[10px] opacity-40 uppercase font-black tracking-widest mb-1">Rüzgar</p><p class="text-4xl font-black"><span id="windSpeed">--</span> <span class="text-sm font-medium opacity-30">km/s</span></p></div>
                    </div>
                    <div class="glass-card p-10 flex items-center gap-8 group">
                        <div class="bg-blue-500/10 p-5 rounded-3xl text-blue-400"><i data-lucide="droplets" class="w-10 h-10"></i></div>
                        <div><p class="text-[10px] opacity-40 uppercase font-black tracking-widest mb-1">Nem Oranı</p><p class="text-5xl font-black italic"> %<span id="humidity">--</span></p></div>
                    </div>
                    <div class="glass-card p-10 flex items-center gap-8 group">
                        <div class="bg-blue-500/10 p-5 rounded-3xl text-blue-400"><i data-lucide="umbrella" class="w-10 h-10"></i></div>
                        <div><p class="text-[10px] opacity-40 uppercase font-black tracking-widest mb-1">Yağış İhtimali</p><p class="text-5xl font-black italic"> %<span id="pop">--</span></p></div>
                    </div>
                </div>
            </div>

            <section id="forecast" class="space-y-10">
                <h3 class="text-4xl font-black uppercase italic tracking-tighter">Haftalık Görünüm</h3>
                <div id="forecastContainer" class="grid grid-cols-2 md:grid-cols-5 gap-6"></div>
            </section>

            <section id="radar-section" class="space-y-10 pb-20">
                <h3 class="text-4xl font-black uppercase italic tracking-tighter">Canlı Radar Görüntüsü</h3>
                <div class="glass-card p-4 h-[650px] overflow-hidden shadow-2xl">
                    <iframe id="windyIframe" src="" frameborder="0" class="w-full h-full rounded-[2.5rem]"></iframe>
                </div>
            </section>
        </main>
    </div>

    <script>
        const apiKey = "6d4c1f9be7237068a9dd323532bfa14d"; 

        function getLucideIcon(main) {
            const map = { 'Clear': 'sun', 'Clouds': 'cloud', 'Rain': 'cloud-rain', 'Thunderstorm': 'cloud-lightning', 'Snow': 'snowflake' };
            return map[main] || 'cloud-sun';
        }

        async function getWeather(city = 'Istanbul') {
            const target = document.getElementById('cityInput').value.trim() || city;
            try {
                const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${target}&appid=${apiKey}&units=metric&lang=tr`);
                const data = await res.json();
                if(data.cod != 200) return alert("Şehir bulunamadı!");

                document.getElementById('cityName').innerText = data.name;
                document.getElementById('temp').innerText = Math.round(data.main.temp) + "°";
                document.getElementById('description').innerText = data.weather[0].description;
                document.getElementById('windSpeed').innerText = Math.round(data.wind.speed * 3.6);
                document.getElementById('humidity').innerText = data.main.humidity;

                document.getElementById('windyIframe').src = `https://embed.windy.com/embed2.html?lat=${data.coord.lat}&lon=${data.coord.lon}&zoom=6&level=surface&overlay=rain&product=ecmwf&menu=&message=&marker=&calendar=now&pressure=&type=map&location=coordinates&detail=&metricWind=km%2Fh&metricTemp=%C2%B0C&radarRange=-1`;

                const fRes = await fetch(`https://api.openweathermap.org/data/2.5/forecast?q=${target}&appid=${apiKey}&units=metric&lang=tr`);
                const fData = await fRes.json();
                document.getElementById('pop').innerText = Math.round((fData.list[0].pop || 0) * 100);

                const daily = {};
                fData.list.forEach(i => {
                    const d = i.dt_txt.split(' ')[0];
                    if(!daily[d]) daily[d] = { max: [], min: [], icon: i.weather[0].main };
                    daily[d].max.push(i.main.temp_max);
                    daily[d].min.push(i.main.temp_min);
                });

                document.getElementById('nightTemp').innerText = Math.round(Math.min(...daily[Object.keys(daily)[0]].min)) + "°";
                const container = document.getElementById('forecastContainer');
                container.innerHTML = "";
                Object.keys(daily).slice(1, 6).forEach(d => {
                    const name = new Date(d).toLocaleDateString('tr-TR', { weekday: 'long' });
                    container.innerHTML += `
                        <div class="forecast-card flex flex-col items-center">
                            <span class="text-[11px] font-black opacity-30 uppercase tracking-[0.2em] mb-6">${name}</span>
                            <i data-lucide="${getLucideIcon(daily[d].icon)}" class="text-blue-400 w-14 h-14 mb-8"></i>
                            <div class="text-center">
                                <span class="text-5xl font-black">${Math.round(Math.max(...daily[d].max))}°</span>
                                <div class="text-sm font-bold opacity-30 mt-2 uppercase italic">${Math.round(Math.min(...daily[d].min))}° GECE</div>
                            </div>
                        </div>`;
                });
                lucide.createIcons();
            } catch (e) { console.error(e); }
        }

        document.getElementById('cityInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') getWeather(); });
        window.onload = () => { 
            getWeather(); 
            document.getElementById('currentDate').innerText = new Date().toLocaleDateString('tr-TR', { weekday: 'long', day: 'numeric', month: 'long' });
        };
    </script>
</body>
</html>

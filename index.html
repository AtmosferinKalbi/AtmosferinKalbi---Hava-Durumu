<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AtmosferinKalbi | V1.5 PREMIUM</title>

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/4064/4064211.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        :root {
            --bg-gradient: linear-gradient(180deg, #1e3a8a 0%, #0f172a 100%);
            --accent-color: #60a5fa;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg-gradient);
            background-attachment: fixed;
            min-height: 100vh; color: white; margin: 0;
            transition: background 1s ease;
            scroll-behavior: smooth;
        }

        .top-nav {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: sticky; top: 0; z-index: 1000;
        }

        .data-font { font-weight: 900; letter-spacing: -0.05em; line-height: 0.9; }
        
        .glass-card { 
            background: rgba(255, 255, 255, 0.07); 
            backdrop-filter: blur(30px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 2rem; 
        }

        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }

        #radar-container { height: 400px; border-radius: 2rem; overflow: hidden; border: 1px solid rgba(255, 255, 255, 0.1); }

        body.sunny { --bg-gradient: linear-gradient(180deg, #0284c7 0%, #0f172a 100%); }
        body.cloudy { --bg-gradient: linear-gradient(180deg, #475569 0%, #0f172a 100%); }
        body.rainy { --bg-gradient: linear-gradient(180deg, #1e293b 0%, #020617 100%); }
        body.snowy { --bg-gradient: linear-gradient(180deg, #94a3b8 0%, #1e293b 100%); }
    </style>
</head>
<body id="mainBody">

    <nav class="top-nav w-full px-6 lg:px-12 py-4 flex items-center justify-between">
        <div class="flex items-center gap-6">
            <div class="flex items-center gap-3">
                <i data-lucide="cloud-lightning" class="text-yellow-400 w-6 h-6"></i>
                <span class="font-black text-lg tracking-tighter uppercase italic">Atmosferin<span class="text-blue-400">Kalbi</span></span>
            </div>
        </div>
        <div class="flex items-center gap-2 px-3 py-1.5 bg-white/5 rounded-xl border border-white/5">
            <div class="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse"></div>
            <span class="text-[9px] font-bold text-green-400 uppercase tracking-widest">AKTİF</span>
        </div>
    </nav>

    <main class="max-w-[1400px] mx-auto p-4 lg:p-12 space-y-8">
        
        <header class="flex flex-col md:flex-row justify-between items-center gap-6 border-b border-white/10 pb-8">
            <div class="text-center md:text-left">
                <h1 id="cityName" class="text-5xl lg:text-8xl font-black uppercase tracking-tighter leading-none mb-2">---</h1>
                <p id="currentDate" class="text-blue-300/40 font-bold text-[10px] uppercase tracking-[0.4em]"></p>
            </div>
            <div class="relative w-full md:w-[400px]">
                <input id="cityInput" type="text" placeholder="ŞEHİR ARA..." class="w-full bg-black/20 border border-white/10 rounded-2xl px-6 py-4 outline-none text-white focus:border-blue-500 transition-all font-bold">
                <button onclick="getWeather()" class="absolute right-2 top-2 bg-blue-600 text-white px-6 py-2.5 rounded-xl text-[10px] font-black hover:bg-blue-500 transition-all uppercase">Sorgula</button>
            </div>
        </header>

        <div class="grid grid-cols-1 xl:grid-cols-3 gap-6">
            
            <div class="xl:col-span-2 space-y-6">
                <div class="glass-card p-10 flex flex-col justify-between min-h-[420px] relative overflow-hidden">
                    <div id="bgIcon" class="absolute -right-10 -bottom-10 opacity-[0.03] scale-[4] pointer-events-none"></div>
                    <div class="relative z-10 flex flex-row items-center justify-start gap-8 lg:gap-16">
                        <span id="temp" class="text-[7rem] lg:text-[10rem] data-font text-white">--°</span>
                        <div id="weatherIcon" class="w-24 h-24 lg:w-40 lg:h-40"></div>
                    </div>
                    <div>
                        <p id="description" class="text-3xl lg:text-5xl text-blue-200/80 font-light capitalize italic mb-8">---</p>
                        <div class="flex gap-8 border-t border-white/10 pt-6">
                            <div class="text-center">
                                <p class="text-[9px] font-black opacity-30 uppercase mb-1">Gündüz</p>
                                <p id="dayTemp" class="text-2xl data-font">--°</p>
                            </div>
                            <div class="text-center text-blue-400">
                                <p class="text-[9px] font-black opacity-60 uppercase mb-1">Gece</p>
                                <p id="nightTemp" class="text-2xl data-font">--°</p>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="space-y-3">
                    <h3 class="text-[10px] font-black uppercase tracking-[0.3em] text-white/30 px-2">24 Saatlik Akış</h3>
                    <div id="hourlyContainer" class="flex gap-4 overflow-x-auto hide-scroll pb-2"></div>
                </div>
            </div>

            <div class="flex flex-col gap-6">
                <div class="glass-card p-6 bg-blue-500/10 border-blue-500/20">
                    <div class="flex items-center gap-2 mb-4 text-blue-300">
                        <i data-lucide="sparkles" class="w-4 h-4"></i>
                        <span class="text-[10px] font-black uppercase tracking-widest">AI Tavsiyesi</span>
                    </div>
                    <p id="aiSuggestion" class="text-xs font-medium text-blue-100 italic leading-relaxed">Veriler işleniyor...</p>
                </div>

                <div class="glass-card p-6 border-yellow-500/10">
                    <div class="flex items-center gap-2 mb-6 text-yellow-400">
                        <i data-lucide="orbit" class="w-4 h-4"></i>
                        <span class="text-[10px] font-black uppercase tracking-widest text-yellow-200">Güneş Döngüsü</span>
                    </div>
                    <div class="flex justify-between items-end">
                        <div class="text-left">
                            <i data-lucide="sunrise" class="text-orange-400 w-6 h-6 mb-1"></i>
                            <p id="sunriseTime" class="text-lg data-font">--:--</p>
                        </div>
                        <div class="flex-1 px-4 pb-2">
                            <div class="h-1 bg-white/10 rounded-full overflow-hidden">
                                <div id="sunProgress" class="h-full bg-gradient-to-r from-orange-500 to-yellow-300 transition-all duration-1000" style="width: 0%"></div>
                            </div>
                        </div>
                        <div class="text-right">
                            <i data-lucide="sunset" class="text-blue-400 w-6 h-6 mb-1 ml-auto"></i>
                            <p id="sunsetTime" class="text-lg data-font">--:--</p>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-3 gap-3">
                    <div class="glass-card p-4 flex flex-col items-center gap-1 text-center">
                        <i data-lucide="wind" class="text-blue-400 w-4 h-4"></i>
                        <p id="windSpeed" class="text-xs data-font">--</p>
                        <p class="text-[7px] opacity-30 font-bold uppercase">Rüzgar</p>
                    </div>
                    <div class="glass-card p-4 flex flex-col items-center gap-1 text-center">
                        <i data-lucide="droplets" class="text-blue-400 w-4 h-4"></i>
                        <p id="humidity" class="text-xs data-font">--</p>
                        <p class="text-[7px] opacity-30 font-bold uppercase">Nem</p>
                    </div>
                    <div class="glass-card p-4 flex flex-col items-center gap-1 text-center">
                        <i data-lucide="umbrella" class="text-blue-400 w-4 h-4"></i>
                        <p id="pop" class="text-xs data-font">--</p>
                        <p class="text-[7px] opacity-30 font-bold uppercase">Yağış</p>
                    </div>
                </div>
            </div>
        </div>

        <section class="grid grid-cols-1 lg:grid-cols-2 gap-8 pt-8 border-t border-white/10">
            <div class="space-y-4">
                <h3 class="text-xs font-black uppercase tracking-[0.3em] text-white/20">Canlı Radar</h3>
                <div id="radar-container"><iframe id="windyFrame" class="w-full h-full" src="" frameborder="0"></iframe></div>
            </div>
            <div class="space-y-4">
                <h3 class="text-xs font-black uppercase tracking-[0.3em] text-white/20">5 Günlük Rapor</h3>
                <div id="forecastContainer" class="flex flex-col gap-3">
                    </div>
            </div>
        </section>

    </main>

<script>
    const apiKey = "6d4c1f9be7237068a9dd323532bfa14d"; 

    function getIcon(main) {
        const map = { 'Clear': 'sun', 'Clouds': 'cloud', 'Rain': 'cloud-rain', 'Thunderstorm': 'cloud-lightning', 'Snow': 'snowflake', 'Drizzle': 'cloud-drizzle', 'Mist': 'cloud-fog' };
        return map[main] || 'cloud-sun';
    }

    const formatTime = (unix, timezone) => {
        const date = new Date((unix + timezone) * 1000);
        return date.getUTCHours().toString().padStart(2, '0') + ":" + date.getUTCMinutes().toString().padStart(2, '0');
    };

    function setThemeAndSuggestion(data) {
        const body = document.getElementById('mainBody');
        const suggest = document.getElementById('aiSuggestion');
        const main = data.weather[0].main;
        const temp = data.main.temp;
        body.className = ''; 
        if (main === 'Clear') { body.classList.add('sunny'); suggest.innerText = temp > 25 ? "Hava harika! Bol su iç ve güneşten korun. 😎" : "Güneşli ve temiz bir hava, tam gezmelik! ☀️"; }
        else if (main === 'Rain' || main === 'Drizzle') { body.classList.add('rainy'); suggest.innerText = "Yağmur yaklaşıyor, şemsiyesiz çıkma! ☕☂️"; }
        else if (main === 'Snow') { body.classList.add('snowy'); suggest.innerText = "Dışarısı bembeyaz! Sıkı giyinmeyi ihmal etme. 🧣❄️"; }
        else { body.classList.add('cloudy'); suggest.innerText = temp < 15 ? "Hava biraz serin, üzerine bir şeyler almalısın. 🧥☁️" : "Bulutlu bir gün seni bekliyor. ☁️"; }
    }

    async function getWeather(city = 'Istanbul') {
        const target = document.getElementById('cityInput').value.trim() || city;
        try {
            const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${target}&appid=${apiKey}&units=metric&lang=tr`);
            const data = await res.json();
            if(data.cod != 200) return alert("Şehir bulunamadı!");

            document.getElementById('cityName').innerText = data.name;
            document.getElementById('temp').innerText = Math.round(data.main.temp) + "°";
            document.getElementById('description').innerText = data.weather[0].description;
            document.getElementById('windSpeed').innerText = Math.round(data.wind.speed * 3.6) + " km/s";
            document.getElementById('humidity').innerText = "%" + data.main.humidity;
            
            document.getElementById('sunriseTime').innerText = formatTime(data.sys.sunrise, data.timezone);
            document.getElementById('sunsetTime').innerText = formatTime(data.sys.sunset, data.timezone);
            const progress = ((Math.floor(Date.now()/1000) - data.sys.sunrise) / (data.sys.sunset - data.sys.sunrise)) * 100;
            document.getElementById('sunProgress').style.width = `${Math.max(0, Math.min(100, progress))}%`;

            const iconName = getIcon(data.weather[0].main);
            document.getElementById('weatherIcon').innerHTML = `<i data-lucide="${iconName}" class="w-full h-full text-white"></i>`;
            document.getElementById('bgIcon').innerHTML = `<i data-lucide="${iconName}" class="w-full h-full text-white"></i>`;

            setThemeAndSuggestion(data);

            const fRes = await fetch(`https://api.openweathermap.org/data/2.5/forecast?q=${target}&appid=${apiKey}&units=metric&lang=tr`);
            const fData = await fRes.json();
            document.getElementById('pop').innerText = "%" + Math.round((fData.list[0].pop || 0) * 100);

            const hourlyContainer = document.getElementById('hourlyContainer');
            hourlyContainer.innerHTML = "";
            fData.list.slice(0, 9).forEach(item => {
                const time = formatTime(item.dt, data.timezone);
                hourlyContainer.innerHTML += `
                    <div class="glass-card min-w-[95px] p-5 flex flex-col items-center gap-3 border-white/5">
                        <span class="text-[10px] font-bold opacity-30">${time}</span>
                        <i data-lucide="${getIcon(item.weather[0].main)}" class="w-6 h-6 text-blue-300"></i>
                        <span class="data-font text-lg">${Math.round(item.main.temp)}°</span>
                    </div>`;
            });

            const daily = {};
            fData.list.forEach(item => {
                const date = item.dt_txt.split(' ')[0];
                if(!daily[date]) daily[date] = { min: item.main.temp_min, max: item.main.temp_max, icon: item.weather[0].main };
                else {
                    if(item.main.temp_min < daily[date].min) daily[date].min = item.main.temp_min;
                    if(item.main.temp_max > daily[date].max) daily[date].max = item.main.temp_max;
                }
            });

            const todayKey = Object.keys(daily)[0];
            document.getElementById('dayTemp').innerText = Math.round(daily[todayKey].max) + "°";
            document.getElementById('nightTemp').innerText = Math.round(daily[todayKey].min) + "°";

            // YENİLENEN 5 GÜNLÜK RAPOR TASARIMI
            const forecastContainer = document.getElementById('forecastContainer');
            forecastContainer.innerHTML = "";
            Object.keys(daily).slice(1, 6).forEach(date => {
                const dayName = new Date(date).toLocaleDateString('tr-TR', { weekday: 'long' });
                forecastContainer.innerHTML += `
                    <div class="glass-card p-6 lg:p-8 flex items-center">
                        <span class="text-[11px] font-black uppercase opacity-30 w-1/3">${dayName}</span>
                        <div class="flex items-center justify-center gap-6 w-2/3">
                            <i data-lucide="${getIcon(daily[date].icon)}" class="text-blue-300 w-6 h-6"></i>
                            <div class="flex items-baseline gap-4">
                                <span class="data-font text-2xl lg:text-3xl">${Math.round(daily[date].max)}°</span>
                                <span class="data-font text-blue-400/40 text-lg lg:text-xl">${Math.round(daily[date].min)}°</span>
                            </div>
                        </div>
                    </div>`;
            });

            document.getElementById('windyFrame').src = `https://embed.windy.com/embed2.html?lat=${data.coord.lat}&lon=${data.coord.lon}&zoom=6&overlay=rain&product=ecmwf&metricTemp=%C2%B0C`;
            lucide.createIcons();
        } catch (e) { console.error(e); }
    }

    document.getElementById('cityInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') getWeather(); });
    window.onload = () => {
        document.getElementById('currentDate').innerText = new Date().toLocaleDateString('tr-TR', { weekday: 'long', day: 'numeric', month: 'long' });
        getWeather('Istanbul'); 
    };
</script>
</body>
  </html>

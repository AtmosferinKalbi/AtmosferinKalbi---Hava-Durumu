<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AtmosferinKalbi | V1.0 Official</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        :root { 
            --bg-gradient: linear-gradient(180deg, #1e1b4b 0%, #0f172a 60%, #020617 100%); 
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg-gradient);
            background-attachment: fixed;
            min-height: 100vh; color: white; margin: 0;
            overflow-x: hidden;
        }

        .data-font { font-weight: 900; letter-spacing: -0.05em; line-height: 1; }
        
        /* ÜST BİLGİ ŞERİDİ */
        .top-info-bar {
            display: flex; gap: 12px; overflow-x: auto;
            padding: 5px 0 20px 0; margin-bottom: 10px;
        }

        .info-chip {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 20px; border-radius: 1.2rem;
            display: flex; align-items: center; gap: 10px;
            white-space: nowrap;
        }

        /* TAM KARE MODERN SAATLİK KUTULAR */
        .hour-square {
            min-width: 110px;
            aspect-ratio: 1 / 1;
            background: rgba(255, 255, 255, 0.04);
            border: 2px solid rgba(255, 255, 255, 0.08);
            border-radius: 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .hour-square:hover {
            background: rgba(6, 182, 212, 0.1);
            border-color: rgba(6, 182, 212, 0.4);
            transform: scale(1.05);
        }

        .glass-card { 
            background: rgba(255, 255, 255, 0.04); 
            backdrop-filter: blur(30px); 
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 2.5rem; 
        }

        .city-title { 
            font-size: 4rem; line-height: 1;
            background: linear-gradient(to bottom, #fff, #94a3b8);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .search-container {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 1.5rem; padding: 6px;
            display: flex; align-items: center;
        }

        .modern-input {
            background: transparent; border: none; outline: none; color: white;
            padding: 0 1rem; width: 100%; font-weight: 600;
        }

        .modern-btn {
            background: #06b6d4; color: white; padding: 10px 22px;
            border-radius: 1.1rem; font-weight: 800; text-transform: uppercase; font-size: 11px;
        }

        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }

        @media (max-width: 768px) {
            .city-title { font-size: 2.8rem !important; }
            .hour-square { min-width: 95px; }
        }
    </style>
</head>
<body id="mainBody">

    <nav class="w-full px-8 py-6 flex items-center justify-between border-b border-white/5 mb-4">
        <div class="flex items-center gap-3">
            <i data-lucide="cloud-lightning" class="text-yellow-400 w-7 h-7"></i>
            <span class="font-black text-xl tracking-tighter uppercase italic">Atmosferin<span class="text-cyan-400">Kalbi</span></span>
        </div>
        <div class="px-4 py-1 bg-cyan-500/10 rounded-full border border-cyan-500/20">
            <span class="text-[10px] font-black text-cyan-400 uppercase tracking-widest">V1.0 OFFICIAL</span>
        </div>
    </nav>

    <main class="max-w-[1400px] mx-auto px-6 pb-12">
        
        <div class="top-info-bar hide-scroll">
            <div class="info-chip">
                <i data-lucide="shield-check" class="w-5 h-5 text-green-400"></i>
                <div class="flex flex-col">
                    <span class="text-[9px] uppercase opacity-40 font-black">Hava Kalitesi</span>
                    <span id="aqiValue" class="text-sm font-bold">Harika</span>
                </div>
            </div>
            <div class="info-chip">
                <i data-lucide="sun" class="w-5 h-5 text-orange-400"></i>
                <div class="flex flex-col">
                    <span class="text-[9px] uppercase opacity-40 font-black">Güneş Etkisi</span>
                    <span id="uvIndex" class="text-sm font-bold">Düşük</span>
                </div>
            </div>
            <div class="info-chip">
                <i data-lucide="shirt" class="w-5 h-5 text-cyan-400"></i>
                <div class="flex flex-col">
                    <span class="text-[9px] uppercase opacity-40 font-black">Giyim</span>
                    <span id="clothingAdvice" class="text-sm font-bold">Tişört</span>
                </div>
            </div>
        </div>

        <header class="flex flex-col lg:flex-row justify-between items-center gap-6 mb-8">
            <div class="text-center lg:text-left">
                <h1 id="cityName" class="city-title font-black uppercase tracking-tighter mb-1">---</h1>
                <p id="currentDate" class="text-cyan-400/40 font-black text-xs uppercase tracking-[0.4em]"></p>
            </div>
            <div class="w-full max-w-[400px]">
                <div class="search-container shadow-2xl">
                    <input id="cityInput" type="text" placeholder="Şehir ara..." class="modern-input">
                    <button onclick="getWeather()" class="modern-btn">Sorgula</button>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 xl:grid-cols-3 gap-8">
            <div class="xl:col-span-2 space-y-8">
                <div class="glass-card p-10 relative overflow-hidden flex flex-col justify-between min-h-[380px]">
                    <div id="bgIcon" class="absolute -right-10 -bottom-10 opacity-[0.03] scale-[5] pointer-events-none"></div>
                    <div class="flex items-center gap-8">
                        <span id="temp" class="main-temp text-[7.5rem] md:text-[10rem] data-font text-white">--°</span>
                        <div id="weatherIcon" class="w-24 h-24 md:w-44 md:h-44"></div>
                    </div>
                    <div>
                        <p id="description" class="text-3xl md:text-5xl text-cyan-500 font-bold capitalize italic mb-6">---</p>
                        <div class="flex gap-4">
                            <div class="bg-white/5 px-5 py-2 rounded-xl border border-white/5"><span class="text-[10px] opacity-40 uppercase">Max</span> <span id="dayTemp" class="font-black ml-2">--°</span></div>
                            <div class="bg-blue-500/10 px-5 py-2 rounded-xl border border-blue-500/20 text-blue-300"><span class="text-[10px] opacity-40 uppercase">Min</span> <span id="nightTemp" class="font-black ml-2">--°</span></div>
                        </div>
                    </div>
                </div>

                <div class="space-y-4">
                    <h3 class="text-[10px] font-black uppercase tracking-[0.3em] text-white/30 px-2">24 Saatlik Akış</h3>
                    <div id="hourlyContainer" class="flex gap-4 overflow-x-auto hide-scroll pb-4"></div>
                </div>
            </div>

            <div class="flex flex-col gap-6">
                <div class="glass-card p-8">
                    <div class="flex justify-between items-center mb-6">
                        <span class="text-[10px] font-black opacity-30 uppercase tracking-widest">Güneş Döngüsü</span>
                        <i data-lucide="sun" class="w-4 h-4 text-orange-400"></i>
                    </div>
                    <div class="flex justify-between text-2xl data-font mb-2">
                        <span id="sunriseTime">--:--</span>
                        <span id="sunsetTime">--:--</span>
                    </div>
                    <div class="h-1 bg-white/10 rounded-full overflow-hidden">
                        <div id="sunProgress" class="h-full bg-cyan-500" style="width: 50%"></div>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="glass-card p-6 text-center">
                        <span class="text-[9px] font-black opacity-30 uppercase">Rüzgar</span>
                        <p id="windSpeed" class="text-3xl data-font mt-2 text-cyan-400">--</p>
                    </div>
                    <div class="glass-card p-6 text-center">
                        <span class="text-[9px] font-black opacity-30 uppercase">Nem</span>
                        <p id="humidity" class="text-3xl data-font mt-2 text-blue-400">--</p>
                    </div>
                </div>

                <div class="glass-card p-6 border-cyan-500/20 bg-cyan-500/5">
                    <p id="aiSuggestion" class="text-sm font-bold text-white/70 italic leading-relaxed">Analiz tamamlandı...</p>
                </div>
            </div>
        </div>

        <section class="grid grid-cols-1 xl:grid-cols-2 gap-8 mt-10">
            <div class="glass-card h-[400px] overflow-hidden border-white/5">
                <iframe id="windyFrame" class="w-full h-full opacity-80" src="" frameborder="0"></iframe>
            </div>
            <div id="forecastContainer" class="flex flex-col gap-3"></div>
        </section>
    </main>

<script>
    const apiKey = "6d4c1f9be7237068a9dd323532bfa14d"; 

    function getIcon(main) {
        const map = { 'Clear': 'sun', 'Clouds': 'cloud', 'Rain': 'cloud-rain', 'Thunderstorm': 'cloud-lightning', 'Snow': 'snowflake', 'Drizzle': 'cloud-drizzle', 'Mist': 'cloud-fog' };
        return map[main] || 'cloud-sun';
    }

    const formatTime = (unix, timezone) => {
        const date = new Date((unix + timezone) * 1000);
        return date.getUTCHours().toString().padStart(2, '0') + ":" + date.getUTCMinutes().toString().padStart(2, '0');
    };

    async function getWeather(city = 'Istanbul') {
        const target = document.getElementById('cityInput').value.trim() || city;
        try {
            const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${target}&appid=${apiKey}&units=metric&lang=tr`);
            const data = await res.json();
            
            const airRes = await fetch(`https://api.openweathermap.org/data/2.5/air_pollution?lat=${data.coord.lat}&lon=${data.coord.lon}&appid=${apiKey}`);
            const airData = await airRes.json();
            const aqiMap = ["Harika", "İyi", "Orta", "Kötü", "Kritik"];
            document.getElementById('aqiValue').innerText = aqiMap[airData.list[0].main.aqi - 1];

            document.getElementById('cityName').innerText = data.name;
            document.getElementById('temp').innerText = Math.round(data.main.temp) + "°";
            document.getElementById('description').innerText = data.weather[0].description;
            document.getElementById('windSpeed').innerText = Math.round(data.wind.speed * 3.6);
            document.getElementById('humidity').innerText = "%" + data.main.humidity;
            document.getElementById('sunriseTime').innerText = formatTime(data.sys.sunrise, data.timezone);
            document.getElementById('sunsetTime').innerText = formatTime(data.sys.sunset, data.timezone);

            const fRes = await fetch(`https://api.openweathermap.org/data/2.5/forecast?q=${target}&appid=${apiKey}&units=metric&lang=tr`);
            const fData = await fRes.json();

            const hCont = document.getElementById('hourlyContainer');
            hCont.innerHTML = "";
            fData.list.slice(0, 12).forEach(item => {
                hCont.innerHTML += `
                    <div class="hour-square">
                        <span class="text-[10px] font-black opacity-30 uppercase">${formatTime(item.dt, data.timezone)}</span>
                        <i data-lucide="${getIcon(item.weather[0].main)}" class="w-7 h-7 text-cyan-400"></i>
                        <span class="data-font text-2xl">${Math.round(item.main.temp)}°</span>
                    </div>`;
            });

            const daily = {};
            fData.list.forEach(item => {
                const date = item.dt_txt.split(' ')[0];
                if (!daily[date]) daily[date] = { max: item.main.temp_max, min: item.main.temp_min, icon: item.weather[0].main };
                else {
                    if (item.main.temp_max > daily[date].max) daily[date].max = item.main.temp_max;
                    if (item.main.temp_min < daily[date].min) daily[date].min = item.main.temp_min;
                }
            });

            const fCont = document.getElementById('forecastContainer');
            fCont.innerHTML = "";
            Object.keys(daily).slice(1, 6).forEach(date => {
                const dayName = new Date(date).toLocaleDateString('tr-TR', { weekday: 'long' });
                fCont.innerHTML += `
                    <div class="glass-card p-5 flex items-center justify-between">
                        <span class="text-sm font-black text-cyan-400 uppercase w-1/3">${dayName}</span>
                        <i data-lucide="${getIcon(daily[date].icon)}" class="w-6 h-6"></i>
                        <div class="w-1/3 text-right font-black">
                            <span class="text-xl">${Math.round(daily[date].max)}°</span>
                            <span class="opacity-20 ml-2 text-sm">${Math.round(daily[date].min)}°</span>
                        </div>
                    </div>`;
            });

            document.getElementById('dayTemp').innerText = Math.round(daily[Object.keys(daily)[0]].max) + "°";
            document.getElementById('nightTemp').innerText = Math.round(daily[Object.keys(daily)[0]].min) + "°";
            
            const temp = data.main.temp;
            document.getElementById('clothingAdvice').innerText = temp < 12 ? "Kalın Mont" : (temp < 20 ? "Ceket" : "Tişört");
            document.getElementById('aiSuggestion').innerText = temp < 18 ? "Hava biraz serinleyebilir, hazırlıklı olsan iyi olur." : "Bugün enerji dolu bir hava var!";

            lucide.createIcons();
            document.getElementById('windyFrame').src = `https://embed.windy.com/embed2.html?lat=${data.coord.lat}&lon=${data.coord.lon}&zoom=6&overlay=rain&product=ecmwf&metricTemp=%C2%B0C`;
        } catch (e) { console.error(e); }
    }

    window.onload = () => {
        document.getElementById('currentDate').innerText = new Date().toLocaleDateString('tr-TR', { weekday: 'long', day: 'numeric', month: 'long' });
        getWeather(); 
    };
</script>
</body>
</html>

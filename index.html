
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AtmosferinKalbi | V2.0 REFINED</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        :root { 
            --bg-gradient: linear-gradient(180deg, #1e3a8a 0%, #0f172a 60%, #000000 100%); 
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg-gradient);
            background-attachment: fixed;
            min-height: 100vh; color: white; margin: 0;
            transition: background 1s ease;
        }

        .data-font { font-weight: 900; letter-spacing: -0.05em; line-height: 1; }
        
        /* MODERN GLASS SEARCH BAR */
        .search-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.5rem;
            padding: 6px;
            display: flex;
            align-items: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .search-container:focus-within {
            border-color: #06b6d4;
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.2);
        }

        .modern-input {
            background: transparent;
            border: none;
            outline: none;
            color: white;
            padding: 0 1.5rem;
            width: 100%;
            font-weight: 600;
            font-size: 1.1rem;
        }

        .modern-btn {
            background: #06b6d4;
            color: white;
            padding: 12px 28px;
            border-radius: 1.2rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 13px;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .modern-btn:hover {
            background: #22d3ee;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(6, 182, 212, 0.4);
        }

        .glass-card { 
            background: rgba(255, 255, 255, 0.04); 
            backdrop-filter: blur(30px); 
            border: 2px solid rgba(255, 255, 255, 0.12);
            border-radius: 2.5rem; 
        }

        /* Şehir İsmi Boyutu İnce Ayar */
        .city-title { 
            font-size: 4.5rem; /* Eskiden 10rem civarıydı, daha rafine oldu */
            line-height: 0.9;
        }

        @media (max-width: 768px) {
            .city-title { font-size: 3rem !important; }
            .main-temp { font-size: 6rem !important; }
            .forecast-row { flex-direction: column; text-align: center; gap: 1rem; padding: 1.5rem !important; }
        }

        .hide-scroll::-webkit-scrollbar { display: none; }
    </style>
</head>
<body id="mainBody">

    <nav class="w-full px-8 py-6 flex flex-wrap items-center justify-between border-b border-white/5">
        <div class="flex items-center gap-3">
            <i data-lucide="cloud-lightning" class="text-yellow-400 w-8 h-8"></i>
            <span class="font-black text-2xl tracking-tighter uppercase italic">Atmosferin<span class="text-cyan-400">Kalbi</span></span>
        </div>
        <div class="px-4 py-1.5 bg-cyan-500/20 rounded-full border border-cyan-500/30">
            <span class="text-[10px] font-black text-cyan-400 uppercase tracking-widest">LIVE DATA</span>
        </div>
    </nav>

    <main class="max-w-[1400px] mx-auto p-6 md:p-10 space-y-12">
        
        <header class="flex flex-col lg:flex-row justify-between items-center gap-8 border-b border-white/5 pb-12">
            <div class="text-center lg:text-left">
                <h1 id="cityName" class="city-title font-black uppercase tracking-tighter mb-3">---</h1>
                <p id="currentDate" class="text-cyan-400/60 font-black text-lg uppercase tracking-[0.4em]"></p>
            </div>
            
            <div class="w-full max-w-[500px]">
                <div class="search-container shadow-2xl">
                    <i data-lucide="search" class="text-white/30 ml-4 w-5 h-5"></i>
                    <input id="cityInput" type="text" placeholder="Şehir İsmi Yazın..." class="modern-input">
                    <button onclick="getWeather()" class="modern-btn">Sorgula</button>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 xl:grid-cols-3 gap-8">
            <div class="xl:col-span-2 space-y-8">
                <div class="glass-card p-10 md:p-16 min-h-[450px] relative overflow-hidden flex flex-col justify-between">
                    <div id="bgIcon" class="absolute -right-20 -bottom-20 opacity-[0.03] scale-[6] pointer-events-none"></div>
                    <div class="relative z-10 flex items-center gap-8 md:gap-16">
                        <span id="temp" class="main-temp text-[8rem] md:text-[12rem] data-font text-white">--°</span>
                        <div id="weatherIcon" class="w-28 h-28 md:w-52 md:h-52"></div>
                    </div>
                    <div class="relative z-10">
                        <p id="description" class="text-3xl md:text-6xl text-cyan-200/70 font-light capitalize italic mb-8">---</p>
                        <div class="flex gap-10 border-t border-white/10 pt-8">
                            <div class="bg-white/5 p-4 rounded-3xl border border-white/5">
                                <p class="text-[10px] font-black opacity-40 uppercase mb-1">Gündüz</p>
                                <p id="dayTemp" class="text-3xl md:text-5xl data-font text-white">--°</p>
                            </div>
                            <div class="bg-blue-500/5 p-4 rounded-3xl border border-blue-500/10">
                                <p class="text-[10px] font-black opacity-40 uppercase mb-1 text-blue-400">Gece</p>
                                <p id="nightTemp" class="text-3xl md:text-5xl data-font text-blue-400">--°</p>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="space-y-4">
                    <h3 class="text-[12px] font-black uppercase tracking-widest text-white/30 px-4">Saatlik Öngörü</h3>
                    <div id="hourlyContainer" class="flex gap-4 overflow-x-auto hide-scroll pb-2"></div>
                </div>
            </div>

            <div class="flex flex-col gap-6">
                <div class="glass-card p-8 bg-cyan-500/5 border-cyan-500/10">
                    <div class="flex items-center gap-3 mb-4">
                        <i data-lucide="sparkles" class="w-5 h-5 text-cyan-400"></i>
                        <span class="text-[11px] font-black uppercase tracking-widest text-cyan-400">AI Tavsiyesi</span>
                    </div>
                    <p id="aiSuggestion" class="text-lg font-bold text-white leading-relaxed">Veriler toplanıyor...</p>
                </div>

                <div class="glass-card p-8">
                    <div class="flex items-center gap-3 mb-6">
                        <i data-lucide="orbit" class="w-5 h-5 text-yellow-400"></i>
                        <span class="text-[11px] font-black uppercase tracking-widest text-yellow-400">Güneş Döngüsü</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <div class="text-center"><p id="sunriseTime" class="text-2xl data-font">--:--</p></div>
                        <div class="flex-1 px-4"><div class="h-1 bg-white/10 rounded-full overflow-hidden"><div id="sunProgress" class="h-full bg-cyan-500" style="width: 0%"></div></div></div>
                        <div class="text-center"><p id="sunsetTime" class="text-2xl data-font">--:--</p></div>
                    </div>
                </div>

                <div class="grid grid-cols-1 gap-3">
                    <div class="glass-card p-6 flex justify-between items-center group hover:bg-white/5 transition-all">
                        <span class="text-[11px] font-black opacity-40 uppercase tracking-widest">Rüzgar</span>
                        <p id="windSpeed" class="text-3xl data-font">--</p>
                    </div>
                    <div class="glass-card p-6 flex justify-between items-center group hover:bg-white/5 transition-all">
                        <span class="text-[11px] font-black opacity-40 uppercase tracking-widest">Nem</span>
                        <p id="humidity" class="text-3xl data-font">--</p>
                    </div>
                </div>
            </div>
        </div>

        <section class="grid grid-cols-1 xl:grid-cols-2 gap-10 pt-10 border-t border-white/5">
            <div class="space-y-4">
                <h3 class="text-[11px] font-black uppercase tracking-widest text-white/20">Radar Haritası</h3>
                <div id="radar-container"><iframe id="windyFrame" class="w-full h-full" src="" frameborder="0"></iframe></div>
            </div>
            <div class="space-y-4">
                <h3 class="text-[11px] font-black uppercase tracking-widest text-white/20">5 Günlük Özet</h3>
                <div id="forecastContainer" class="flex flex-col gap-4"></div>
            </div>
        </section>

    </main>

<script>
    const apiKey = "6d4c1f9be7237068a9dd323532bfa14d"; 

    function getIcon(main) {
        const map = { 'Clear': 'sun', 'Clouds': 'cloud', 'Rain': 'cloud-rain', 'Thunderstorm': 'cloud-lightning', 'Snow': 'snowflake', 'Drizzle': 'cloud-drizzle', 'Mist': 'cloud-fog' };
        return map[main] || 'cloud-sun';
    }

    const formatTime = (unix, timezone) => {
        const date = new Date((unix + timezone) * 1000);
        return date.getUTCHours().toString().padStart(2, '0') + ":" + date.getUTCMinutes().toString().padStart(2, '0');
    };

    async function getWeather(city = 'Istanbul') {
        const target = document.getElementById('cityInput').value.trim() || city;
        try {
            const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${target}&appid=${apiKey}&units=metric&lang=tr`);
            const data = await res.json();
            if(data.cod !== 200) return alert("Şehir bulunamadı!");

            document.getElementById('cityName').innerText = data.name;
            document.getElementById('temp').innerText = Math.round(data.main.temp) + "°";
            document.getElementById('description').innerText = data.weather[0].description;
            document.getElementById('windSpeed').innerText = Math.round(data.wind.speed * 3.6) + " km/s";
            document.getElementById('humidity').innerText = "%" + data.main.humidity;
            
            document.getElementById('sunriseTime').innerText = formatTime(data.sys.sunrise, data.timezone);
            document.getElementById('sunsetTime').innerText = formatTime(data.sys.sunset, data.timezone);
            const progress = ((Math.floor(Date.now()/1000) - data.sys.sunrise) / (data.sys.sunset - data.sys.sunrise)) * 100;
            document.getElementById('sunProgress').style.width = `${Math.max(0, Math.min(100, progress))}%`;

            const iconName = getIcon(data.weather[0].main);
            document.getElementById('weatherIcon').innerHTML = `<i data-lucide="${iconName}" class="w-full h-full text-white"></i>`;
            document.getElementById('bgIcon').innerHTML = `<i data-lucide="${iconName}" class="w-full h-full text-white"></i>`;

            const fRes = await fetch(`https://api.openweathermap.org/data/2.5/forecast?q=${target}&appid=${apiKey}&units=metric&lang=tr`);
            const fData = await fRes.json();

            // Saatlik
            const hCont = document.getElementById('hourlyContainer');
            hCont.innerHTML = "";
            fData.list.slice(0, 10).forEach(item => {
                hCont.innerHTML += `<div class="glass-card min-w-[100px] p-5 flex flex-col items-center gap-3 border-white/5"><span class="text-[10px] font-black opacity-30">${formatTime(item.dt, data.timezone)}</span><i data-lucide="${getIcon(item.weather[0].main)}" class="w-7 h-7 text-cyan-400"></i><span class="data-font text-xl">${Math.round(item.main.temp)}°</span></div>`;
            });

            // 5 Günlük Hassas Hesaplama
            const daily = {};
            fData.list.forEach(item => {
                const date = item.dt_txt.split(' ')[0];
                if (!daily[date]) { daily[date] = { max: item.main.temp_max, min: item.main.temp_min, icon: item.weather[0].main, desc: item.weather[0].description }; }
                else {
                    if (item.main.temp_max > daily[date].max) daily[date].max = item.main.temp_max;
                    if (item.main.temp_min < daily[date].min) daily[date].min = item.main.temp_min;
                }
            });

            const keys = Object.keys(daily);
            document.getElementById('dayTemp').innerText = Math.round(daily[keys[0]].max) + "°";
            document.getElementById('nightTemp').innerText = Math.round(daily[keys[0]].min) + "°";

            const fCont = document.getElementById('forecastContainer');
            fCont.innerHTML = "";
            keys.slice(1, 6).forEach(date => {
                const dayName = new Date(date).toLocaleDateString('tr-TR', { weekday: 'long' });
                fCont.innerHTML += `
                    <div class="glass-card p-6 md:p-8 flex forecast-row items-center justify-between group hover:border-cyan-500/30 transition-all">
                        <div class="w-full md:w-1/4"><span class="text-xl font-black text-cyan-400 uppercase tracking-widest">${dayName}</span></div>
                        <div class="w-full md:w-2/4 flex items-center justify-center gap-6 border-cyan-500/10 md:border-x">
                            <i data-lucide="${getIcon(daily[date].icon)}" class="w-8 h-8 text-white"></i>
                            <span class="text-md font-bold text-white/40 capitalize">${daily[date].desc}</span>
                        </div>
                        <div class="w-full md:w-1/4 flex justify-end gap-5 items-baseline">
                            <span class="data-font text-4xl">${Math.round(daily[date].max)}°</span>
                            <span class="data-font text-2xl text-white/20">${Math.round(daily[date].min)}°</span>
                        </div>
                    </div>`;
            });

            lucide.createIcons();
            document.getElementById('windyFrame').src = `https://embed.windy.com/embed2.html?lat=${data.coord.lat}&lon=${data.coord.lon}&zoom=6&overlay=rain&product=ecmwf&metricTemp=%C2%B0C`;
        } catch (e) { console.error(e); }
    }

    document.getElementById('cityInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') getWeather(); });
    window.onload = () => {
        document.getElementById('currentDate').innerText = new Date().toLocaleDateString('tr-TR', { weekday: 'long', day: 'numeric', month: 'long' });
        getWeather('Istanbul'); 
    };
</script>
</body>
</html>

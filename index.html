<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AtmosferinKalbi | V 1.1 Professional</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: linear-gradient(180deg, #3b82f6 0%, #1e40af 35%, #0f172a 100%);
            background-attachment: fixed;
            min-height: 100vh; color: white; margin: 0;
            overflow-x: hidden;
        }

        .text-outline { text-shadow: 2px 4px 12px rgba(0, 0, 0, 0.3); }

        .data-font {
            font-weight: 900;
            letter-spacing: -0.05em;
            font-feature-settings: "tnum";
            line-height: 0.9;
        }

        .glass-card { 
            background: rgba(255, 255, 255, 0.08); 
            backdrop-filter: blur(25px); 
            border: 1px solid rgba(255, 255, 255, 0.15); 
            border-radius: 2.5rem; 
        }

        /* 5 Günlük Kart Modern Sıcaklık Barı Efekti */
        .temp-split {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.75rem;
        }
        .temp-sep {
            width: 1px;
            height: 20px;
            background: rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>

    <nav class="w-full px-10 py-6 flex items-center justify-between sticky top-0 z-50 bg-slate-900/40 backdrop-blur-md border-b border-white/5">
        <div class="flex items-center gap-3">
            <i data-lucide="cloud-lightning" class="text-yellow-400 w-7 h-7"></i>
            <span class="font-black text-xl tracking-tighter uppercase italic text-outline">Atmosferin<span class="text-blue-300">Kalbi</span></span>
        </div>
        <div class="text-[10px] font-black border border-white/10 px-4 py-1.5 rounded-full bg-white/5 tracking-[0.2em]">VERİ AKIŞI AKTİF</div>
    </nav>

    <main class="max-w-[1400px] mx-auto p-6 lg:p-12 space-y-12">
        
        <header class="flex flex-col lg:flex-row justify-between items-end gap-8 border-b border-white/10 pb-10">
            <div>
                <h1 id="cityName" class="text-6xl lg:text-8xl font-black uppercase tracking-tighter text-outline leading-tight">...</h1>
                <p id="currentDate" class="text-blue-200/60 font-bold text-[10px] uppercase mt-4 tracking-[0.5em]"></p>
            </div>
            <div class="relative w-full lg:w-[400px]">
                <input id="cityInput" type="text" placeholder="ŞEHİR ARA..." class="w-full bg-black/20 border border-white/10 rounded-2xl px-6 py-4 outline-none text-white font-bold tracking-widest focus:border-blue-400 transition-all">
                <button onclick="getWeather()" class="absolute right-2 top-2 bg-blue-500 text-white px-6 py-2 rounded-xl text-[10px] font-black hover:bg-blue-400 transition-all shadow-lg active:scale-95">SORGULA</button>
            </div>
        </header>

        <div class="grid grid-cols-1 xl:grid-cols-3 gap-8">
            <div class="xl:col-span-2 glass-card p-10 relative flex flex-col justify-between min-h-[500px] overflow-hidden">
                <div id="bgIcon" class="absolute -right-10 -bottom-10 opacity-[0.03] scale-[4] pointer-events-none"></div>
                
                <div class="relative z-10">
                    <span class="text-white/40 font-black text-[9px] uppercase tracking-[0.6em] mb-8 block">İSTASYON ÖZETİ</span>
                    <div class="flex flex-row items-center justify-start gap-12 lg:gap-20">
                        <span id="temp" class="text-8xl lg:text-[10rem] data-font text-outline">--°</span>
                        <div id="weatherIcon" class="drop-shadow-2xl opacity-90 scale-75 lg:scale-100"></div>
                    </div>
                    <p id="description" class="text-3xl lg:text-5xl text-white font-light capitalize mt-6 text-outline">...</p>
                </div>

                <div class="relative z-10 mt-12 flex flex-wrap items-center gap-10 border-t border-white/10 pt-8">
                    <div class="flex flex-col">
                        <p class="text-[9px] font-black opacity-40 mb-2 tracking-widest">GÜNDÜZ</p>
                        <p id="dayTemp" class="text-4xl data-font text-white">--°</p>
                    </div>
                    <div class="flex flex-col border-l border-white/10 pl-10">
                        <p class="text-[9px] font-black opacity-40 mb-2 tracking-widest">GECE</p>
                        <p id="nightTemp" class="text-4xl data-font text-blue-300">--°</p>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 gap-6">
                <div class="glass-card p-8 flex items-center gap-6 group">
                    <div class="bg-white/5 p-4 rounded-2xl text-blue-300"><i data-lucide="wind" class="w-8 h-8"></i></div>
                    <div><p class="text-[10px] font-black opacity-40 uppercase tracking-widest">RÜZGAR</p><p class="text-4xl data-font"><span id="windSpeed">--</span><span class="text-xs ml-2 opacity-40 uppercase font-bold">km/s</span></p></div>
                </div>
                <div class="glass-card p-8 flex items-center gap-6 group">
                    <div class="bg-white/5 p-4 rounded-2xl text-blue-300"><i data-lucide="droplets" class="w-8 h-8"></i></div>
                    <div><p class="text-[10px] font-black opacity-40 uppercase tracking-widest">NEM</p><p class="text-4xl data-font"><span id="humidity">--</span><span class="text-xl ml-1 opacity-40">%</span></p></div>
                </div>
                <div class="glass-card p-8 flex items-center gap-6 group">
                    <div class="bg-white/5 p-4 rounded-2xl text-blue-300"><i data-lucide="umbrella" class="w-8 h-8"></i></div>
                    <div><p class="text-[10px] font-black opacity-40 uppercase tracking-widest">YAĞIŞ</p><p class="text-4xl data-font"><span id="pop">--</span><span class="text-xl ml-1 opacity-40">%</span></p></div>
                </div>
            </div>
        </div>

        <section id="forecast" class="space-y-8">
            <h3 class="text-xl font-black uppercase tracking-[0.3em] text-white/30 text-center lg:text-left">HAFTALIK PROJEKSİYON</h3>
            <div id="forecastContainer" class="grid grid-cols-1 md:grid-cols-5 gap-6"></div>
        </section>

        <section id="radar-section" class="pb-20">
            <div class="glass-card p-3 h-[500px] overflow-hidden relative">
                <iframe id="windyIframe" src="" frameborder="0" class="w-full h-full rounded-[2rem]"></iframe>
            </div>
        </section>
    </main>

<script>
    const apiKey = "6d4c1f9be7237068a9dd323532bfa14d"; 
    
    function getLucideIcon(main) {
        const map = { 'Clear': 'sun', 'Clouds': 'cloud', 'Rain': 'cloud-rain', 'Thunderstorm': 'cloud-lightning', 'Snow': 'snowflake', 'Drizzle': 'cloud-drizzle', 'Mist': 'cloud-fog' };
        return map[main] || 'cloud-sun';
    }

    async function getWeather(city = 'Istanbul') {
        const target = document.getElementById('cityInput').value.trim() || city;
        try {
            const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${target}&appid=${apiKey}&units=metric&lang=tr`);
            const data = await res.json();
            if(data.cod != 200) return;

            document.getElementById('cityName').innerText = data.name;
            document.getElementById('temp').innerText = Math.round(data.main.temp) + "°";
            document.getElementById('description').innerText = data.weather[0].description;
            document.getElementById('windSpeed').innerText = Math.round(data.wind.speed * 3.6);
            document.getElementById('humidity').innerText = data.main.humidity;
            document.getElementById('pressure').innerText = data.main.pressure;

            const iconName = getLucideIcon(data.weather[0].main);
            document.getElementById('weatherIcon').innerHTML = `<i data-lucide="${iconName}" class="w-20 h-20 lg:w-32 lg:h-32 text-white"></i>`;
            document.getElementById('bgIcon').innerHTML = `<i data-lucide="${iconName}" class="w-full h-full text-white"></i>`;

            document.getElementById('windyIframe').src = `https://embed.windy.com/embed2.html?lat=${data.coord.lat}&lon=${data.coord.lon}&zoom=6&level=surface&overlay=rain&product=ecmwf&menu=&message=&marker=&calendar=now&pressure=&type=map&location=coordinates&detail=&metricWind=km%2Fh&metricTemp=%C2%B0C&radarRange=-1`;

            const fRes = await fetch(`https://api.openweathermap.org/data/2.5/forecast?q=${target}&appid=${apiKey}&units=metric&lang=tr`);
            const fData = await fRes.json();
            
            document.getElementById('pop').innerText = Math.round((fData.list[0].pop || 0) * 100);

            const daily = {};
            fData.list.forEach(i => {
                const d = i.dt_txt.split(' ')[0];
                if(!daily[d]) daily[d] = { max: [], min: [], icon: i.weather[0].main };
                daily[d].max.push(i.main.temp_max);
                daily[d].min.push(i.main.temp_min);
            });

            const todayKey = Object.keys(daily)[0];
            document.getElementById('dayTemp').innerText = Math.round(Math.max(...daily[todayKey].max)) + "°";
            document.getElementById('nightTemp').innerText = Math.round(Math.min(...daily[todayKey].min)) + "°";

            const container = document.getElementById('forecastContainer');
            container.innerHTML = "";
            Object.keys(daily).slice(1, 6).forEach(d => {
                const name = new Date(d).toLocaleDateString('tr-TR', { weekday: 'long' });
                const max = Math.round(Math.max(...daily[d].max));
                const min = Math.round(Math.min(...daily[d].min));
                
                // ✅ Modern Gündüz/Gece Sıcaklık Tasarımı (10/5 formatı)
                container.innerHTML += `
                    <div class="glass-card p-6 flex flex-col items-center group hover:bg-white/15 transition-all">
                        <span class="text-[9px] font-black opacity-40 uppercase mb-4 tracking-widest">${name}</span>
                        <i data-lucide="${getLucideIcon(daily[d].icon)}" class="text-blue-300 w-10 h-10 mb-6"></i>
                        <div class="temp-split">
                            <span class="data-font text-white">${max}°</span>
                            <div class="temp-sep"></div>
                            <span class="data-font text-blue-300/60 text-xl">${min}°</span>
                        </div>
                    </div>`;
            });

            lucide.createIcons();
        } catch (e) { console.error(e); }
    }

    document.getElementById('cityInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') getWeather(); });
    window.onload = () => { 
        document.getElementById('currentDate').innerText = new Date().toLocaleDateString('tr-TR', { weekday: 'long', day: 'numeric', month: 'long' });
        getWeather(); 
    };
</script>
</body>
</html>

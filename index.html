<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AtmosferinKalbi | Meteoroloji İstasyonu</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: linear-gradient(135deg, #0f172a 0%, #1e40af 50%, #3b82f6 100%);
            background-attachment: fixed;
            min-height: 100vh;
            color: white;
            margin: 0;
        }

        .sidebar-fixed { 
            position: fixed; 
            top: 0; 
            left: 0; 
            height: 100vh; 
            z-index: 50; 
        }

        .glass-card { 
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(16px); 
            border: 1px solid rgba(255, 255, 255, 0.15); 
            border-radius: 2rem; 
        }

        .forecast-card { 
            background: rgba(255, 255, 255, 0.07); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 1.5rem; 
            padding: 1rem; 
            transition: all 0.3s ease;
        }

        .forecast-card:hover { transform: translateY(-5px); background: rgba(255, 255, 255, 0.15); }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col lg:flex-row">

    <aside class="w-full lg:w-64 bg-slate-950/80 backdrop-blur-3xl border-b lg:border-b-0 lg:border-r border-white/10 p-6 flex lg:flex-col items-center justify-between lg:justify-start gap-12 sidebar-fixed hidden lg:flex">
        
        <div class="flex flex-col items-center gap-2 w-full pb-6 border-b border-white/5">
            <i data-lucide="cloud-lightning" class="w-12 h-12 text-yellow-500 drop-shadow-[0_0_15px_rgba(234,179,8,0.5)]"></i>
            <h2 class="text-xl font-black uppercase tracking-tighter text-center">
                ATMOSFERİN<br><span class="text-blue-400">KALBİ</span>
            </h2>
        </div>
        
        <nav class="flex lg:flex-col gap-6 w-full">
            <a href="#" class="flex flex-col items-center gap-2 p-4 rounded-2xl bg-blue-500/20 text-blue-400 border border-blue-500/30 transition-all hover:scale-105">
                <i data-lucide="layout-dashboard" class="w-7 h-7"></i>
                <span class="text-[10px] font-bold uppercase tracking-widest">Panel</span>
            </a>
            
            <a href="#forecast" class="flex flex-col items-center gap-2 p-4 rounded-2xl hover:bg-white/5 text-slate-400 transition-all hover:text-white group">
                <i data-lucide="calendar" class="w-7 h-7 group-hover:scale-110 transition-transform"></i>
                <span class="text-[10px] font-bold uppercase tracking-widest">Tahminler</span>
            </a>
            
            <a href="#radar-section" class="flex flex-col items-center gap-2 p-4 rounded-2xl hover:bg-white/5 text-slate-400 transition-all hover:text-white group">
                <i data-lucide="map" class="w-7 h-7 group-hover:scale-110 transition-transform"></i>
                <span class="text-[10px] font-bold uppercase tracking-widest">Canlı Radar</span>
            </a>
        </nav>

        <div class="mt-auto text-[9px] text-slate-600 font-black uppercase tracking-[0.2em] text-center w-full italic">
            v2.5 Stable Edition
        </div>
    </aside>

    <main class="flex-1 p-6 lg:p-12 lg:ml-64 space-y-10">
        
        <header class="flex flex-col sm:flex-row justify-between items-center gap-6">
            <div class="text-center sm:text-left">
                <h1 id="cityName" class="text-5xl lg:text-7xl font-black uppercase tracking-tighter leading-none">...</h1>
                <p id="currentDate" class="text-blue-300 font-bold text-sm uppercase opacity-60 mt-2 tracking-widest italic"></p>
            </div>
            <div class="relative w-full sm:w-96">
                <input id="cityInput" type="text" placeholder="Şehir Ara..." class="w-full bg-white/10 border border-white/20 rounded-2xl px-6 py-4 outline-none focus:border-blue-400 transition-all text-white placeholder-white/30 backdrop-blur-md shadow-inner">
                <button onclick="getWeather()" class="absolute right-2 top-2 bg-blue-600 px-6 py-2 rounded-xl text-xs font-black hover:bg-blue-500 transition-colors uppercase shadow-lg">Sorgula</button>
            </div>
        </header>

        <div class="grid grid-cols-1 xl:grid-cols-3 gap-8">
            <div class="xl:col-span-2 glass-card p-10 relative flex flex-col justify-between min-h-[380px] overflow-hidden group">
                <div id="bgIcon" class="absolute -right-12 -bottom-12 opacity-5 pointer-events-none group-hover:scale-110 transition-transform duration-1000"></div>
                <div>
                    <div class="bg-blue-500 text-[9px] font-black uppercase px-3 py-1 rounded-md w-fit mb-6 tracking-[0.2em] shadow-lg shadow-blue-500/20">Meteoroloji İstasyonu</div>
                    <p id="description" class="text-2xl text-blue-200 capitalize font-light italic mb-4">Veriler alınıyor...</p>
                    <div class="flex items-center gap-8">
                        <span id="temp" class="text-9xl font-black tracking-tighter leading-none">--°</span>
                        <div id="weatherIcon" class="p-6 bg-white/5 rounded-3xl border border-white/10 shadow-2xl backdrop-blur-sm"></div>
                    </div>
                </div>
                <div class="flex gap-10 mt-8">
                    <div><p class="text-[10px] font-black opacity-30 uppercase tracking-[0.15em]">Hissedilen</p><p id="feelsLike" class="text-4xl font-black">--°</p></div>
                    <div class="w-[1px] h-12 bg-white/10 self-end mb-1"></div>
                    <div><p class="text-[10px] font-black opacity-30 uppercase tracking-[0.15em]">Min. Beklenen</p><p id="nightTemp" class="text-4xl font-black text-indigo-300">--°</p></div>
                </div>
            </div>

            <div class="grid grid-cols-1 gap-4">
                <div class="glass-card p-7 flex items-center gap-6 hover:bg-white/15 transition group">
                    <div class="bg-blue-400/20 p-4 rounded-2xl text-blue-400 group-hover:bg-blue-400 group-hover:text-white transition-all"><i data-lucide="wind"></i></div>
                    <div><p class="text-[10px] opacity-40 uppercase font-black tracking-widest mb-1">Rüzgar</p><p id="windSpeed" class="text-2xl font-black">-- km/s</p></div>
                </div>
                <div class="glass-card p-7 flex items-center gap-6 hover:bg-white/15 transition group">
                    <div class="bg-blue-400/20 p-4 rounded-2xl text-blue-400 group-hover:bg-blue-400 group-hover:text-white transition-all"><i data-lucide="droplets"></i></div>
                    <div><p class="text-[10px] opacity-40 uppercase font-black tracking-widest mb-1">Nem</p><p id="humidity" class="text-2xl font-black">--%</p></div>
                </div>
                <div class="glass-card p-7 flex items-center gap-6 hover:bg-white/15 transition group">
                    <div class="bg-blue-400/20 p-4 rounded-2xl text-blue-400 group-hover:bg-blue-400 group-hover:text-white transition-all"><i data-lucide="gauge"></i></div>
                    <div><p class="text-[10px] opacity-40 uppercase font-black tracking-widest mb-1">Basınç</p><p id="pressure" class="text-2xl font-black">-- hPa</p></div>
                </div>
            </div>
        </div>

        <section id="forecast" class="space-y-6">
            <h3 class="text-2xl font-black uppercase italic tracking-tighter">Haftalık <span class="text-blue-400">Rapor</span></h3>
            <div id="forecastContainer" class="grid grid-cols-2 md:grid-cols-5 gap-6"></div>
        </section>

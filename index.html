<div class="glass-card p-8 flex flex-col justify-between min-h-[200px] border-yellow-500/20">
    <div class="flex items-center gap-2 mb-6">
        <i data-lucide="orbit" class="text-yellow-400 w-4 h-4"></i>
        <span class="text-[10px] font-black uppercase tracking-widest text-yellow-200">Güneş Döngüsü</span>
    </div>
    
    <div class="flex justify-between items-end">
        <div class="text-left">
            <i data-lucide="sunrise" class="text-orange-400 w-8 h-8 mb-2"></i>
            <p class="text-[8px] opacity-40 font-bold uppercase">Gün Doğumu</p>
            <p id="sunriseTime" class="text-2xl data-font">--:--</p>
        </div>
        
        <div class="flex-1 px-6 pb-2">
            <div class="h-1 bg-white/10 rounded-full overflow-hidden">
                <div id="sunProgress" class="h-full bg-gradient-to-r from-orange-500 to-yellow-300 transition-all duration-1000" style="width: 0%"></div>
            </div>
            <p id="dayDuration" class="text-[8px] text-center mt-2 opacity-50 font-bold">Hesaplanıyor...</p>
        </div>

        <div class="text-right">
            <i data-lucide="sunset" class="text-blue-400 w-8 h-8 mb-2 ml-auto"></i>
            <p class="text-[8px] opacity-40 font-bold uppercase">Gün Batımı</p>
            <p id="sunsetTime" class="text-2xl data-font">--:--</p>
        </div>
    </div>
</div>

<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AtmosferTürk - Hava Durumu</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Roboto', sans-serif;
      background-color: #121212;
      color: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .weather-container {
      background-color: #1e1e1e;
      padding: 30px 40px;
      border-radius: 20px;
      box-shadow: 0 0 20px rgba(0,255,255,0.2);
      display: flex;
      align-items: center;
      max-width: 500px;
      width: 100%;
      gap: 30px;
      border: 2px solid rgba(0,255,255,0.5);
    }
    .weather-icon img {
      width: 100px;
      height: 100px;
    }
    .weather-info {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .weather-info h2 {
      margin: 0;
      font-size: 1.5rem;
      color: #00ffff;
    }
    .weather-info p {
      margin: 0;
      font-size: 1rem;
      color: #cccccc;
    }
    input[type="text"] {
      padding: 10px;
      border-radius: 10px;
      border: none;
      outline: none;
      font-size: 1rem;
      width: 200px;
      margin-bottom: 20px;
    }
    button {
      padding: 10px 20px;
      border-radius: 10px;
      border: none;
      background-color: #00ffff;
      color: #121212;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover {
      background-color: #00cccc;
    }
  </style>
</head>
<body>

<div>
  <input type="text" id="cityInput" placeholder="Şehir Girin...">
  <button onclick="getWeather()">Getir</button>

  <div class="weather-container" id="weatherBox" style="display:none;">
    <div class="weather-icon" id="icon"></div>
    <div class="weather-info">
      <h2 id="cityName"></h2>
      <p id="temp"></p>
      <p id="desc"></p>
      <p id="humidity"></p>
      <p id="wind"></p>
    </div>
  </div>
</div>

<script>
  const apiKey = "3027886ce4add5de26102859c5acfe45"; // https://openweathermap.org/api

  async function getWeather() {
    const city = document.getElementById('cityInput').value;
    if(!city) return alert("Şehir girin!");
    
    const url = `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${apiKey}&lang=tr&units=metric`;

    try {
      const res = await fetch(url);
      if(!res.ok) throw new Error("Şehir bulunamadı.");
      const data = await res.json();

      document.getElementById('weatherBox').style.display = 'flex';
      document.getElementById('cityName').textContent = data.name + ', ' + data.sys.country;
      document.getElementById('temp').textContent = "Sıcaklık: " + data.main.temp.toFixed(1) + "°C";
      document.getElementById('desc').textContent = "Durum: " + data.weather[0].description;
      document.getElementById('humidity').textContent = "Nem: " + data.main.humidity + "%";
      document.getElementById('wind').textContent = "Rüzgar: " + data.wind.speed + " m/s";

      const iconCode = data.weather[0].icon;
      document.getElementById('icon').innerHTML = `<img src="https://openweathermap.org/img/wn/${iconCode}@2x.png" alt="icon">`;
    } catch (error) {
      alert(error.message);
    }
  }
</script>

</body>
</html>

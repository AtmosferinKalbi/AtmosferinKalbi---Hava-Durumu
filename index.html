<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AtmosferinKalbi | V1.9 LEGENDARY</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        /* EFSANE GÖKYÜZÜ GRADYANI */
        :root { 
            --bg-gradient: linear-gradient(180deg, #1e3a8a 0%, #111827 50%, #000000 100%); 
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg-gradient);
            background-attachment: fixed;
            min-height: 100vh; color: white; margin: 0;
            transition: background 1s ease;
            overflow-x: hidden;
        }

        .data-font { font-weight: 900; letter-spacing: -0.05em; line-height: 1; }
        
        /* BELİRGİN CAM KARTLAR VE KENARLIKLAR */
        .glass-card { 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(25px); 
            border: 2px solid rgba(255, 255, 255, 0.15); /* Daha kalın ve parlak */
            border-radius: 2.5rem; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); /* Derinlik hissi */
        }

        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }

        #radar-container { 
            aspect-ratio: 1 / 1; 
            width: 100%;
            border-radius: 2.5rem; 
            overflow: hidden; 
            border: 3px solid rgba(255, 255, 255, 0.2); 
        }

        .header-label {
            font-size: 13px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: rgba(255,255,255,0.6);
        }

        /* Gelişmiş Mobil Uyumluluk */
        @media (max-width: 768px) {
            .mobile-stack { flex-direction: column; align-items: flex-start; gap: 1rem; }
            .forecast-row { flex-direction: column; text-align: center; gap: 1rem; padding: 2rem !important; }
            .forecast-row > div { width: 100% !important; justify-content: center !important; border: none !important; }
            .main-temp { font-size: 7rem !important; }
            .city-title { font-size: 4rem !important; }
            .glass-card { border-radius: 2rem; border-width: 1px; }
        }

        /* Dinamik Gökyüzü Temaları */
        body.sunny { --bg-gradient: linear-gradient(180deg, #0284c7 0%, #1e3a8a 50%, #020617 100%); }
        body.cloudy { --bg-gradient: linear-gradient(180deg, #475569 0%, #111827 50%, #000000 100%); }
        body.rainy { --bg-gradient: linear-gradient(180deg, #1e293b 0%, #020617 80%, #000000 100%); }
        body.snowy { --bg-gradient: linear-gradient(180deg, #94a3b8 0%, #1e293b 50%, #020617 100%); }
    </style>
</head>
<body id="mainBody">

    <nav class="w-full px-8 py-6 flex flex-wrap items-center justify-between border-b border-white/10 gap-4">
        <div class="flex items-center gap-4">
            <i data-lucide="cloud-lightning" class="text-yellow-400 w-8 h-8"></i>
            <span class="font-black text-2xl md:text-3xl tracking-tighter uppercase italic">Atmosferin<span class="text-blue-400">Kalbi</span></span>
        </div>
        <div class="px-5 py-2 bg-green-500/20 rounded-full border border-green-500/30">
            <span class="text-xs font-black text-green-400 uppercase tracking-widest">AKTİF VERİ</span>
        </div>
    </nav>

    <main class="max-w-[1500px] mx-auto p-6 md:p-12 space-y-12">
        
        <header class="flex flex-col md:flex-row justify-between items-end gap-6">
            <div class="w-full">
                <h1 id="cityName" class="city-title text-7xl md:text-[10rem] font-black uppercase tracking-tighter leading-none mb-3">---</h1>
                <p id="currentDate" class="text-cyan-400 font-black text-xl md:text-2xl uppercase tracking-[0.3em]"></p>
            </div>
            <div class="relative w-full md:w-[450px]">
                <input id="cityInput" type="text" placeholder="ŞEHİR ARA..." class="w-full bg-white/5 border-2 border-white/10 rounded-2xl px-8 py-5 outline-none text-white focus:border-cyan-500 transition-all font-bold text-xl shadow-inner">
                <button onclick="getWeather()" class="absolute right-3 top-3 bg-cyan-600 text-white px-8 py-3 rounded-xl text-xs font-black hover:bg-cyan-500 uppercase transition-all shadow-lg">SORGULA</button>
            </div>
        </header>

        <div class="grid grid-cols-1 xl:grid-cols-3 gap-8">
            
            <div class="xl:col-span-2 space-y-8">
                <div class="glass-card p-10 md:p-16 min-h-[500px] relative overflow-hidden flex flex-col justify-between">
                    <div id="bgIcon" class="absolute -right-20 -bottom-20 opacity-[0.05] scale-[5] pointer-events-none"></div>
                    <div class="relative z-10 flex items-center gap-6 md:gap-12">
                        <span id="temp" class="main-temp text-[10rem] md:text-[14rem] data-font text-white">--°</span>
                        <div id="weatherIcon" class="w-32 h-32 md:w-56 md:h-56"></div>
                    </div>
                    <div class="relative z-10">
                        <p id="description" class="text-4xl md:text-7xl text-cyan-200/80 font-light capitalize italic mb-8">---</p>
                        <div class="flex gap-12 border-t border-white/10 pt-8">
                            <div>
                                <p class="header-label mb-2">MAKS.</p>
                                <p id="dayTemp" class="text-4xl md:text-6xl data-font text-white">--°</p>
                            </div>
                            <div>
                                <p class="header-label mb-2 text-blue-400">MİN.</p>
                                <p id="nightTemp" class="text-4xl md:text-6xl data-font text-blue-400">--°</p>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="space-y-4 pt-4">
                    <h3 class="header-label px-4 text-cyan-200 opacity-80">24 Saatlik Akış</h3>
                    <div id="hourlyContainer" class="flex gap-5 overflow-x-auto hide-scroll pb-4 px-2"></div>
                </div>
            </div>

            <div class="flex flex-col gap-8">
                <div class="glass-card p-8 bg-cyan-500/10 border-cyan-500/20">
                    <div class="flex items-center gap-3 mb-6 text-cyan-300 border-b border-cyan-500/10 pb-4">
                        <i data-lucide="sparkles" class="w-6 h-6"></i>
                        <span class="header-label !text-cyan-300">AI Tavsiyesi</span>
                    </div>
                    <p id="aiSuggestion" class="text-xl font-bold text-white italic leading-relaxed">Veriler analiz ediliyor...</p>
                </div>

                <div class="glass-card p-8">
                    <div class="flex items-center gap-3 mb-8 text-yellow-400 border-b border-white/5 pb-4">
                        <i data-lucide="orbit" class="w-6 h-6"></i>
                        <span class="header-label !text-yellow-200">Güneş Döngüsü</span>
                    </div>
                    <div class="flex justify-between items-center gap-2">
                        <div class="text-center"><p id="sunriseTime" class="text-3xl data-font">--:--</p><p class="text-[10px] font-black opacity-40 uppercase mt-1">DOĞUŞ</p></div>
                        <div class="flex-1 px-2"><div class="h-2 bg-white/10 rounded-full overflow-hidden shadow-inner"><div id="sunProgress" class="h-full bg-gradient-to-r from-orange-500 to-yellow-300" style="width: 0%"></div></div></div>
                        <div class="text-center"><p id="sunsetTime" class="text-3xl data-font">--:--</p><p class="text-[10px] font-black opacity-40 uppercase mt-1">BATIŞ</p></div>
                    </div>
                </div>

                <div class="grid grid-cols-1 gap-4 pt-4 border-t border-white/5">
                    <div class="glass-card p-8 flex justify-between items-center group hover:bg-cyan-500/10 transition-colors">
                        <span class="header-label text-cyan-200">RÜZGAR</span>
                        <p id="windSpeed" class="text-4xl data-font text-white">--</p>
                    </div>
                    <div class="glass-card p-8 flex justify-between items-center group hover:bg-cyan-500/10 transition-colors">
                        <span class="header-label text-cyan-200">NEM Oranı</span>
                        <p id="humidity" class="text-4xl data-font text-white">--</p>
                    </div>
                    <div class="glass-card p-8 flex justify-between items-center group hover:bg-cyan-500/10 transition-colors">
                        <span class="header-label text-cyan-200">YAĞIŞ İhtimali</span>
                        <p id="pop" class="text-4xl data-font text-white">--</p>
                    </div>
                </div>
            </div>
        </div>

        <section class="grid grid-cols-1 xl:grid-cols-2 gap-12 pt-12 border-t border-white/10 mt-12">
            <div class="space-y-6">
                <h3 class="header-label text-cyan-200">Canlı Radar</h3>
                <div id="radar-container"><iframe id="windyFrame" class="w-full h-full" src="" frameborder="0"></iframe></div>
            </div>
            <div class="space-y-6 forecast-section">
                <h3 class="header-label text-cyan-200">5 Günlük Rapor</h3>
                <div id="forecastContainer" class="flex flex-col gap-5"></div>
            </div>
        </section>

    </main>

<script>
    const apiKey = "6d4c1f9be7237068a9dd323532bfa14d"; 

    function getIcon(main) {
        const map = { 'Clear': 'sun', 'Clouds': 'cloud', 'Rain': 'cloud-rain', 'Thunderstorm': 'cloud-lightning', 'Snow': 'snowflake', 'Drizzle': 'cloud-drizzle', 'Mist': 'cloud-fog' };
        return map[main] || 'cloud-sun';
    }

    const formatTime = (unix, timezone) => {
        const date = new Date((unix + timezone) * 1000);
        return date.getUTCHours().toString().padStart(2, '0') + ":" + date.getUTCMinutes().toString().padStart(2, '0');
    };

    async function getWeather(city = 'Istanbul') {
        const target = document.getElementById('cityInput').value.trim() || city;
        try {
            const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${target}&appid=${apiKey}&units=metric&lang=tr`);
            const data = await res.json();
            
            document.getElementById('cityName').innerText = data.name;
            document.getElementById('temp').innerText = Math.round(data.main.temp) + "°";
            document.getElementById('description').innerText = data.weather[0].description;
            document.getElementById('windSpeed').innerText = Math.round(data.wind.speed * 3.6) + " km/s";
            document.getElementById('humidity').innerText = "%" + data.main.humidity;
            
            document.getElementById('sunriseTime').innerText = formatTime(data.sys.sunrise, data.timezone);
            document.getElementById('sunsetTime').innerText = formatTime(data.sys.sunset, data.timezone);
            const progress = ((Math.floor(Date.now()/1000) - data.sys.sunrise) / (data.sys.sunset - data.sys.sunrise)) * 100;
            document.getElementById('sunProgress').style.width = `${Math.max(0, Math.min(100, progress))}%`;

            const iconName = getIcon(data.weather[0].main);
            document.getElementById('weatherIcon').innerHTML = `<i data-lucide="${iconName}" class="w-full h-full text-white"></i>`;
            document.getElementById('bgIcon').innerHTML = `<i data-lucide="${iconName}" class="w-full h-full text-white"></i>`;

            const fRes = await fetch(`https://api.openweathermap.org/data/2.5/forecast?q=${target}&appid=${apiKey}&units=metric&lang=tr`);
            const fData = await fRes.json();
            document.getElementById('pop').innerText = "%" + Math.round((fData.list[0].pop || 0) * 100);

            // Dinamik Gökyüzü ve Tavsiye
            const body = document.getElementById('mainBody');
            const suggest = document.getElementById('aiSuggestion');
            body.className = '';
            if(data.weather[0].main === 'Clear') { body.classList.add('sunny'); suggest.innerText = data.main.temp > 25 ? "Güneş pırıl pırıl! Su içmeyi ihmal etme. 😎" : "Harika bir hava! Dışarıda vakit geçirmek için ideal. ☀️"; }
            else if(data.weather[0].main === 'Rain') { body.classList.add('rainy'); suggest.innerText = "Yağmurlu bir gün. Şemsiyeni yanına al! ☂️"; }
            else { body.classList.add('cloudy'); suggest.innerText = "Hava kapalı, iç ısıtan bir kahve iyi gider. ☕"; }

            // Saatlik
            const hCont = document.getElementById('hourlyContainer');
            hCont.innerHTML = "";
            fData.list.slice(0, 10).forEach(item => {
                hCont.innerHTML += `<div class="glass-card min-w-[110px] p-6 flex flex-col items-center gap-3 border-white/10 group hover:border-cyan-500/30"><span class="text-[11px] font-black opacity-30">${formatTime(item.dt, data.timezone)}</span><i data-lucide="${getIcon(item.weather[0].main)}" class="w-8 h-8 text-cyan-400"></i><span class="data-font text-xl">${Math.round(item.main.temp)}°</span></div>`;
            });

            // 5 Günlük Detaylı
            const daily = {};
            fData.list.forEach(item => {
                const date = item.dt_txt.split(' ')[0];
                if (!daily[date]) { daily[date] = { max: item.main.temp_max, min: item.main.temp_min, icon: item.weather[0].main, desc: item.weather[0].description }; }
                else {
                    if (item.main.temp_max > daily[date].max) daily[date].max = item.main.temp_max;
                    if (item.main.temp_min < daily[date].min) daily[date].min = item.main.temp_min;
                }
            });

            const keys = Object.keys(daily);
            document.getElementById('dayTemp').innerText = Math.round(daily[keys[0]].max) + "°";
            document.getElementById('nightTemp').innerText = Math.round(daily[keys[0]].min) + "°";

            const fCont = document.getElementById('forecastContainer');
            fCont.innerHTML = "";
            keys.slice(1, 6).forEach(date => {
                const dayName = new Date(date).toLocaleDateString('tr-TR', { weekday: 'long' });
                fCont.innerHTML += `
                    <div class="glass-card p-6 md:p-8 flex forecast-row items-center justify-between group hover:border-cyan-500/30 transition-all shadow-lg hover:shadow-cyan-500/10">
                        <div class="w-full md:w-1/4"><span class="text-xl md:text-2xl font-black text-cyan-400 uppercase tracking-wide">${dayName}</span></div>
                        <div class="w-full md:w-2/4 flex items-center justify-center gap-6 border-cyan-500/10 md:border-x px-4">
                            <i data-lucide="${getIcon(daily[date].icon)}" class="w-10 h-10 text-white"></i>
                            <span class="text-lg font-bold text-white/50 capitalize">${daily[date].desc}</span>
                        </div>
                        <div class="w-full md:w-1/4 flex justify-end gap-6 items-baseline">
                            <span class="data-font text-5xl">${Math.round(daily[date].max)}°</span>
                            <span class="data-font text-2xl text-white/20">${Math.round(daily[date].min)}°</span>
                        </div>
                    </div>`;
            });

            lucide.createIcons();
            document.getElementById('windyFrame').src = `https://embed.windy.com/embed2.html?lat=${data.coord.lat}&lon=${data.coord.lon}&zoom=6&overlay=rain&product=ecmwf&metricTemp=%C2%B0C`;
        } catch (e) { console.error(e); }
    }

    document.getElementById('cityInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') getWeather(); });
    window.onload = () => {
        document.getElementById('currentDate').innerText = new Date().toLocaleDateString('tr-TR', { weekday: 'long', day: 'numeric', month: 'long' });
        getWeather('Istanbul'); 
    };
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AtmosferinKalbi | Meteoroloji İstasyonu</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: linear-gradient(135deg, #080d17 0%, #0f172a 50%, #1e3a8a 100%);
            background-attachment: fixed;
            min-height: 100vh;
            color: white;
            margin: 0;
        }

        /* Üst Yatay Navigasyon */
        .navbar {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .glass-card { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            border-radius: 2.5rem; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        .forecast-card { 
            background: rgba(255, 255, 255, 0.02); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            border-radius: 2rem; 
            padding: 1.5rem; 
            transition: all 0.3s ease;
        }

        .forecast-card:hover { 
            background: rgba(255, 255, 255, 0.07); 
            transform: translateY(-5px); 
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.25rem;
            border-radius: 1rem;
            color: #94a3b8;
            transition: all 0.2s;
            font-weight: 600;
        }

        .nav-link.active {
            background: rgba(59, 130, 246, 0.15);
            color: #60a5fa;
        }

        .nav-link:hover:not(.active) { color: white; }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body>

    <div class="flex flex-col w-full">
        <nav class="navbar w-full px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="bg-yellow-500 p-2 rounded-xl shadow-[0_0_15px_rgba(234,179,8,0.3)]">
                    <i data-lucide="zap" class="text-black w-5 h-5"></i>
                </div>
                <span class="font-black text-xl tracking-tighter uppercase">Atmosferin<span class="text-blue-400">Kalbi</span></span>
            </div>
            
            <div class="hidden md:flex items-center gap-4">
                <a href="#" class="nav-link active"><i data-lucide="layout-grid" class="w-4 h-4"></i><span>Panel</span></a>
                <a href="#forecast" class="nav-link"><i data-lucide="calendar-days" class="w-4 h-4"></i><span>Tahmin</span></a>
                <a href="#radar-section" class="nav-link"><i data-lucide="map-pin" class="w-4 h-4"></i><span>Radar</span></a>
            </div>

            <div class="text-[10px] font-black opacity-30 uppercase tracking-[0.2em] hidden sm:block">
                v3.5 GÜNCEL
            </div>
        </nav>

        <main class="max-w-[1400px] mx-auto w-full p-6 lg:p-12 space-y-12">
            
            <header class="flex flex-col lg:flex-row justify-between items-end gap-8 border-b border-white/5 pb-8">
                <div>
                    <h1 id="cityName" class="text-6xl lg:text-8xl font-black uppercase tracking-tighter leading-none">İSTANBUL</h1>
                    <p id="currentDate" class="text-blue-400 font-bold text-sm uppercase mt-4 tracking-[0.3em] opacity-60"></p>
                </div>
                <div class="relative w-full lg:w-[450px]">
                    <div class="absolute -top-6 left-2">
                        <span class="text-[10px] font-black uppercase tracking-widest text-blue-400/50 italic">Hızlı Şehir Sorgulama</span>
                    </div>
                    <input id="cityInput" type="text" placeholder="Örn: Ankara, Berlin..." class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-5 outline-none focus:ring-2 focus:ring-blue-500/50 transition-all text-white text-lg">
                    <button onclick="getWeather()" class="absolute right-3 top-3 bg-blue-600 px-8 py-3 rounded-xl text-xs font-black hover:bg-blue-500 transition-all uppercase shadow-lg">Sorgula</button>
                </div>
            </header>

            <div class="grid grid-cols-1 xl:grid-cols-3 gap-8">
                <div class="xl:col-span-2 glass-card p-10 relative flex flex-col justify-between min-h-[450px] overflow-hidden">
                    <div id="bgIcon" class="absolute -right-20 -bottom-20 opacity-[0.03] pointer-events-none scale-[2]"></div>
                    
                    <div class="relative z-10">
                        <div class="flex items-center gap-2 mb-6">
                            <span class="w-2 h-2 bg-blue-500 rounded-full animate-ping"></span>
                            <span class="text-blue-400 font-black text-[10px] uppercase tracking-[0.4em]">Güncel Sıcaklık Verisi</span>
                        </div>
                        <div class="flex items-center gap-12">
                            <span id="temp" class="text-[12rem] font-black tracking-tighter leading-none">--°</span>
                            <div id="weatherIcon" class="scale-[2] opacity-90"></div>
                        </div>
                        <p id="description" class="text-4xl text-blue-100/70 font-light capitalize mt-8 italic tracking-wide">Bulutlu</p>
                    </div>

                    <div class="relative z-10 mt-12 flex items-center justify-between border-t border-white/10 pt-10">
                        <div class="flex gap-12">
                            <div>
                                <p class="text-[10px] font-black opacity-30 uppercase tracking-widest mb-1">Gece Beklenen</p>
                                <p id="nightTemp" class="text-5xl font-bold text-indigo-400">--°</p>
                            </div>
                            <div>
                                <p class="text-[10px] font-black opacity-30 uppercase tracking-widest mb-1">Basınç</p>
                                <p id="pressure" class="text-2xl font-bold text-white/80">-- hPa</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="text-[10px] font-black opacity-30 uppercase tracking-widest mb-1">UV Endeksi</p>
                            <p id="uvi" class="text-2xl font-bold text-yellow-500">2 (Düşük)</p>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-1 gap-6">
                    <div class="glass-card p-8 flex items-center gap-8 group hover:border-blue-500/30 transition-all">
                        <div class="bg-blue-500/10 p-5 rounded-3xl text-blue-400 group-hover:scale-110 transition-transform"><i data-lucide="wind" class="w-8 h-8"></i></div>
                        <div><p class="text-[10px] opacity-40 uppercase font-black tracking-widest mb-1">Rüzgar Hızı</p><p id="windSpeed" class="text-4xl font-black">-- <span class="text-sm font-medium opacity-30">km/s</span></p></div>
                    </div>
                    <div class="glass-card p-8 flex items-center gap-8 group hover:border-blue-500/30 transition-all">
                        <div class="bg-blue-500/10 p-5 rounded-3xl text-blue-400 group-hover:scale-110 transition-transform"><i data-lucide="droplets" class="w-8 h-8"></i></div>
                        <div><p class="text-[10px] opacity-40 uppercase font-black tracking-widest mb-1">Nem Oranı</p><p id="humidity" class="text-4xl font-black">--<span class="text-sm font-medium opacity-30">%</span></p></div>
                    </div>
                    <div class="glass-card p-8 flex items-center gap-8 group hover:border-blue-500/30 transition-all">
                        <div class="bg-blue-500/10 p-5 rounded-3xl text-blue-400 group-hover:scale-110 transition-transform"><i data-lucide="umbrella" class="w-8 h-8"></i></div>
                        <div><p class="text-[10px] opacity-40 uppercase font-black tracking-widest mb-1">Yağış İhtimali</p><p id="pop" class="text-4xl font-black">--<span class="text-sm font-medium opacity-30">%</span></p></div>
                    </div>
                </div>
            </div>

            <section id="forecast" class="space-y-8">
                <div class="flex items-center gap-4">
                    <h3 class="text-3xl font-black uppercase italic tracking-tighter italic">Haftalık Görünüm</h3>
                    <div class="h-[2px] flex-1 bg-gradient-to-r from-blue-500/50 to-transparent"></div>
                </div>
                <div id="forecastContainer" class="grid grid-cols-2 md:grid-cols-5 gap-6"></div>
            </section>

            <section id="radar-section" class="space-y-8 pb-20">
                <div class="flex items-center gap-4">
                    <h3 class="text-3xl font-black uppercase italic tracking-tighter italic">Canlı Radar Görüntüsü</h3>
                    <div class="h-[2px] flex-1 bg-gradient-to-r from-blue-500/50 to-transparent"></div>
                </div>
                <div class="glass-card p-3 h-[600px] overflow-hidden shadow-2xl">
                    <iframe id="windyIframe" src="" frameborder="0" class="w-full h-full rounded-[2rem]"></iframe>
                </div>
            </section>
        </main>
    </div>

    <script>
        const apiKey = "6d4c1f9be7237068a9dd323532bfa14d"; 

        function getLucideIcon(main) {
            const map = { 'Clear': 'sun', 'Clouds': 'cloud', 'Rain': 'cloud-rain', 'Thunderstorm': 'cloud-lightning', 'Snow': 'snowflake' };
            return map[main] || 'cloud-sun';
        }

        async function getWeather(city = 'Istanbul') {
            const target = document.getElementById('cityInput').value.trim() || city;
            
            try {
                const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${target}&appid=${apiKey}&units=metric&lang=tr`);
                const data = await res.json();
                if(data.cod != 200) return alert("Şehir bulunamadı!");

                document.getElementById('cityName').innerText = data.name;
                document.getElementById('temp').innerText = Math.round(data.main.temp) + "°";
                document.getElementById('description').innerText = data.weather[0].description;
                document.getElementById('windSpeed').innerText = Math.round(data.wind.speed * 3.6);
                document.getElementById('humidity').innerText = data.main.humidity;
                document.getElementById('pressure').innerText = data.main.pressure;
                
                const icon = getLucideIcon(data.weather[0].main);
                document.getElementById('weatherIcon').innerHTML = `<i data-lucide="${icon}" class="w-32 h-32 text-blue-100/90"></i>`;
                document.getElementById('bgIcon').innerHTML = `<i data-lucide="${icon}" class="w-[30rem] h-[30rem] text-white"></i>`;

                document.getElementById('windyIframe').src = `https://embed.windy.com/embed2.html?lat=${data.coord.lat}&lon=${data.coord.lon}&zoom=6&level=surface&overlay=rain&product=ecmwf&menu=&message=&marker=&calendar=now&pressure=&type=map&location=coordinates&detail=&metricWind=km%2Fh&metricTemp=%C2%B0C&radarRange=-1`;

                const fRes = await fetch(`https://api.openweathermap.org/data/2.5/forecast?q=${target}&appid=${apiKey}&units=metric&lang=tr`);
                const fData = await fRes.json();
                
                document.getElementById('pop').innerText = Math.round((fData.list[0].pop || 0) * 100);

                const daily = {};
                fData.list.forEach(i => {
                    const d = i.dt_txt.split(' ')[0];
                    if(!daily[d]) daily[d] = { max: [], min: [], icon: i.weather[0].main };
                    daily[d].max.push(i.main.temp_max);
                    daily[d].min.push(i.main.temp_min);
                });

                document.getElementById('nightTemp').innerText = Math.round(Math.min(...daily[Object.keys(daily)[0]].min)) + "°";

                const container = document.getElementById('forecastContainer');
                container.innerHTML = "";
                Object.keys(daily).slice(1, 6).forEach(d => {
                    const name = new Date(d).toLocaleDateString('tr-TR', { weekday: 'long' });
                    container.innerHTML += `
                        <div class="forecast-card flex flex-col items-center">
                            <span class="text-[10px] font-black opacity-30 uppercase tracking-[0.2em] mb-4">${name}</span>
                            <i data-lucide="${getLucideIcon(daily[d].icon)}" class="text-blue-400 w-12 h-12 mb-6"></i>
                            <div class="flex flex-col items-center">
                                <span class="text-4xl font-black tracking-tighter">${Math.round(Math.max(...daily[d].max))}°</span>
                                <span class="text-sm font-bold opacity-30 italic mt-1">${Math.round(Math.min(...daily[d].min))}° GECE</span>
                            </div>
                        </div>`;
                });
                
                lucide.createIcons();
            } catch (e) { console.error(e); }
        }

        document.getElementById('cityInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') getWeather(); });
        window.onload = () => { 
            getWeather(); 
            document.getElementById('currentDate').innerText = new Date().toLocaleDateString('tr-TR', { weekday: 'long', day: 'numeric', month: 'long' });
        };
    </script>
</body>
                    </html>

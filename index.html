<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AtmosferinKalbi | Mobil Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background: linear-gradient(180deg, #1e3a8a 0%, #0f172a 100%);
            min-height: 100vh; color: white;
        }
        .glass-card { 
            background: rgba(255, 255, 255, 0.08); 
            backdrop-filter: blur(15px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 1.5rem; 
        }
        .data-font { font-weight: 900; letter-spacing: -0.02em; }
        
        /* Mobil için yazı boyutu optimizasyonu */
        @media (max-width: 640px) {
            .main-temp { font-size: 5rem !important; line-height: 1; }
            .city-title { font-size: 2.5rem !important; }
        }
    </style>
</head>
<body class="p-4 pb-10">

    <div class="max-w-md mx-auto mb-6">
        <div class="relative flex gap-2">
            <input id="cityInput" type="text" placeholder="Şehir ara..." 
                class="w-full bg-white/10 border border-white/20 rounded-2xl px-5 py-3 outline-none focus:border-blue-400 transition-all font-semibold">
            <button onclick="getWeather()" class="bg-blue-600 p-3 rounded-2xl">
                <i data-lucide="search" class="w-6 h-6"></i>
            </button>
        </div>
    </div>

    <main class="max-w-md mx-auto space-y-4">
        
        <div class="glass-card p-6 text-center relative overflow-hidden">
            <p id="currentDate" class="text-[10px] uppercase tracking-widest opacity-50 mb-2"></p>
            <h1 id="cityName" class="city-title text-4xl font-black uppercase mb-1 truncate">---</h1>
            <p id="description" class="text-blue-300 font-medium capitalize mb-4">---</p>
            
            <div class="flex items-center justify-center gap-4">
                <div id="weatherIcon" class="w-16 h-16 text-blue-400"></div>
                <span id="temp" class="main-temp text-7xl data-font">--°</span>
            </div>

            <div class="flex justify-center gap-6 mt-6 pt-6 border-t border-white/10">
                <div class="flex items-center gap-2">
                    <i data-lucide="arrow-up" class="w-4 h-4 text-orange-400"></i>
                    <span id="dayTemp" class="font-bold">--°</span>
                </div>
                <div class="flex items-center gap-2">
                    <i data-lucide="arrow-down" class="w-4 h-4 text-blue-400"></i>
                    <span id="nightTemp" class="font-bold">--°</span>
                </div>
            </div>
        </div>

        <div class="glass-card p-4 bg-blue-500/10 flex items-start gap-3">
            <i data-lucide="sparkles" class="text-blue-300 w-5 h-5 mt-1 shrink-0"></i>
            <p id="aiSuggestion" class="text-sm leading-snug italic">Veriler yükleniyor...</p>
        </div>

        <div class="grid grid-cols-3 gap-3">
            <div class="glass-card p-3 text-center">
                <i data-lucide="wind" class="w-5 h-5 mx-auto mb-1 text-blue-300"></i>
                <p class="text-[8px] opacity-50 uppercase font-bold">Rüzgar</p>
                <p id="windSpeed" class="text-sm font-black">--</p>
            </div>
            <div class="glass-card p-3 text-center">
                <i data-lucide="droplets" class="w-5 h-5 mx-auto mb-1 text-blue-300"></i>
                <p class="text-[8px] opacity-50 uppercase font-bold">Nem</p>
                <p id="humidity" class="text-sm font-black">--</p>
            </div>
            <div class="glass-card p-3 text-center">
                <i data-lucide="umbrella" class="w-5 h-5 mx-auto mb-1 text-blue-300"></i>
                <p class="text-[8px] opacity-50 uppercase font-bold">Yağış</p>
                <p id="pop" class="text-sm font-black">--</p>
            </div>
        </div>

        <div class="glass-card overflow-hidden h-48">
            <iframe id="windyFrame" class="w-full h-full opacity-80" src="" frameborder="0"></iframe>
        </div>

        <div id="forecastContainer" class="flex gap-2 overflow-x-auto pb-2">
            </div>

    </main>

<script>
    // JS Kısmı aynı mantıkla çalışacak, sadece forecastContainer içine 
    // eklenen kartların genişliğini 'min-w-[100px]' yaparak kaydırılabilir yapabiliriz.
    // Önceki koddaki API anahtarını buraya da eklemeyi unutma.
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atmosfer Pro | Canlı Veri</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            transition: background 1s ease;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 1.5rem;
        }
    </style>
</head>
<body class="text-white flex items-center justify-center p-4">

    <div class="max-w-4xl w-full space-y-6">
        
        <div class="flex flex-col md:flex-row justify-between items-center gap-4">
            <h1 class="text-2xl font-bold tracking-tight italic">ATMOSFER<span class="text-blue-300">TURK</span></h1>
            <div class="relative w-full md:w-64">
                <input id="cityInput" type="text" placeholder="Şehir Ara (örn: Ankara)" 
                    class="w-full bg-white/20 border-none rounded-full px-5 py-2 focus:ring-2 focus:ring-blue-400 outline-none placeholder-blue-100 text-white">
                <button onclick="getWeather()" class="absolute right-4 top-2.5">
                    <i data-lucide="search" class="w-5 h-5 opacity-60 hover:opacity-100 transition"></i>
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            
            <div id="mainCard" class="md:col-span-2 glass-card p-8 flex flex-col justify-between min-h-[300px]">
                <div class="flex justify-between items-start">
                    <div>
                        <h2 id="cityName" class="text-4xl font-semibold">Şehir Yükleniyor...</h2>
                        <p id="currentDate" class="text-blue-100 opacity-80"></p>
                    </div>
                    <div class="text-right flex flex-col items-center">
                        <div id="weatherIcon"></div>
                        <p id="description" class="text-xl font-medium capitalize"></p>
                    </div>
                </div>
                
                <div class="mt-12 flex items-baseline gap-2">
                    <span id="temp" class="text-8xl font-bold">--°</span>
                    <span id="feelsLike" class="text-2xl opacity-60">/ --°C</span>
                </div>
            </div>

            <div class="glass-card p-6 grid grid-cols-2 gap-4">
                <div class="flex flex-col items-center justify-center p-4 bg-white/5 rounded-2xl">
                    <i data-lucide="droplets" class="text-blue-300 mb-2"></i>
                    <span class="text-sm opacity-60">Nem</span>
                    <span id="humidity" class="font-bold">--%</span>
                </div>
                <div class="flex flex-col items-center justify-center p-4 bg-white/5 rounded-2xl">
                    <i data-lucide="wind" class="text-blue-300 mb-2"></i>
                    <span class="text-sm opacity-60">Rüzgar</span>
                    <span id="windSpeed" class="font-bold">-- km/s</span>
                </div>
                <div class="flex flex-col items-center justify-center p-4 bg-white/5 rounded-2xl">
                    <i data-lucide="gauge" class="text-blue-300 mb-2"></i>
                    <span class="text-sm opacity-60">Basınç</span>
                    <span id="pressure" class="font-bold">-- hPa</span>
                </div>
                <div class="flex flex-col items-center justify-center p-4 bg-white/5 rounded-2xl">
                    <i data-lucide="cloud" class="text-blue-300 mb-2"></i>
                    <span class="text-sm opacity-60">Bulut</span>
                    <span id="cloudiness" class="font-bold">--%</span>
                </div>
            </div>
        </div>

    </div>

    <script>
        const apiKey = "3027886ce4add5de26102859c5acfe45";
        const dateEl = document.getElementById('currentDate');
        
        // Tarihi ayarla
        const now = new Date();
        dateEl.innerText = now.toLocaleDateString('tr-TR', { weekday: 'long', day: 'numeric', month: 'long' });

        async function getWeather(city = 'Istanbul') {
            const input = document.getElementById('cityInput').value;
            const targetCity = input || city;
            const url = `https://api.openweathermap.org/data/2.5/weather?q=${targetCity}&appid=${apiKey}&units=metric&lang=tr`;

            try {
                const response = await fetch(url);
                const data = await response.json();

                if (data.cod === "404") {
                    alert("Şehir bulunamadı!");
                    return;
                }

                // UI Güncelleme
                document.getElementById('cityName').innerText = data.name;
                document.getElementById('temp').innerText = Math.round(data.main.temp) + "°";
                document.getElementById('feelsLike').innerText = "/ " + Math.round(data.main.feels_like) + "°C";
                document.getElementById('description').innerText = data.weather[0].description;
                document.getElementById('humidity').innerText = "%" + data.main.humidity;
                document.getElementById('windSpeed').innerText = data.wind.speed + " km/s";
                document.getElementById('pressure').innerText = data.main.pressure + " hPa";
                document.getElementById('cloudiness').innerText = "%" + data.clouds.all;

                // Dinamik İkon (OpenWeather icon kodunu Lucide ile eşleştirme simülasyonu)
                const iconContainer = document.getElementById('weatherIcon');
                const mainWeather = data.weather[0].main.toLowerCase();
                let iconName = 'sun';
                
                if(mainWeather.includes('cloud')) iconName = 'cloud';
                if(mainWeather.includes('rain')) iconName = 'cloud-rain';
                if(mainWeather.includes('clear')) iconName = 'sun';
                if(mainWeather.includes('snow')) iconName = 'snowflake';

                iconContainer.innerHTML = `<i data-lucide="${iconName}" class="w-16 h-16 mb-2"></i>`;
                lucide.createIcons();

            } catch (error) {
                console.error("Veri çekilemedi:", error);
            }
        }

        // Enter tuşu ile arama yapma
        document.getElementById('cityInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') getWeather();
        });

        // Sayfa açıldığında İstanbul'u getir
        getWeather();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AtmosferinKalbi | Meteoroloji İstasyonu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #0f172a 0%, #1e40af 50%, #3b82f6 100%); background-attachment: fixed; min-height: 100vh; color: white; margin: 0; }
        .sidebar-fixed { position: fixed; top: 0; left: 0; height: 100vh; z-index: 50; }
        .glass-card { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 2rem; }
        .forecast-card { background: rgba(255, 255, 255, 0.07); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 1.5rem; padding: 1rem; transition: all 0.3s ease; text-align: center; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col lg:flex-row">

    <aside class="w-full lg:w-64 bg-slate-950/60 backdrop-blur-3xl border-b lg:border-b-0 lg:border-r border-white/10 p-6 flex lg:flex-col items-center lg:items-start justify-between lg:justify-start gap-10 sidebar-fixed hidden lg:flex">
        <div class="flex items-center gap-3">
            <i data-lucide="cloud-lightning" class="w-10 h-10 text-yellow-500"></i>
            <span class="text-xl font-black uppercase tracking-tighter">Atmosferin<span class="text-blue-400">Kalbi</span></span>
        </div>
        <nav class="flex lg:flex-col gap-4 w-full">
            <a href="#" class="flex items-center gap-4 p-4 rounded-2xl bg-blue-500/20 text-blue-400 border border-blue-500/30"><i data-lucide="layout-dashboard"></i><span class="font-bold">Panel</span></a>
            <a href="#forecast" class="flex items-center gap-4 p-4 rounded-2xl hover:bg-white/5 text-slate-400 transition"><i data-lucide="calendar"></i><span>Tahminler</span></a>
            <a href="#radar-section" class="flex items-center gap-4 p-4 rounded-2xl hover:bg-white/5 text-slate-400 transition"><i data-lucide="map"></i><span>Canlı Radar</span></a>
        </nav>
    </aside>

    <main class="flex-1 p-6 lg:p-12 lg:ml-64 space-y-10">
        <header class="flex flex-col sm:flex-row justify-between items-center gap-6">
            <div>
                <h1 id="cityName" class="text-5xl lg:text-7xl font-black uppercase tracking-tighter leading-none">Yükleniyor...</h1>
                <p id="currentDate" class="text-blue-300 font-bold text-sm uppercase opacity-60 mt-2"></p>
            </div>
            <div class="relative w-full sm:w-96 group">
                <input id="cityInput" type="text" placeholder="Şehir Ara (Örn: Istanbul)..." class="w-full bg-white/10 border border-white/20 rounded-2xl px-6 py-4 outline-none focus:border-blue-400 transition-all text-white backdrop-blur-md">
                <button onclick="getWeather()" class="absolute right-2 top-2 bg-blue-600 px-6 py-2 rounded-xl text-xs font-black hover:bg-blue-500 transition-colors uppercase">Sorgula</button>
            </div>
        </header>

        <div class="grid grid-cols-1 xl:grid-cols-3 gap-8">
            <div class="xl:col-span-2 glass-card p-10 relative min-h-[350px] flex flex-col justify-between">
                <div>
                    <p id="description" class="text-2xl text-blue-200 capitalize italic mb-4">Veri Alınıyor...</p>
                    <div class="flex items-center gap-8">
                        <span id="temp" class="text-9xl font-black tracking-tighter leading-none">--°</span>
                        <div id="weatherIcon"></div>
                    </div>
                </div>
                <div class="flex gap-10 mt-8">
                    <div><p class="text-[10px] font-black opacity-40 uppercase">Hissedilen</p><p id="feelsLike" class="text-3xl font-bold">--°</p></div>
                    <div class="w-[1px] h-12 bg-white/10"></div>
                    <div><p class="text-[10px] font-black opacity-40 uppercase">Gece</p><p id="nightTemp" class="text-3xl font-bold text-indigo-300">--°</p></div>
                </div>
            </div>
            <div class="grid grid-cols-1 gap-4">
                <div class="glass-card p-6 flex items-center gap-6">
                    <div class="bg-blue-400/20 p-4 rounded-2xl text-blue-400"><i data-lucide="wind"></i></div>
                    <div><p class="text-[10px] opacity-40 uppercase font-black">Rüzgar</p><p id="windSpeed" class="text-2xl font-black">-- km/s</p></div>
                </div>
                <div class="glass-card p-6 flex items-center gap-6">
                    <div class="bg-blue-400/20 p-4 rounded-2xl text-blue-400"><i data-lucide="droplets"></i></div>
                    <div><p class="text-[10px] opacity-40 uppercase font-black">Nem</p><p id="humidity" class="text-2xl font-black">--%</p></div>
                </div>
            </div>
        </div>

        <section id="forecast" class="space-y-6">
            <h3 class="text-2xl font-black uppercase italic">Haftalık Görünüm</h3>
            <div id="forecastContainer" class="grid grid-cols-2 md:grid-cols-5 gap-6"></div>
        </section>

        <section id="radar-section" class="space-y-6 pb-20">
            <h3 class="text-2xl font-black uppercase italic">Windy Canlı Radar</h3>
            <div class="glass-card p-3 overflow-hidden shadow-2xl">
                <iframe id="windyIframe" src="" frameborder="0" class="w-full h-[500px] rounded-2xl"></iframe>
            </div>
        </section>
    </main>

    <script>
        const apiKey = "6d4c1f9be7237068a9dd323532bfa14d"; // Eğer hata verirse OpenWeatherMap'ten yeni bir tane almalısın.

        async function getWeather(city = 'Istanbul') {
            const input = document.getElementById('cityInput').value.trim();
            const target = input || city;
            
            try {
                const response = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${target}&appid=${apiKey}&units=metric&lang=tr`);
                const data = await response.json();

                if (data.cod !== 200) {
                    throw new Error(data.message);
                }

                // Verileri Yerleştir
                document.getElementById('cityName').innerText = data.name;
                document.getElementById('temp').innerText = Math.round(data.main.temp) + "°";
                document.getElementById('feelsLike').innerText = Math.round(data.main.feels_like) + "°";
                document.getElementById('description').innerText = data.weather[0].description;
                document.getElementById('humidity').innerText = "%" + data.main.humidity;
                document.getElementById('windSpeed').innerText = Math.round(data.wind.speed * 3.6) + " km/s";

                // Radar Güncelle
                document.getElementById('windyIframe').src = `https://embed.windy.com/embed2.html?lat=${data.coord.lat}&lon=${data.coord.lon}&zoom=6&level=surface&overlay=rain&product=ecmwf&menu=&message=&marker=&calendar=now&pressure=&type=map&location=coordinates&detail=&metricWind=km%2Fh&metricTemp=%C2%B0C&radarRange=-1`;

                // 5 Günlük Tahmin
                const fRes = await fetch(`https://api.openweathermap.org/data/2.5/forecast?q=${target}&appid=${apiKey}&units=metric&lang=tr`);
                const fData = await fRes.json();
                
                const daily = {};
                fData.list.forEach(i => {
                    const d = i.dt_txt.split(' ')[0];
                    if(!daily[d]) daily[d] = { t: [], icons: [] };
                    daily[d].t.push(i.main.temp);
                    daily[d].icons.push(i.weather[0].main);
                });

                document.getElementById('nightTemp').innerText = Math.round(Math.min(...daily[Object.keys(daily)[0]].t)) + "°";

                const container = document.getElementById('forecastContainer');
                container.innerHTML = "";
                Object.keys(daily).slice(1, 6).forEach(d => {
                    const name = new Date(d).toLocaleDateString('tr-TR', { weekday: 'short' });
                    container.innerHTML += `<div class="forecast-card"><p class="text-xs opacity-40 uppercase">${name}</p><p class="text-2xl font-black">${Math.round(Math.max(...daily[d].t))}°</p></div>`;
                });

                lucide.createIcons();
            } catch (error) {
                console.error("Hata:", error);
                alert("Veri yüklenemedi: " + error.message);
            }
        }

        window.onload = () => {
            getWeather();
            document.getElementById('currentDate').innerText = new Date().toLocaleDateString('tr-TR', { weekday: 'long', day: 'numeric', month: 'long' });
        };
    </script>
</body>
</html>

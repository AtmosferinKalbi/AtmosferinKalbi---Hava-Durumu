<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AtmosferinKalbi | Meteoroloji İstasyonu</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: linear-gradient(135deg, #0f172a 0%, #1e40af 50%, #3b82f6 100%);
            background-attachment: fixed;
            min-height: 100vh;
            color: white;
        }

        .glass-card { 
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(16px); 
            border: 1px solid rgba(255, 255, 255, 0.15); 
            border-radius: 2rem; 
        }

        .forecast-card { 
            background: rgba(255, 255, 255, 0.07); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 1.5rem; 
            padding: 1rem; 
            transition: all 0.3s ease;
        }

        .forecast-card:hover { transform: translateY(-5px); background: rgba(255, 255, 255, 0.15); }

        /* Radar Alanı Stili */
        #weatherRadar {
            width: 100%;
            height: 400px;
            border-radius: 2rem;
            border: 1px solid rgba(255,255,255,0.2);
        }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col lg:flex-row">

    <aside class="w-full lg:w-20 xl:w-64 bg-slate-950/40 backdrop-blur-2xl border-b lg:border-b-0 lg:border-r border-white/10 p-4 lg:p-8 flex lg:flex-col items-center justify-between lg:justify-start gap-8 z-50 sticky top-0 lg:h-screen">
        <div class="flex items-center gap-3">
            <i data-lucide="cloud-lightning" class="w-8 h-8 text-yellow-500"></i>
            <span class="text-sm lg:text-xl font-black uppercase tracking-tighter lg:block hidden xl:block">Atmosferin<span class="text-blue-400">Kalbi</span></span>
        </div>
        
        <nav class="flex lg:flex-col gap-4">
            <a href="#" class="p-3 rounded-xl bg-blue-500 text-white shadow-lg"><i data-lucide="layout-dashboard" class="w-6 h-6"></i></a>
            <a href="#forecast" class="p-3 rounded-xl hover:bg-white/10 text-slate-400 transition"><i data-lucide="calendar" class="w-6 h-6"></i></a>
            <a href="#radar-section" class="p-3 rounded-xl hover:bg-white/10 text-slate-400 transition"><i data-lucide="map" class="w-6 h-6"></i></a>
        </nav>

        <div class="hidden lg:block mt-auto text-[8px] text-slate-500 font-bold uppercase text-center italic">v2.0 Beta</div>
    </aside>

    <main class="flex-1 p-4 lg:p-10 space-y-10 overflow-y-auto">
        
        <header class="flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="text-center sm:text-left">
                <h1 id="cityName" class="text-4xl lg:text-6xl font-black uppercase tracking-tighter">...</h1>
                <p id="currentDate" class="text-blue-300 font-bold text-xs uppercase opacity-60"></p>
            </div>
            <div class="relative w-full sm:w-80">
                <input id="cityInput" type="text" placeholder="Şehir..." class="w-full bg-white/10 border border-white/20 rounded-2xl px-5 py-3 outline-none focus:border-blue-400 transition-all">
                <button onclick="getWeather()" class="absolute right-1 top-1 bg-blue-500 px-4 py-2 rounded-xl text-xs font-bold hover:bg-blue-400">ARA</button>
            </div>
        </header>

        <div class="grid grid-cols-1 xl:grid-cols-3 gap-6">
            <div class="xl:col-span-2 glass-card p-8 flex flex-col justify-between min-h-[300px] relative overflow-hidden group">
                <div id="bgIcon" class="absolute -right-10 -bottom-10 opacity-5 pointer-events-none group-hover:scale-110 transition-transform duration-1000"></div>
                <div>
                    <p id="description" class="text-xl text-blue-200 capitalize italic mb-2">Hava Durumu</p>
                    <div class="flex items-center gap-4">
                        <span id="temp" class="text-8xl lg:text-9xl font-black tracking-tighter">--°</span>
                        <div id="weatherIcon"></div>
                    </div>
                </div>
                <div class="flex gap-6 mt-4">
                    <div><p class="text-[10px] font-black opacity-40 uppercase">Hissedilen</p><p id="feelsLike" class="text-2xl font-bold">--°</p></div>
                    <div class="w-[1px] h-10 bg-white/10"></div>
                    <div><p class="text-[10px] font-black opacity-40 uppercase">En Düşük</p><p id="nightTemp" class="text-2xl font-bold text-indigo-300">--°</p></div>
                </div>
            </div>

            <div class="grid grid-cols-2 xl:grid-cols-1 gap-4">
                <div class="glass-card p-5 flex items-center gap-4">
                    <i data-lucide="wind" class="text-blue-400 w-8 h-8"></i>
                    <div><p class="text-[9px] opacity-50 uppercase font-black">Rüzgar</p><p id="windSpeed" class="font-bold">-- km/s</p></div>
                </div>
                <div class="glass-card p-5 flex items-center gap-4">
                    <i data-lucide="droplets" class="text-blue-400 w-8 h-8"></i>
                    <div><p class="text-[9px] opacity-50 uppercase font-black">Nem</p><p id="humidity" class="font-bold">--%</p></div>
                </div>
                <div class="glass-card p-5 flex items-center gap-4 hidden xl:flex">
                    <i data-lucide="gauge" class="text-blue-400 w-8 h-8"></i>
                    <div><p class="text-[9px] opacity-50 uppercase font-black">Basınç</p><p id="pressure" class="font-bold">-- hPa</p></div>
                </div>
            </div>
        </div>

        <section id="forecast" class="space-y-4">
            <h3 class="text-xl font-black uppercase italic tracking-widest">5 Günlük Tahmin</h3>
            <div id="forecastContainer" class="grid grid-cols-2 md:grid-cols-5 gap-4"></div>
        </section>

        <section id="radar-section" class="space-y-4 pb-10">
            <h3 class="text-xl font-black uppercase italic tracking-widest">Canlı Hava Radarı</h3>
            <div class="glass-card p-2 overflow-hidden">
                <iframe id="radarIframe" src="https://openweathermap.org/weathermap?baselayer=map&cities=true&layer=precipitation&lat=39.93&lon=32.85&zoom=5" frameborder="0" id="weatherRadar" class="w-full h-[400px] rounded-2xl"></iframe>
            </div>
        </section>

    </main>

    <script>
        const apiKey = "6d4c1f9be7237068a9dd323532bfa14d";
        
        document.getElementById('currentDate').innerText = new Date().toLocaleDateString('tr-TR', { weekday: 'long', day: 'numeric', month: 'long' });

        function getLucideIcon(main) {
            const map = { 'Clear': 'sun', 'Clouds': 'cloud', 'Rain': 'cloud-rain', 'Thunderstorm': 'cloud-lightning', 'Snow': 'snowflake' };
            return map[main] || 'cloud-sun';
        }

        async function getWeather(city = 'Istanbul') {
            const input = document.getElementById('cityInput').value.trim();
            const target = input || city;
            
            try {
                const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${target}&appid=${apiKey}&units=metric&lang=tr`);
                const data = await res.json();
                if(data.cod != 200) return alert("Şehir bulunamadı!");

                // Radar haritasını güncelle (Koordinatlara göre)
                document.getElementById('radarIframe').src = `https://openweathermap.org/weathermap?baselayer=map&cities=true&layer=precipitation&lat=${data.coord.lat}&lon=${data.coord.lon}&zoom=6`;

                document.getElementById('cityName').innerText = data.name;
                document.getElementById('temp').innerText = Math.round(data.main.temp) + "°";
                document.getElementById('feelsLike').innerText = Math.round(data.main.feels_like) + "°";
                document.getElementById('description').innerText = data.weather[0].description;
                document.getElementById('humidity').innerText = "%" + data.main.humidity;
                document.getElementById('windSpeed').innerText = Math.round(data.wind.speed * 3.6) + " km/s";
                document.getElementById('pressure').innerText = data.main.pressure;
                
                const icon = getLucideIcon(data.weather[0].main);
                document.getElementById('weatherIcon').innerHTML = `<i data-lucide="${icon}" class="w-20 h-20 text-blue-100"></i>`;
                document.getElementById('bgIcon').innerHTML = `<i data-lucide="${icon}" class="w-64 h-64 text-white"></i>`;

                const fRes = await fetch(`https://api.openweathermap.org/data/2.5/forecast?q=${target}&appid=${apiKey}&units=metric&lang=tr`);
                const fData = await fRes.json();
                
                const daily = {};
                fData.list.forEach(i => {
                    const d = i.dt_txt.split(' ')[0];
                    if(!daily[d]) daily[d] = { t: [], icons: [] };
                    daily[d].t.push(i.main.temp);
                    daily[d].icons.push(i.weather[0].main);
                });

                document.getElementById('nightTemp').innerText = Math.round(Math.min(...daily[Object.keys(daily)[0]].t)) + "°";

                const container = document.getElementById('forecastContainer');
                container.innerHTML = "";
                Object.keys(daily).slice(1, 6).forEach(d => {
                    const temps = daily[d].t;
                    const name = new Date(d).toLocaleDateString('tr-TR', { weekday: 'short' });
                    container.innerHTML += `
                        <div class="forecast-card flex flex-col items-center gap-2">
                            <span class="text-[10px] font-black opacity-40 uppercase">${name}</span>
                            <i data-lucide="${getLucideIcon(daily[d].icons[0])}" class="text-blue-400 w-8 h-8"></i>
                            <span class="text-2xl font-black">${Math.round(Math.max(...temps))}°</span>
                            <span class="text-xs opacity-50">${Math.round(Math.min(...temps))}°</span>
                        </div>`;
                });
                lucide.createIcons();
            } catch (e) { console.error(e); }
        }

        document.getElementById('cityInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') getWeather(); });
        window.onload = () => { getWeather('Istanbul'); lucide.createIcons(); };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AtmosferinKalbi | V 1.6 Final</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: linear-gradient(180deg, #1e3a8a 0%, #0f172a 100%);
            background-attachment: fixed;
            min-height: 100vh; color: white; margin: 0;
            scroll-behavior: smooth;
        }

        /* Modern Üst Menü */
        .top-nav {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: sticky; top: 0; z-index: 1000;
        }

        .data-font { font-weight: 900; letter-spacing: -0.05em; line-height: 0.9; }
        
        .glass-card { 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(25px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 2.5rem; 
        }

        .nav-btn {
            padding: 8px 20px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 13px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            color: rgba(255,255,255,0.6);
        }
        .nav-btn:hover { background: rgba(255,255,255,0.1); color: white; }
        .nav-btn.active { background: rgba(59, 130, 246, 0.2); color: #60a5fa; border: 1px solid rgba(59, 130, 246, 0.3); }

        .temp-split { display: flex; align-items: center; gap: 10px; }
        .temp-sep { width: 1px; height: 18px; background: rgba(255,255,255,0.2); }

        /* Radar Çerçevesi */
        #radar-container {
            height: 550px;
            width: 100%;
            border-radius: 2.5rem;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>

    <nav class="top-nav w-full px-6 lg:px-12 py-4 flex items-center justify-between">
        <div class="flex items-center gap-10">
            <div class="flex items-center gap-3">
                <i data-lucide="cloud-lightning" class="text-yellow-400 w-7 h-7"></i>
                <span class="font-black text-xl tracking-tighter uppercase italic">Atmosferin<span class="text-blue-400">Kalbi</span></span>
            </div>
            <div class="hidden md:flex items-center gap-2">
                <a href="#" class="nav-btn active"><i data-lucide="layout-dashboard" class="w-4 h-4"></i> Ana Panel</a>
                <a href="#radar-section" class="nav-btn"><i data-lucide="map" class="w-4 h-4"></i> Canlı Radar</a>
            </div>
        </div>

        <div class="flex items-center gap-2 px-4 py-2 bg-white/5 rounded-xl border border-white/5">
            <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
            <span id="status" class="text-[10px] font-bold text-green-400 uppercase tracking-widest">SİSTEM ÇALIŞIYOR</span>
        </div>
    </nav>

    <main class="max-w-[1400px] mx-auto p-6 lg:p-12 space-y-12">
        
        <header class="flex flex-col md:flex-row justify-between items-center gap-8 border-b border-white/10 pb-12">
            <div>
                <h1 id="cityName" class="text-6xl lg:text-7xl font-black uppercase tracking-tighter leading-none mb-4">---</h1>
                <p id="currentDate" class="text-blue-300/40 font-bold text-[11px] uppercase tracking-[0.6em]"></p>
            </div>
            <div class="relative w-full md:w-[450px]">
                <input id="cityInput" type="text" placeholder="ŞEHİR ARA..." class="w-full bg-black/20 border border-white/10 rounded-2xl px-7 py-5 outline-none text-white focus:border-blue-500 transition-all font-bold text-lg">
                <button onclick="getWeather()" class="absolute right-3 top-3 bg-blue-600 text-white px-8 py-3 rounded-xl text-xs font-black hover:bg-blue-500 transition-all shadow-xl">SORGULA</button>
            </div>
        </header>

        <div class="grid grid-cols-1 xl:grid-cols-3 gap-10">
            <div class="xl:col-span-2 glass-card p-10 lg:p-12 flex flex-col justify-between min-h-[500px] relative overflow-hidden">
                <div id="bgIcon" class="absolute -right-10 -bottom-10 opacity-[0.03] scale-[4] pointer-events-none"></div>
                
                <div class="relative z-10">
                    <div class="flex flex-col lg:flex-row items-center gap-10 lg:gap-16">
                        <span id="temp" class="text-[8rem] lg:text-[9rem] data-font text-white drop-shadow-2xl">--°</span>
                        <div id="weatherIcon" class="drop-shadow-xl scale-90"></div>
                    </div>
                    <p id="description" class="text-3xl lg:text-5xl text-blue-200/80 font-light capitalize mt-6 italic">---</p>
                </div>

                <div class="relative z-10 flex gap-10 border-t border-white/10 pt-10 mt-10">
                    <div class="bg-white/5 px-6 py-3 rounded-2xl border border-white/5 flex flex-col items-center">
                        <p class="text-[9px] font-black opacity-30 tracking-widest uppercase mb-1">Gündüz</p>
                        <p id="dayTemp" class="text-4xl data-font">--°</p>
                    </div>
                    <div class="bg-blue-500/5 px-6 py-3 rounded-2xl border border-blue-500/10 flex flex-col items-center text-blue-400">
                        <p class="text-[9px] font-black opacity-60 tracking-widest uppercase mb-1">Gece</p>
                        <p id="nightTemp" class="text-4xl data-font">--°</p>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 gap-6">
                <div class="glass-card p-8 flex items-center gap-6">
                    <div class="bg-white/5 p-5 rounded-3xl text-blue-400"><i data-lucide="wind" class="w-8 h-8"></i></div>
                    <div><p class="text-[10px] opacity-40 font-bold uppercase tracking-widest">Rüzgar</p><p id="windSpeed" class="text-4xl data-font">--</p></div>
                </div>
                <div class="glass-card p-8 flex items-center gap-6">
                    <div class="bg-white/5 p-5 rounded-3xl text-blue-400"><i data-lucide="droplets" class="w-8 h-8"></i></div>
                    <div><p class="text-[10px] opacity-40 font-bold uppercase tracking-widest">Nem</p><p id="humidity" class="text-4xl data-font">--</p></div>
                </div>
                <div class="glass-card p-8 flex items-center gap-6">
                    <div class="bg-white/5 p-5 rounded-3xl text-blue-400"><i data-lucide="umbrella" class="w-8 h-8"></i></div>
                    <div><p class="text-[10px] opacity-40 font-bold uppercase tracking-widest">Yağış İht.</p><p id="pop" class="text-4xl data-font">--</p></div>
                </div>
            </div>
        </div>

        <section id="radar-section" class="space-y-8">
            <div class="flex items-center gap-6">
                <h3 class="text-lg font-black uppercase tracking-[0.4em] text-white/30 whitespace-nowrap">Canlı Radar (Windy)</h3>
                <div class="h-[1px] w-full bg-white/10"></div>
            </div>
            <div id="radar-container">
                <iframe id="windyFrame" class="w-full h-full" src="" frameborder="0"></iframe>
            </div>
        </section>

        <section class="space-y-10">
            <div class="flex items-center gap-6">
                <h3 class="text-lg font-black uppercase tracking-[0.4em] text-white/30 whitespace-nowrap">5 Günlük Rapor</h3>
                <div class="h-[1px] w-full bg-white/10"></div>
            </div>
            <div id="forecastContainer" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-8"></div>
        </section>

    </main>

<script>
    const apiKey = "6d4c1f9be7237068a9dd323532bfa14d"; 

    function getIcon(main) {
        const map = { 'Clear': 'sun', 'Clouds': 'cloud', 'Rain': 'cloud-rain', 'Thunderstorm': 'cloud-lightning', 'Snow': 'snowflake', 'Drizzle': 'cloud-drizzle', 'Mist': 'cloud-fog' };
        return map[main] || 'cloud-sun';
    }

    async function getWeather(city = 'Istanbul') {
        const target = document.getElementById('cityInput').value.trim() || city;
        const status = document.getElementById('status');
        
        try {
            status.innerText = "GÜNCELLENİYOR...";
            
            // 1. ANLIK VERİ
            const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${target}&appid=${apiKey}&units=metric&lang=tr`);
            const data = await res.json();
            if(data.cod != 200) throw new Error("Şehir bulunamadı");

            document.getElementById('cityName').innerText = data.name;
            document.getElementById('temp').innerText = Math.round(data.main.temp) + "°";
            document.getElementById('description').innerText = data.weather[0].description;
            document.getElementById('windSpeed').innerText = Math.round(data.wind.speed * 3.6) + " km/s";
            document.getElementById('humidity').innerText = "%" + data.main.humidity;
            
            const iconName = getIcon(data.weather[0].main);
            document.getElementById('weatherIcon').innerHTML = `<i data-lucide="${iconName}" class="w-24 h-24 lg:w-32 lg:h-32 text-white"></i>`;
            document.getElementById('bgIcon').innerHTML = `<i data-lucide="${iconName}" class="w-full h-full text-white"></i>`;

            // RADAR GÜNCELLEME
            const lat = data.coord.lat;
            const lon = data.coord.lon;
            document.getElementById('windyFrame').src = `https://embed.windy.com/embed2.html?lat=${lat}&lon=${lon}&zoom=6&level=surface&overlay=rain&product=ecmwf&menu=&message=true&marker=&calendar=now&pressure=&type=map&location=coordinates&detail=&metricWind=km%2Fh&metricTemp=%C2%B0C&radarRange=-1`;

            // 2. 5 GÜNLÜK TAHMİN
            const fRes = await fetch(`https://api.openweathermap.org/data/2.5/forecast?q=${target}&appid=${apiKey}&units=metric&lang=tr`);
            const fData = await fRes.json();
            document.getElementById('pop').innerText = "%" + Math.round((fData.list[0].pop || 0) * 100);

            const daily = {};
            fData.list.forEach(item => {
                const date = item.dt_txt.split(' ')[0];
                if(!daily[date]) {
                    daily[date] = { min: item.main.temp_min, max: item.main.temp_max, icon: item.weather[0].main };
                } else {
                    if(item.main.temp_min < daily[date].min) daily[date].min = item.main.temp_min;
                    if(item.main.temp_max > daily[date].max) daily[date].max = item.main.temp_max;
                }
            });

            // Gündüz-Gece Özet
            const todayKey = Object.keys(daily)[0];
            document.getElementById('dayTemp').innerText = Math.round(daily[todayKey].max) + "°";
            document.getElementById('nightTemp').innerText = Math.round(daily[todayKey].min) + "°";

            // Tahmin Kartları
            const container = document.getElementById('forecastContainer');
            container.innerHTML = "";
            Object.keys(daily).slice(1, 6).forEach(date => {
                const dayName = new Date(date).toLocaleDateString('tr-TR', { weekday: 'long' });
                container.innerHTML += `
                    <div class="glass-card p-10 flex flex-col items-center group hover:bg-white/10 transition-all">
                        <span class="text-[11px] font-black opacity-30 uppercase mb-6 tracking-widest">${dayName}</span>
                        <i data-lucide="${getIcon(daily[date].icon)}" class="text-blue-300 w-12 h-12 mb-8"></i>
                        <div class="temp-split">
                            <span class="data-font text-3xl">${Math.round(daily[date].max)}°</span>
                            <div class="temp-sep"></div>
                            <span class="data-font text-blue-400/50 text-xl">${Math.round(daily[date].min)}°</span>
                        </div>
                    </div>`;
            });

            status.innerText = "SİSTEM ÇALIŞIYOR";
            lucide.createIcons();
        } catch (e) {
            status.innerText = "BAĞLANTI HATASI";
        }
    }

    document.getElementById('cityInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') getWeather(); });
    window.onload = () => {
        document.getElementById('currentDate').innerText = new Date().toLocaleDateString('tr-TR', { weekday: 'long', day: 'numeric', month: 'long' });
        getWeather('Istanbul'); 
    };
</script>
</body>
</html>
